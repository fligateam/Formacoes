<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmácia da Liga - Sistema de Gestão de Formações</title>

    <meta name="theme-color" content="#4A6572">
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="FormaLiga">
    <link rel="manifest" href="manifest.json">
        <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%234A6572'/><rect x='28' y='18' width='44' height='64' rx='8' fill='%23FFFFFF'/><rect x='36' y='32' width='28' height='4' rx='2' fill='%23D8EFFF'/><rect x='36' y='42' width='20' height='4' rx='2' fill='%23D8EFFF'/><rect x='36' y='52' width='24' height='4' rx='2' fill='%23DFF3E3'/><circle cx='68' cy='72' r='14' fill='%237BC97F'/><rect x='64' y='66' width='8' height='12' rx='2' fill='white'/><rect x='62' y='70' width='12' height='4' rx='2' fill='white'/></svg>">
    <link rel="apple-touch-icon" href="icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="icon-512.png">
    <link rel="apple-touch-icon" href="icon-192.png">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg-primary: #F7F1E8;
            --color-bg-secondary: #FFFFFF;
            --color-accent-blue: #D8EFFF;
            --color-accent-green: #DFF3E3;
            --color-text-primary: #4A6572;
            --color-text-secondary: #6B7F8C;
            --color-border: #E0D5C7;
            --color-success: #7BC97F;
            --color-warning: #FFB84D;
            --color-error: #E57373;
            --color-info: #64B5F6;
            --shadow-sm: 0 2px 4px rgba(74, 101, 114, 0.08);
            --shadow-md: 0 4px 12px rgba(74, 101, 114, 0.12);
            --shadow-lg: 0 8px 24px rgba(74, 101, 114, 0.16);
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Montserrat', sans-serif;
            background-color: var(--color-bg-primary);
            color: var(--color-text-primary);
            line-height: 1.6;
        }

        .app-container {
            display: flex;
            min-height: 100vh;
        }

        .sidebar {
            width: 260px;
            background: var(--color-bg-secondary);
            border-right: 1px solid var(--color-border);
            padding: 0;
            position: fixed;
            height: 100vh;
            overflow-y: auto;
            box-shadow: var(--shadow-md);
        }

        .sidebar-header {
            padding: 24px 20px;
            border-bottom: 1px solid var(--color-border);
            background: linear-gradient(135deg, var(--color-accent-blue), var(--color-accent-green));
        }

        .sidebar-header h1 {
            font-size: 18px;
            font-weight: 700;
            color: var(--color-text-primary);
            margin-bottom: 4px;
        }

        .sidebar-header p {
            font-size: 12px;
            color: var(--color-text-secondary);
            font-weight: 400;
        }

        .sidebar-menu {
            padding: 16px 0;
        }

        .menu-item {
            padding: 12px 20px;
            cursor: pointer;
            transition: all 0.2s ease;
            border-left: 3px solid transparent;
            font-size: 14px;
            font-weight: 500;
            color: var(--color-text-secondary);
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .menu-item:hover {
            background: var(--color-accent-blue);
            border-left-color: var(--color-text-primary);
            color: var(--color-text-primary);
        }

        .menu-item.active {
            background: var(--color-accent-blue);
            border-left-color: var(--color-text-primary);
            color: var(--color-text-primary);
            font-weight: 600;
        }

        .main-content {
            margin-left: 260px;
            flex: 1;
            display: flex;
            flex-direction: column;
        }

        .topbar {
            background: var(--color-bg-secondary);
            border-bottom: 1px solid var(--color-border);
            padding: 16px 32px;
            display: flex;
            justify-content: space-between;
            align-items: center;
            box-shadow: var(--shadow-sm);
            position: sticky;
            top: 0;
            z-index: 100;
        }

        .user-info {
            display: flex;
            align-items: center;
            gap: 12px;
        }

        .user-avatar {
            width: 40px;
            height: 40px;
            border-radius: 50%;
            background: linear-gradient(135deg, var(--color-accent-blue), var(--color-accent-green));
            display: flex;
            align-items: center;
            justify-content: center;
            font-weight: 600;
            color: var(--color-text-primary);
            font-size: 16px;
        }

        .user-details h3 {
            font-size: 14px;
            font-weight: 600;
            color: var(--color-text-primary);
        }

        .user-details p {
            font-size: 12px;
            color: var(--color-text-secondary);
        }

        .content-area {
            padding: 32px;
            flex: 1;
            overflow-y: auto;
        }

        .btn {
            padding: 10px 20px;
            border: none;
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 8px;
        }

        .btn-primary {
            background: var(--color-text-primary);
            color: white;
        }

        .btn-primary:hover {
            background: #3a515e;
            box-shadow: var(--shadow-md);
        }

        .btn-secondary {
            background: var(--color-accent-blue);
            color: var(--color-text-primary);
        }

        .btn-secondary:hover {
            background: #c0e3ff;
        }

        .btn-success {
            background: var(--color-success);
            color: white;
        }

        .btn-success:hover {
            background: #6bb56f;
        }

        .btn-warning {
            background: var(--color-warning);
            color: white;
        }

        .btn-danger {
            background: var(--color-error);
            color: white;
        }

        .btn-danger:hover {
            background: #d66363;
        }

        .btn-icon {
            padding: 8px;
            width: 36px;
            height: 36px;
            display: flex;
            align-items: center;
            justify-content: center;
        }

        .card {
            background: var(--color-bg-secondary);
            border-radius: 12px;
            padding: 24px;
            box-shadow: var(--shadow-md);
            margin-bottom: 20px;
        }

        .card-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--color-border);
        }

        .card-title {
            font-size: 20px;
            font-weight: 700;
            color: var(--color-text-primary);
        }

        .stats-grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(200px, 1fr));
            gap: 20px;
            margin-bottom: 32px;
        }

        .stat-card {
            background: var(--color-bg-secondary);
            padding: 20px;
            border-radius: 12px;
            box-shadow: var(--shadow-md);
            border-left: 4px solid var(--color-text-primary);
        }

        .stat-card.blue {
            border-left-color: var(--color-info);
        }

        .stat-card.green {
            border-left-color: var(--color-success);
        }

        .stat-card.warning {
            border-left-color: var(--color-warning);
        }

        .stat-label {
            font-size: 12px;
            color: var(--color-text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-bottom: 8px;
            font-weight: 600;
        }

        .stat-value {
            font-size: 32px;
            font-weight: 700;
            color: var(--color-text-primary);
        }

        .form-group {
            margin-bottom: 20px;
        }

        .form-label {
            display: block;
            font-size: 14px;
            font-weight: 600;
            color: var(--color-text-primary);
            margin-bottom: 8px;
        }

        .form-control {
            width: 100%;
            padding: 12px 16px;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            color: var(--color-text-primary);
            background: var(--color-bg-secondary);
            transition: all 0.2s ease;
        }

        .form-control:focus {
            outline: none;
            border-color: var(--color-text-primary);
            box-shadow: 0 0 0 3px rgba(74, 101, 114, 0.1);
        }

        textarea.form-control {
            resize: vertical;
            min-height: 100px;
        }

        .table-container {
            overflow-x: auto;
            border-radius: 12px;
            box-shadow: var(--shadow-sm);
        }

        table {
            width: 100%;
            border-collapse: collapse;
            background: var(--color-bg-secondary);
        }

        thead {
            background: var(--color-accent-blue);
        }

        th {
            padding: 16px;
            text-align: left;
            font-size: 13px;
            font-weight: 700;
            color: var(--color-text-primary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        td {
            padding: 16px;
            font-size: 14px;
            color: var(--color-text-primary);
            border-bottom: 1px solid var(--color-border);
        }

        tr:hover {
            background: var(--color-accent-blue);
        }

        .badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 20px;
            font-size: 12px;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.3px;
        }

        .badge-success {
            background: var(--color-accent-green);
            color: var(--color-success);
        }

        .badge-warning {
            background: #FFF4E5;
            color: var(--color-warning);
        }

        .badge-info {
            background: var(--color-accent-blue);
            color: var(--color-info);
        }

        .badge-error {
            background: #FFEBEE;
            color: var(--color-error);
        }

        .modal {
            display: none;
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: rgba(0, 0, 0, 0.5);
            z-index: 1000;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .modal.active {
            display: flex;
        }

        .modal-content {
            background: var(--color-bg-secondary);
            border-radius: 16px;
            padding: 32px;
            max-width: 800px;
            width: 100%;
            max-height: 90vh;
            overflow-y: auto;
            box-shadow: var(--shadow-lg);
        }

        .modal-header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 24px;
            padding-bottom: 16px;
            border-bottom: 1px solid var(--color-border);
        }

        .modal-title {
            font-size: 22px;
            font-weight: 700;
            color: var(--color-text-primary);
        }

        .close-modal {
            background: none;
            border: none;
            font-size: 24px;
            cursor: pointer;
            color: var(--color-text-secondary);
            padding: 0;
            width: 32px;
            height: 32px;
            display: flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            transition: all 0.2s ease;
        }

        .close-modal:hover {
            background: var(--color-accent-blue);
            color: var(--color-text-primary);
        }

        .rating-group {
            margin-bottom: 24px;
        }

        .rating-stars {
            display: flex;
            gap: 8px;
            margin-top: 8px;
        }

        .star {
            font-size: 28px;
            cursor: pointer;
            color: #E0D5C7;
            transition: all 0.2s ease;
        }

        .star:hover,
        .star.active {
            color: #FFB84D;
        }

        .toast {
            position: fixed;
            bottom: 24px;
            right: 24px;
            background: var(--color-bg-secondary);
            padding: 16px 24px;
            border-radius: 12px;
            box-shadow: var(--shadow-lg);
            display: none;
            align-items: center;
            gap: 12px;
            z-index: 2000;
            border-left: 4px solid var(--color-success);
        }

        .toast.active {
            display: flex;
            animation: slideIn 0.3s ease;
        }

        .toast.error {
            border-left-color: var(--color-error);
        }

        @keyframes slideIn {
            from {
                transform: translateX(400px);
                opacity: 0;
            }
            to {
                transform: translateX(0);
                opacity: 1;
            }
        }

        .filters-bar {
            background: var(--color-bg-secondary);
            padding: 16px 24px;
            border-radius: 12px;
            margin-bottom: 24px;
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            box-shadow: var(--shadow-sm);
        }

        .filter-item {
            flex: 1;
            min-width: 200px;
        }

        .empty-state {
            text-align: center;
            padding: 60px 20px;
        }

        .empty-state-icon {
            font-size: 64px;
            color: var(--color-border);
            margin-bottom: 16px;
        }

        .empty-state-text {
            font-size: 18px;
            color: var(--color-text-secondary);
            margin-bottom: 24px;
        }

        .tabs {
            display: flex;
            gap: 8px;
            border-bottom: 2px solid var(--color-border);
            margin-bottom: 24px;
        }

        .tab {
            padding: 12px 24px;
            background: none;
            border: none;
            font-family: 'Montserrat', sans-serif;
            font-size: 14px;
            font-weight: 600;
            color: var(--color-text-secondary);
            cursor: pointer;
            border-bottom: 3px solid transparent;
            margin-bottom: -2px;
            transition: all 0.2s ease;
        }

        .tab:hover {
            color: var(--color-text-primary);
        }

        .tab.active {
            color: var(--color-text-primary);
            border-bottom-color: var(--color-text-primary);
        }

        .page {
            display: none;
        }

        .page.active {
            display: block;
        }

        .training-card {
            background: var(--color-bg-secondary);
            border-radius: 12px;
            padding: 20px;
            margin-bottom: 16px;
            box-shadow: var(--shadow-sm);
            border-left: 4px solid var(--color-info);
            cursor: pointer;
            transition: all 0.2s ease;
        }

        .training-card:hover {
            box-shadow: var(--shadow-md);
            transform: translateY(-2px);
        }

        .training-card.completed {
            border-left-color: var(--color-success);
        }

        .training-card.pending {
            border-left-color: var(--color-warning);
        }

        .training-header {
            display: flex;
            justify-content: space-between;
            align-items: start;
            margin-bottom: 12px;
        }

        .training-title {
            font-size: 18px;
            font-weight: 700;
            color: var(--color-text-primary);
            margin-bottom: 4px;
        }

        .training-meta {
            display: flex;
            gap: 16px;
            flex-wrap: wrap;
            font-size: 13px;
            color: var(--color-text-secondary);
        }

        .training-meta-item {
            display: flex;
            align-items: center;
            gap: 6px;
        }

        .login-container {
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            padding: 20px;
        }

        .login-card {
            background: var(--color-bg-secondary);
            border-radius: 16px;
            padding: 48px;
            max-width: 450px;
            width: 100%;
            box-shadow: var(--shadow-lg);
            text-align: center;
        }

        .login-logo {
            font-size: 48px;
            margin-bottom: 16px;
        }

        .login-title {
            font-size: 28px;
            font-weight: 700;
            color: var(--color-text-primary);
            margin-bottom: 8px;
        }

        .login-subtitle {
            font-size: 14px;
            color: var(--color-text-secondary);
            margin-bottom: 32px;
        }

        .checkbox-group {
            display: flex;
            align-items: center;
            gap: 8px;
            margin-top: 12px;
        }

        .checkbox-group input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        .checkbox-group label {
            font-size: 14px;
            color: var(--color-text-secondary);
            cursor: pointer;
        }

        .checkbox-item {
            display: flex;
            align-items: center;
            gap: 8px;
            padding: 8px;
            border: 1px solid var(--color-border);
            border-radius: 8px;
            margin-bottom: 8px;
            transition: all 0.2s ease;
        }

        .checkbox-item:hover {
            background: var(--color-accent-blue);
        }

        .checkbox-item input[type="checkbox"] {
            width: 18px;
            height: 18px;
            cursor: pointer;
        }

        @media (max-width: 768px) {
            .sidebar {
                transform: translateX(-100%);
                transition: transform 0.3s ease;
                z-index: 200;
            }

            .sidebar.mobile-open {
                transform: translateX(0);
            }

            .main-content {
                margin-left: 0;
            }

            .stats-grid {
                grid-template-columns: 1fr;
            }

            .filters-bar {
                flex-direction: column;
            }

            .filter-item {
                min-width: 100%;
            }
        }

        .loading {
            display: none;
            text-align: center;
            padding: 40px;
        }

        .loading.active {
            display: block;
        }

        .spinner {
            border: 4px solid var(--color-border);
            border-top: 4px solid var(--color-text-primary);
            border-radius: 50%;
            width: 40px;
            height: 40px;
            animation: spin 1s linear infinite;
            margin: 0 auto 16px;
        }

        @keyframes spin {
            0% { transform: rotate(0deg); }
            100% { transform: rotate(360deg); }
        }

        .participants-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(250px, 1fr));
            gap: 12px;
            margin-top: 16px;
        }
    
        .section-subtitle { font-size: 13px; color: var(--color-text-secondary); margin-top: -8px; margin-bottom: 16px; }
        .alert-list { display: grid; gap: 12px; }
        .alert-item { background: #FFF7E8; border: 1px solid #FFE1AE; border-radius: 12px; padding: 14px 16px; }
        .kpi-row { display: flex; gap: 10px; flex-wrap: wrap; margin-top: 8px; }
        .kpi-pill { background: var(--color-accent-blue); color: var(--color-text-primary); padding: 6px 10px; border-radius: 999px; font-size: 12px; font-weight: 600; }
        .month-group { margin-bottom: 28px; }
        .month-title { font-size: 18px; font-weight: 700; margin-bottom: 14px; color: var(--color-text-primary); }
        .actions-row { display: flex; flex-wrap: wrap; gap: 8px; margin-top: 14px; }
        .small-text { font-size: 12px; color: var(--color-text-secondary); }
        .inline-badge { display:inline-flex; align-items:center; gap:6px; }
        .proof-upload-box { border: 1px dashed var(--color-border); border-radius: 12px; padding: 12px; background: #fafafa; }
        .dashboard-split { display:grid; grid-template-columns: 1.1fr 0.9fr; gap:20px; }
        .rank-list { display:grid; gap:10px; }
        .rank-item { display:flex; justify-content:space-between; align-items:center; padding:12px 14px; border:1px solid var(--color-border); border-radius:10px; background:#fff; }
        .muted-box { background:#F7F9FA; border:1px solid var(--color-border); border-radius:12px; padding:14px; }
        @media (max-width: 980px) { .dashboard-split { grid-template-columns: 1fr; } }

    </style>
</head>
<body>
    <!-- Login Page -->
    <div id="loginPage" class="page active">
        <div class="login-container">
            <div class="login-card">
                <div class="login-logo">💊</div>
                <h1 class="login-title">Farmácia da Liga</h1>
                <p class="login-subtitle">Sistema de Gestão de Formações</p>
                <form id="loginForm">
                    <div class="form-group">
                        <label class="form-label" for="email">Email</label>
                        <input type="email" id="email" class="form-control" placeholder="seu.email@farmacialiga.pt" required>
                    </div>
                    <div class="form-group">
                        <label class="form-label" for="password">Password</label>
                        <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                    </div>
                    <button type="submit" class="btn btn-primary" style="width: 100%; margin-top: 8px;">
                        Entrar
                    </button>
                </form>
            </div>
        </div>
    </div>

    <!-- Dashboard Page -->
    <div id="dashboardPage" class="page">
        <div class="app-container">
            <aside class="sidebar" id="sidebar">
                <div class="sidebar-header">
                    <h1>💊 Farmácia da Liga</h1>
                    <p>Gestão de Formações</p>
                </div>
                <nav class="sidebar-menu" id="sidebarMenu"></nav>
            </aside>

            <div class="main-content">
                <header class="topbar">
                    <div>
                        <h2 id="pageTitle" style="font-size: 20px; font-weight: 700;">Dashboard</h2>
                    </div>
                    <div class="user-info">
                        <div class="user-avatar" id="userAvatar">U</div>
                        <div class="user-details">
                            <h3 id="userName">Utilizador</h3>
                            <p id="userRole">Colaborador</p>
                        </div>
                        <button class="btn btn-secondary btn-icon" onclick="logout()" title="Terminar sessão">
                            🚪
                        </button>
                    </div>
                </header>

                <main class="content-area" id="contentArea"></main>
            </div>
        </div>
    </div>

    <!-- Modal de Avaliação -->
    <div class="modal" id="avaliacaoModal">
        <div class="modal-content">
            <div class="modal-header">
                <h2 class="modal-title">Avaliar Formação</h2>
                <button class="close-modal" onclick="closeModal('avaliacaoModal')">✕</button>
            </div>
            <form id="avaliacaoForm" onsubmit="submitAvaliacao(event)">
                <input type="hidden" id="evalTrainingId">

                <div class="rating-group">
                    <label class="form-label">Duração da Ação</label>
                    <div class="rating-stars" id="stars-duracao"></div>
                    <input type="hidden" id="rating-duracao" required>
                </div>

                <div class="rating-group">
                    <label class="form-label">Capacidade Pedagógica do Formador</label>
                    <div class="rating-stars" id="stars-pedagogica"></div>
                    <input type="hidden" id="rating-pedagogica" required>

    <script>
        // Firebase Configuration
        const firebaseConfig = {
            apiKey: "AIzaSyAhBfZ9x8odvenh2x5PTFMDPeGUhD-JvDc",
            authDomain: "formacoes-liga.firebaseapp.com",
            projectId: "formacoes-liga",
            storageBucket: "formacoes-liga.firebasestorage.app",
            messagingSenderId: "788115326428",

        };

        const auth = firebase.auth();
        const db = firebase.firestore();

        let currentUser = null;
        let currentUserData = null;

        // Auth state observer with seed for 3 default gestoras
        auth.onAuthStateChanged(async (user) => {
            if (!user) {
                currentUser = null;
                currentUserData = null;
                showLogin();
                return;

            // 1) Try to load user data
            await loadUserData(user.uid);

            // 2) If user document doesn't exist, create it for the 3 default gestoras
            if (!currentUserData) {
                const email = user.email?.toLowerCase();

                const gestoresSeed = {
                    "fligadebora@hotmail.com": {
                        nome: "Débora",
                        funcao: "Gestão",
                        role: "gestorformacao"
                    },
                    "fligamarta@hotmail.com": {
                        nome: "Marta",
                        funcao: "Gestão",
                        role: "gestorformacao"
                    },
                    "farmacia@ligagaia.pt": {
                        nome: "Dra Rita Sá",
                        funcao: "Gestão",
                        role: "gestorformacao"
                    }
                };

                const dadosSeed = gestoresSeed[email];

                if (dadosSeed) {
                    try {
                        await db.collection("users").doc(user.uid).set(
                            {
                                nome: dadosSeed.nome,
                                email: user.email,
                                funcao: dadosSeed.funcao,
                                role: dadosSeed.role,
                                ativo: true,

                        console.error("Erro ao criar utilizador seed:", error);

                }
            }

            // 3) Show dashboard (with currentUserData loaded)
            showDashboard();
        });

        async function loadUserData(uid) {
            try {
                const userDoc = await db.collection('users').doc(uid).get();
                if (userDoc.exists) {
                    currentUserData = { id: uid, ...userDoc.data() };
                    updateUserInterface();
                }
            } catch (error) {
                console.error('Erro ao carregar dados do utilizador:', error);
            }
        }

        // Login form handler
        document.getElementById('loginForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const email = document.getElementById('email').value;
            const password = document.getElementById('password').value;

            try {
                await auth.signInWithEmailAndPassword(email, password);
                showToast('Login realizado com sucesso!', 'success');
            } catch (error) {
                console.error('Erro de login:', error);
                showToast('Erro ao fazer login. Verifique as credenciais.', 'error');
            }
        });

        function logout() {
            auth.signOut();
        }

        function showLogin() {
            document.getElementById('loginPage').classList.add('active');
            document.getElementById('dashboardPage').classList.remove('active');
        }

        function showDashboard() {
            document.getElementById('loginPage').classList.remove('active');
            document.getElementById('dashboardPage').classList.add('active');
            buildMenu();
            const isGestor = currentUserData && currentUserData.role === 'gestorformacao';
            navigateTo(isGestor ? 'todasFormacoes' : 'minhasFormacoes');
        }

        function updateUserInterface() {
            if (currentUserData) {
                document.getElementById('userName').textContent = currentUserData.nome || 'Utilizador';
                document.getElementById('userRole').textContent = 
                    currentUserData.role === 'gestorformacao' ? 'Gestor de Formação' : 'Colaborador';
                
                const initials = currentUserData.nome 
                    ? currentUserData.nome.split(' ').map(n => n[0]).join('').substring(0, 2).toUpperCase()
                    : 'U';
                document.getElementById('userAvatar').textContent = initials;
            }
        }

        function buildMenu() {
            const menu = document.getElementById('sidebarMenu');
            const isGestor = currentUserData && currentUserData.role === 'gestorformacao';

            const menuItems = isGestor ? [
                { id: 'todasFormacoes', label: 'Todas as Formações', icon: '📚', section: 'gestor' },
                { id: 'criarFormacao', label: 'Criar Formação', icon: '➕', section: 'gestor' },
                { id: 'colaboradores', label: 'Colaboradores', icon: '👥', section: 'gestor' },
                { id: 'necessidadesFormacao', label: 'Necessidades de Formação', icon: '📝', section: 'gestor' },
                { id: 'relatorios', label: 'Relatórios e Exportação', icon: '📊', section: 'gestor' },
                { separator: true },
                { id: 'minhasFormacoes', label: 'As Minhas Formações', icon: '📖', section: 'colaborador' },
                { id: 'manifestarNecessidade', label: 'Necessidade de Formação', icon: '✍️', section: 'colaborador' },
                { id: 'historicoAvaliacoes', label: 'Histórico de Avaliações', icon: '⭐', section: 'colaborador' }
            ] : [
                { id: 'minhasFormacoes', label: 'As Minhas Formações', icon: '📖' },
                { id: 'manifestarNecessidade', label: 'Necessidade de Formação', icon: '✍️' },
                { id: 'historicoAvaliacoes', label: 'Histórico de Avaliações', icon: '⭐' }
            ];

            menu.innerHTML = menuItems.map(item => {
                if (item.separator) {
                    return `<div style="padding: 8px 20px; margin: 8px 0; border-bottom: 1px solid var(--color-border);">
                        <small style="color: var(--color-text-secondary); font-size: 11px; font-weight: 600; text-transform: uppercase; letter-spacing: 0.5px;">
                            Área Pessoal
                        </small>
                    </div>`;
                }
                return `<div class="menu-item" onclick="navigateTo('${item.id}')">
                    <span>${item.icon}</span>
                    <span>${item.label}</span>
                </div>`;
            }).join('');
        }

        function navigateTo(pageId) {
            document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
            event?.target?.closest('.menu-item')?.classList.add('active');

            const isGestor = currentUserData && currentUserData.role === 'gestorformacao';

            switch(pageId) {
                case 'minhasFormacoes':
                    loadMinhasFormacoes();
                    break;
                case 'manifestarNecessidade':
                    loadManifestarNecessidade();
                    break;
                case 'historicoAvaliacoes':
                    loadHistoricoAvaliacoes();
                    break;
                case 'todasFormacoes':
                    if (isGestor) loadTodasFormacoes();
                    break;
                case 'criarFormacao':
                    if (isGestor) loadCriarFormacao();
                    break;
                case 'colaboradores':
                    if (isGestor) loadColaboradores();
                    break;
                case 'necessidadesFormacao':
                    if (isGestor) loadNecessidadesGestor();
                    break;
                case 'relatorios':
                    if (isGestor) loadRelatorios();
                    break;
            }
        }

        // Colaborador Functions
        async function loadMinhasFormacoes() {
            document.getElementById('pageTitle').textContent = 'As Minhas Formações';

            const content = `
                <div class="stats-grid">
                    <div class="stat-card blue">
                        <div class="stat-label">Formações Futuras</div>
                        <div class="stat-value" id="statFuturas">-</div>
                    </div>
                    <div class="stat-card green">
                        <div class="stat-label">Formações Concluídas</div>
                        <div class="stat-value" id="statConcluidas">-</div>
                    </div>
                    <div class="stat-card warning">
                        <div class="stat-label">Por Avaliar</div>
                        <div class="stat-value" id="statPorAvaliar">-</div>
                    </div>
                    <div class="stat-card">
                        <div class="stat-label">Total de Horas</div>
                        <div class="stat-value" id="statHoras">-</div>
                    </div>
                </div>

                <div class="card">
                    <div class="card-header">
                        <h2 class="card-title">Formações</h2>
                    </div>
                    <div id="formacoesContainer">
                        <div class="loading active">
                            <div class="spinner"></div>
                            <p>A carregar formações...</p>
                        </div>
                    </div>
                </div>
            `;

            document.getElementById('contentArea').innerHTML = content;
            await carregarMinhasFormacoes();
        }

        async function carregarMinhasFormacoes() {
            try {
                const enrollmentsSnap = await db.collection('enrollments')
                    .where('userId', '==', currentUser.uid)
                    .get();

                const trainingIds = enrollmentsSnap.docs.map(doc => doc.data().trainingId);

                if (trainingIds.length === 0) {
                    document.getElementById('formacoesContainer').innerHTML = `
                        <div class="empty-state">
                            <div class="empty-state-icon">📚</div>
                            <p class="empty-state-text">Ainda não tem formações atribuídas</p>
                        </div>
                    `;
                    updateStats([]);
                    return;
                }

                const trainings = [];
                for (const trainingId of trainingIds) {
                    const trainingDoc = await db.collection('trainings').doc(trainingId).get();
                    if (trainingDoc.exists) {
                        const enrollment = enrollmentsSnap.docs.find(doc => doc.data().trainingId === trainingId);
                        trainings.push({
                            id: trainingDoc.id,
                            ...trainingDoc.data(),
                            enrollment: { id: enrollment.id, ...enrollment.data() }
                        });
                    }
                }

                renderFormacoes(trainings);
                updateStats(trainings);
            } catch (error) {
                console.error('Erro ao carregar formações:', error);
                showToast('Erro ao carregar formações', 'error');
            }
        }

        function renderFormacoes(trainings) {
            const container = document.getElementById('formacoesContainer');
            
            if (trainings.length === 0) {
                container.innerHTML = `
                    <div class="empty-state">
                        <div class="empty-state-icon">📚</div>
                        <p class="empty-state-text">Nenhuma formação encontrada</p>
                    </div>
                `;
                return;
            }

            container.innerHTML = trainings.map(training => {
                const date = training.data ? new Date(training.data.seconds * 1000) : new Date();
                const isFuture = date > new Date();
                const canEvaluate = training.avaliacaoAutorizada && 
                                    training.enrollment.estadoInscricao === 'Presente' && 
                                    !training.enrollment.avaliado;

                return `
                    <div class="training-card ${isFuture ? 'pending' : 'completed'}">
                        <div class="training-header">
                            <div>
                                <h3 class="training-title">${training.tema || 'Sem título'}</h3>
                                <div class="training-meta">
                                    <div class="training-meta-item">📅 ${date.toLocaleDateString('pt-PT')}</div>
                                    <div class="training-meta-item">⏱️ ${training.duracaoHoras || 0}h</div>
                                    <div class="training-meta-item">👤 ${training.formador || 'N/A'}</div>
                                    ${training.laboratorioMarca ? `<div class="training-meta-item">🏢 ${training.laboratorioMarca}</div>` : ''}
                                </div>
                            </div>
                            <div>
                                <span class="badge ${isFuture ? 'badge-info' : 'badge-success'}">
                                    ${isFuture ? 'Agendada' : 'Concluída'}
                                </span>
                                ${canEvaluate ? `
                                    <button class="btn btn-warning" style="margin-left: 8px;" onclick="abrirAvaliacao('${training.id}')">
                                        Avaliar
                                    </button>
                                ` : ''}
                            </div>
                        </div>
                    </div>
                `;
            }).join('');
        }

        function updateStats(trainings) {
            const now = new Date();
            const futuras = trainings.filter(t => new Date(t.data.seconds * 1000) > now).length;
            const concluidas = trainings.filter(t => new Date(t.data.seconds * 1000) <= now).length;
            const porAvaliar = trainings.filter(t => 
                t.avaliacaoAutorizada && 
                t.enrollment.estadoInscricao === 'Presente' && 
                !t.enrollment.avaliado
            ).length;
            const totalHoras = trainings.reduce((sum, t) => sum + (t.duracaoHoras || 0), 0);

            document.getElementById('statFuturas').textContent = futuras;
            document.getElementById('statConcluidas').textContent = concluidas;
            document.getElementById('statPorAvaliar').textContent = porAvaliar;
            document.getElementById('statHoras').textContent = totalHoras;
        }

        function abrirAvaliacao(trainingId) {
            document.getElementById('evalTrainingId').value = trainingId;
            initRatingStars();
            if (typeof injectProofField === 'function') injectProofField();
            openModal('avaliacaoModal');
        }

        function initRatingStars() {
            const fields = ['duracao', 'pedagogica', 'dominio', 'relevancia', 'global'];
            fields.forEach(field => {
                const container = document.getElementById(`stars-${field}`);
                container.innerHTML = '';
                for (let i = 1; i <= 5; i++) {
                    const star = document.createElement('span');
                    star.className = 'star';
                    star.textContent = '★';
                    star.onclick = () => setRating(field, i);
                    container.appendChild(star);
                }
            });
        }

        function setRating(field, value) {
            document.getElementById(`rating-${field}`).value = value;
            const stars = document.querySelectorAll(`#stars-${field} .star`);
            stars.forEach((star, index) => {
                if (index < value) {
                    star.classList.add('active');
                } else {
                    star.classList.remove('active');
                }
            });
        }

        function toggleAfastamentoDetalhe() {
            const select = document.getElementById('afastamentoPratica');
            const group = document.getElementById('detalheAfastamentoGroup');
            const textarea = document.getElementById('detalheAfastamento');

            if (select.value === 'sim') {
                group.style.display = 'block';
                textarea.required = true;
            } else {
                group.style.display = 'none';
                textarea.required = false;
                textarea.value = '';
            }
        }

        async function submitAvaliacao(event) {
            event.preventDefault();
            const trainingId = document.getElementById('evalTrainingId').value;
            // Validação obrigatória de todas as estrelas
            const camposEstrelas = ['duracao', 'pedagogica', 'dominio', 'relevancia', 'global'];
            for (const campo of camposEstrelas) {
                if (!document.getElementById(`rating-${campo}`).value) {
                    showToast('Por favor classifique todos os critérios com estrelas antes de submeter.', 'error');
                    return;
                }
            }
            const afastaPratica = document.getElementById('afastamentoPratica').value === 'sim';

            try {
                await db.collection('evaluations').add({
                    trainingId: trainingId,
                    userId: currentUser.uid,
                    duracaoAcao: parseInt(document.getElementById('rating-duracao').value),
                    capacidadePedagogicaFormador: parseInt(document.getElementById('rating-pedagogica').value),
                    dominioTemaFormador: parseInt(document.getElementById('rating-dominio').value),
                    relevanciaParaTarefas: parseInt(document.getElementById('rating-relevancia').value),
                    avaliacaoGlobal: parseInt(document.getElementById('rating-global').value),
                    afastaDaPratica: afastaPratica,
                    detalheAfastamento: afastaPratica ? document.getElementById('detalheAfastamento').value : '',
                    observacoesPropostas: document.getElementById('observacoesPropostas').value,
                    dataSubmissao: firebase.firestore.FieldValue.serverTimestamp()
                });

                const enrollmentSnap = await db.collection('enrollments')
                    .where('trainingId', '==', trainingId)
                    .where('userId', '==', currentUser.uid)
                    .get();

                if (!enrollmentSnap.empty) {
                    await db.collection('enrollments').doc(enrollmentSnap.docs[0].id).update({
                        avaliado: true
                    });
                }

                showToast('Avaliação submetida com sucesso!', 'success');
                closeModal('avaliacaoModal');
                document.getElementById('avaliacaoForm').reset();
                carregarMinhasFormacoes();
            } catch (error) {
                console.error('Erro ao submeter avaliação:', error);
                showToast('Erro ao submeter avaliação', 'error');
            }
        }

        function loadManifestarNecessidade() {
            document.getElementById('pageTitle').textContent = 'Manifestar Necessidade de Formação';

            const content = `

        async function eliminarFormacao(trainingId) {
            if (!confirm('Tem certeza que deseja eliminar esta formação? Esta ação não pode ser revertida.')) {
                return;
            }

            try {
                const enrollmentsSnap = await db.collection('enrollments')
                    .where('trainingId', '==', trainingId)
                    .get();

                const batch = db.batch();
                enrollmentsSnap.forEach(doc => {
                    batch.delete(doc.ref);
                });

                const evaluationsSnap = await db.collection('evaluations')
                    .where('trainingId', '==', trainingId)
                    .get();

                evaluationsSnap.forEach(doc => {
                    batch.delete(doc.ref);
                });

                batch.delete(db.collection('trainings').doc(trainingId));
                await batch.commit();

                showToast('Formação eliminada com sucesso!', 'success');
                carregarTodasFormacoes();
            } catch (error) {
                console.error('Erro ao eliminar formação:', error);
                showToast('Erro ao eliminar formação', 'error');
            }
        }

        async function salvarParticipantes() {
            const trainingId = document.getElementById('participantesTrainingId').value;
            const checkboxes = document.querySelectorAll('#participantesContainer input[type="checkbox"]');

            try {
                const currentEnrollments = await db.collection('enrollments')
                    .where('trainingId', '==', trainingId)
                    .get();

                const batch = db.batch();
                currentEnrollments.forEach(doc => {
                    batch.delete(doc.ref);
                });

                checkboxes.forEach(cb => {
                    if (cb.checked) {
                        const newEnrollmentRef = db.collection('enrollments').doc();
                        batch.set(newEnrollmentRef, {
                            trainingId: trainingId,
                            userId: cb.value,
                            estadoInscricao: 'Convocado',
                            foiConvocadoPeloGestor: true,
                            validadoPeloGestor: true,
                            presencaConfirmadaPeloGestor: false,
                            avaliado: false,
                            createdAt: firebase.firestore.FieldValue.serverTimestamp()

                });

                await batch.commit();
                showToast('Participantes atualizados com sucesso!', 'success');
                closeModal('participantesModal');
                carregarTodasFormacoes();
            } catch (error) {
                console.error('Erro ao salvar participantes:', error);

        async function submitColaborador(event) {
            event.preventDefault();

            const colaboradorId = document.getElementById('colaboradorId').value;
            const nome = document.getElementById('colabNome').value.trim();
            const nomeCompleto = document.getElementById('colabNomeCompleto').value.trim();
            const codigoOperador = document.getElementById('colabCodigoOperador').value.trim();
            const nif = document.getElementById('colabNIF').value.trim();
            const cedula = document.getElementById('colabCedula').value.trim();
            const email = document.getElementById('colabEmail').value.trim();
            const funcao = document.getElementById('colabFuncao').value;
            const role = document.getElementById('colabRole').value;
            const ativo = document.getElementById('colabAtivo').value === 'true';

            if (!nome || !email) {
                showToast('Nome e email são obrigatórios', 'error');
                return;
            }

            try {
                let uid = colaboradorId;

                if (!colaboradorId) {
                    try {
                        const userCredential = await auth.createUserWithEmailAndPassword(email, 'Farmacia123!');
                        uid = userCredential.user.uid;
                    } catch (error) {
                        if (error.code === 'auth/email-already-in-use') {
                            const snap = await db.collection('users')
                                .where('email', '==', email)

                let csvNecessidades = 'Data,Colaborador,Tema,Urgência,Laboratório,Estado\n';

                downloadCSV(csvFormacoes, 'formacoes.csv');
                setTimeout(() => downloadCSV(csvColaboradores, 'colaboradores.csv'), 500);

            link.setAttribute('href', url);

            link.style.visibility = 'hidden';
            document.body.appendChild(link);
            link.click();
            document.body.removeChild(link);

<script>
(function(){
    const storage = firebase.storage();
    const PRO = {
        backupEmail: 'fligadebora@gmail.com',
        driveFolderUrl: 'https://drive.google.com/drive/folders/1iV8mAHgu1OGpXMdVwW18zjsnIB8HmtKB?usp=drive_link',
        civilYear: new Date().getFullYear()
    };

    let activeUnsubscribe = null;

    function stopLive(){ if (typeof activeUnsubscribe === 'function') { activeUnsubscribe(); activeUnsubscribe = null; } }
    function asDate(v){
        if (!v) return null;
        if (v.toDate) return v.toDate();
        if (typeof v === 'string') {
            const d = new Date(v);
            return isNaN(d) ? null : d;
        }
        if (v.seconds) return new Date(v.seconds * 1000);
        try { const d = new Date(v); return isNaN(d) ? null : d; } catch(e){ return null; }
    }
    function startOfDay(d){ const x = new Date(d); x.setHours(0,0,0,0); return x; }
    function endOfDay(d){ const x = new Date(d); x.setHours(23,59,59,999); return x; }
    function monthKey(d){ return new Intl.DateTimeFormat('pt-PT', { month:'long', year:'numeric' }).format(d); }
    function dateText(d){ return d ? new Intl.DateTimeFormat('pt-PT', { dateStyle:'medium', timeStyle:'short' }).format(d) : 'Sem data'; }
    function csvEscape(v){ return '"' + String(v ?? '').replaceAll('"', '""') + '"'; }
    function hoursLabelFromMinutes(min){ return (Number(min || 0) / 60).toFixed(2).replace('.', ',') + ' h'; }
    function normalizeDurationMinutes(training){
        if (training.durationMinutes != null) return Number(training.durationMinutes) || 0;
        if (training.duracaoMinutos != null) return Number(training.duracaoMinutos) || 0;
        if (training.duracao != null) {
            const n = Number(training.duracao);
            if (!isNaN(n)) return n > 24 ? n : Math.round(n * 60);
        }
        return 0;
    }
    function trainingTitle(t){ return t.tema || t.titulo || t.nome || 'Formação sem título'; }
    function trainingTrainer(t){ return t.formador || t.formadorNome || t.orador || '—'; }
    function trainingType(t){ return t.tipo || t.modalidade || '—'; }
    function trainingDate(t){ return asDate(t.data || t.date || t.dataFormacao || t.scheduledAt); }
    function participantIds(t){
        const arr = t.participantes || t.participants || t.inscritos || [];
        return (Array.isArray(arr) ? arr : []).map(p => {
            if (typeof p === 'string') return p;
            return p.userId || p.id || p.uid || null;
        }).filter(Boolean);
    }
    function isParticipant(t, userId){ return participantIds(t).includes(userId); }
    function resolvedStatus(t){
        const manual = (t.estadoManual || t.manualStatus || '').toLowerCase();
        if (manual) return manual;
        const estado = (t.estado || '').toLowerCase();
        if (['cancelada','adiada'].includes(estado)) return estado;
        const d = trainingDate(t);
        if (!d) return estado || 'agendada';
        return startOfDay(d) <= startOfDay(new Date()) ? 'realizada' : 'agendada';
    }
    function statusBadge(status){
        const map = {
            agendada: 'badge badge-info',
            realizada: 'badge badge-success',
            cancelada: 'badge badge-error',
            adiada: 'badge badge-warning'
        };
        return `<span class="${map[status] || 'badge badge-info'}">${status}</span>`;
    }
    function canEditEvaluation(evalDoc){
        if (!evalDoc || !evalDoc.firstSubmittedAt) return true;
        const first = asDate(evalDoc.firstSubmittedAt);
        if (!first) return true;
        return (Date.now() - first.getTime()) <= 24 * 60 * 60 * 1000;
    }
    async function getUsersMap(){
        const snap = await db.collection('users').get();
        const map = {};
        snap.forEach(doc => map[doc.id] = { id: doc.id, ...doc.data() });
        return map;
    }
    async function getAllTrainings(){
        const snap = await db.collection('trainings').get();
        return snap.docs.map(doc => ({ id: doc.id, ...doc.data() }));
    }
    async function getAttendanceMap(){
        const snap = await db.collection('attendance').get();
        const map = {};
        snap.forEach(doc => {
            const d = doc.data();
            map[`${d.trainingId}_${d.userId}`] = { id: doc.id, ...d };
        });
        return map;
    }
    async function getEvaluationsMap(){
        const snap = await db.collection('evaluations').get();
        const map = {};
        snap.forEach(doc => {
            const d = doc.data();
            if (d.trainingId && d.userId) map[`${d.trainingId}_${d.userId}`] = { id: doc.id, ...d };
        });
        return map;
    }
    function downloadCSV(filename, rows){
        const csv = rows.map(r => r.map(csvEscape).join(';')).join('\n');
        const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const a = document.createElement('a');
        a.href = url;
        a.download = filename;
        a.click();
        setTimeout(() => URL.revokeObjectURL(url), 1000);
    }
    function rangeFilter(date, start, end){
        if (!date) return false;
        if (start && date < startOfDay(start)) return false;
        if (end && date > endOfDay(end)) return false;
        return true;
    }
    async function ensureAutoStatus(){
        if (!currentUserData || currentUserData.role !== 'gestorformacao') return;
        const snap = await db.collection('trainings').get();
        const batch = db.batch();
        let count = 0;
        snap.forEach(doc => {
            const d = doc.data();
            const date = trainingDate(d);
            if (!date) return;
            const manual = (d.estadoManual || d.manualStatus || '').toLowerCase();
            const estado = (d.estado || '').toLowerCase();
            if (!manual && startOfDay(date) <= startOfDay(new Date()) && estado !== 'realizada' && estado !== 'cancelada' && estado !== 'adiada') {
                batch.set(doc.ref, { estado: 'realizada', autoStatusUpdatedAt: firebase.firestore.FieldValue.serverTimestamp() }, { merge: true });
                count++;
            }
        });
        if (count) await batch.commit();
    }
    async function setAttendance(trainingId, status){
        const existingAttDoc = await db.collection('attendance').doc(`${trainingId}_${currentUser.uid}`).get();
        if (existingAttDoc.exists) {
            const d = existingAttDoc.data();
            const confirmed = asDate(d.confirmedAt);
            if (confirmed && (Date.now() - confirmed.getTime()) > 24 * 60 * 60 * 1000) {
                return showToast('O prazo de 24h para alterar a presença já terminou.', 'error');
            }
        }
        const firstConfirm = (existingAttDoc.exists && existingAttDoc.data().confirmedAt)
            ? existingAttDoc.data().confirmedAt
            : firebase.firestore.FieldValue.serverTimestamp();
        const ref = db.collection('attendance').doc(`${trainingId}_${currentUser.uid}`);
        await ref.set({
            trainingId,
            userId: currentUser.uid,
            status,
            confirmedAt: firstConfirm,
            confirmedByUser: true
        }, { merge: true });
        showToast(status === 'present' ? 'Presença confirmada. Tem 24h para avaliar e alterar a presença.' : 'Falta registada.', 'success');
        loadMinhasFormacoes();
    }
    window.setAttendance = setAttendance;

    async function uploadProof(trainingId, file){
        if (!file) return null;
        const safeName = `${Date.now()}_${file.name.replace(/[^a-zA-Z0-9._-]/g,'_')}`;
        const path = `comprovativos/${currentUser.uid}/${trainingId}/${safeName}`;
        const ref = storage.ref().child(path);
        await ref.put(file, {
            customMetadata: {
                trainingId,
                userId: currentUser.uid,
                driveFolderUrl: PRO.driveFolderUrl
            }
        });
        const url = await ref.getDownloadURL();
        await db.collection('proofs').add({
            trainingId,
            userId: currentUser.uid,
            fileName: file.name,
            storagePath: path,
            downloadURL: url,
            driveFolderUrl: PRO.driveFolderUrl,
            createdAt: firebase.firestore.FieldValue.serverTimestamp()
        });
        return { url, path, fileName: file.name };
    }

    function injectProofField(){
        const form = document.getElementById('avaliacaoForm');
        if (!form || document.getElementById('proofUploadField')) return;
        const html = `
            <div class="form-group" id="proofUploadField">
                <label class="form-label">Comprovativo da formação (facultativo)</label>
                <div class="proof-upload-box">
                    <input type="file" id="comprovativoFile" class="form-control" accept="application/pdf,image/*" capture="environment">
                    <div class="small-text" style="margin-top:8px;">No telemóvel pode tirar fotografia; em desktop pode anexar PDF ou imagem. O ficheiro fica associado à formação.</div>
                </div>
            </div>`;
        form.insertAdjacentHTML('beforeend', html);
    }

    async function openEvaluationForTraining(trainingId){
        injectProofField();
        if (typeof initRatingStars === 'function') initRatingStars();
        document.getElementById('evalTrainingId').value = trainingId;
        const existingSnap = await db.collection('evaluations').where('trainingId','==',trainingId).where('userId','==',currentUser.uid).limit(1).get();
        if (!existingSnap.empty) {
            const ev = existingSnap.docs[0].data();
            ['duracao','pedagogica','dominio','relevancia','global'].forEach(key => {
                const map = {
                    duracao: ev.duracaoAcao,
                    pedagogica: ev.capacidadePedagogicaFormador,
                    dominio: ev.dominioTemaFormador,
                    relevancia: ev.relevanciaTarefasDesempenha,
                    global: ev.avaliacaoGlobal
                };
                const val = map[key] || '';
                const input = document.getElementById(`rating-${key}`);
                if (input) input.value = val;
                document.querySelectorAll(`#stars-${key} .star`).forEach((s, idx) => s.classList.toggle('active', idx < val));
            });
            document.getElementById('afastamentoPratica').value = ev.temasAfastamPraticaInstituida ? 'sim' : 'nao';
            document.getElementById('detalheAfastamento').value = ev.justificacaoAfastamentoPratica || '';
            document.getElementById('observacoesPropostas').value = ev.observacoesPropostasImplementacao || '';
            toggleAfastamentoDetalhe();
        } else {
            document.getElementById('avaliacaoForm').reset();
            document.getElementById('evalTrainingId').value = trainingId;
            ['duracao','pedagogica','dominio','relevancia','global'].forEach(key => {
                document.querySelectorAll(`#stars-${key} .star`).forEach(s => s.classList.remove('active'));
            });
        }
        document.getElementById('avaliacaoModal').classList.add('active');
    }
    window.openEvaluationForTraining = openEvaluationForTraining;

    window.submitAvaliacao = async function(event){
        event.preventDefault();
        const trainingId = document.getElementById('evalTrainingId').value;
        const trainingDoc = await db.collection('trainings').doc(trainingId).get();
        if (!trainingDoc.exists) return showToast('Formação não encontrada.', 'error');
        const training = { id: trainingDoc.id, ...trainingDoc.data() };
        if (!isParticipant(training, currentUser.uid)) return showToast('Só pode avaliar formações onde está inscrito.', 'error');
        if (resolvedStatus(training) !== 'realizada') return showToast('A avaliação só fica disponível após a formação ser realizada.', 'error');

        const attendanceDoc = await db.collection('attendance').doc(`${trainingId}_${currentUser.uid}`).get();
        const attendance = attendanceDoc.exists ? attendanceDoc.data() : null;
        if (!attendance || attendance.status !== 'present') return showToast('Só pode avaliar após confirmar presença.', 'error');

        const existingSnap = await db.collection('evaluations').where('trainingId','==',trainingId).where('userId','==',currentUser.uid).limit(1).get();
        const existing = existingSnap.empty ? null : { id: existingSnap.docs[0].id, ...existingSnap.docs[0].data() };
        if (existing && !canEditEvaluation(existing)) return showToast('O prazo de edição de 24h terminou.', 'error');

        const file = document.getElementById('comprovativoFile')?.files?.[0] || null;
        let proof = null;
        if (file) proof = await uploadProof(trainingId, file);

        const payload = {
            trainingId,
            userId: currentUser.uid,
            duracaoAcao: parseInt(document.getElementById('rating-duracao').value || 0),
            capacidadePedagogicaFormador: parseInt(document.getElementById('rating-pedagogica').value || 0),
            dominioTemaFormador: parseInt(document.getElementById('rating-dominio').value || 0),
            relevanciaTarefasDesempenha: parseInt(document.getElementById('rating-relevancia').value || 0),
            avaliacaoGlobal: parseInt(document.getElementById('rating-global').value || 0),
            temasAfastamPraticaInstituida: document.getElementById('afastamentoPratica').value === 'sim',
            justificacaoAfastamentoPratica: document.getElementById('detalheAfastamento').value || '',
            observacoesPropostasImplementacao: document.getElementById('observacoesPropostas').value || '',
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        if (proof) payload.proof = proof;
        if (!existing) payload.firstSubmittedAt = firebase.firestore.FieldValue.serverTimestamp();
        const ref = existing ? db.collection('evaluations').doc(existing.id) : db.collection('evaluations').doc(`${trainingId}_${currentUser.uid}`);
        await ref.set(payload, { merge: true });
        closeModal('avaliacaoModal');
        showToast(existing ? 'Avaliação atualizada.' : 'Avaliação registada.', 'success');
        loadMinhasFormacoes();
    };

    window.showDashboard = function(){
        document.getElementById('loginPage').classList.remove('active');
        document.getElementById('dashboardPage').classList.add('active');
        buildMenu();
        const isGestor = currentUserData && currentUserData.role === 'gestorformacao';
        if (isGestor && typeof ensureAutoStatus === 'function') ensureAutoStatus().catch(()=>{});
        navigateTo(isGestor ? 'dashboardGestao' : 'minhasFormacoes');

    window.navigateTo = function(pageId, el){
        stopLive();
        document.querySelectorAll('.menu-item').forEach(item => item.classList.remove('active'));
        if (el) el.classList.add('active');
        else document.querySelector(`.menu-item[data-page="${pageId}"]`)?.classList.add('active');
        const isGestor = currentUserData && currentUserData.role === 'gestorformacao';
        switch(pageId){
            case 'dashboardGestao': if (isGestor) loadDashboardGestao(); break;
            case 'todasFormacoes': if (isGestor) loadTodasFormacoes(); break;
            case 'criarFormacao': if (isGestor) loadCriarFormacao(); break;
            case 'colaboradores': if (isGestor && window.loadColaboradores) window.loadColaboradores(); break;
            case 'necessidadesFormacao': if (isGestor && window.loadNecessidadesGestor) window.loadNecessidadesGestor(); break;
            case 'relatorios': if (isGestor) loadRelatorios(); break;
            case 'formacoesMes': if (isGestor) loadFormacoesMes(); break;
            case 'objetivosPlano': if (isGestor) loadObjetivosPlano(); break;
            case 'meusCreditos': loadMeusCreditos(); break;
            case 'manifestarNecessidade': if (window.loadManifestarNecessidade) window.loadManifestarNecessidade(); break;
            case 'historicoAvaliacoes': if (window.loadHistoricoAvaliacoes) window.loadHistoricoAvaliacoes(); break;
            default: loadMinhasFormacoes();
        }
    };

        const render = async () => {
            const [usersMap, trainings, attendanceMap, evalMap] = await Promise.all([getUsersMap(), getAllTrainings(), getAttendanceMap(), getEvaluationsMap()]);
            const year = new Date().getFullYear();
            const realized = trainings.filter(t => resolvedStatus(t) === 'realizada');
            const trainingsYear = trainings.filter(t => trainingDate(t)?.getFullYear() === year);

            const hoursByUser = {};
            Object.values(usersMap).forEach(u => hoursByUser[u.id] = 0);
            const pendingRows = [];
            realized.forEach(t => {
                const dt = trainingDate(t);
                const mins = normalizeDurationMinutes(t);
                participantIds(t).forEach(uid => {
                    const att = attendanceMap[`${t.id}_${uid}`];
                    const ev = evalMap[`${t.id}_${uid}`];
                    if (att?.status === 'present') {
                        if (dt && dt.getFullYear() === year) hoursByUser[uid] = (hoursByUser[uid] || 0) + mins;

                .map(([uid, mins]) => ({ uid, mins, nome: usersMap[uid]?.nome || uid }))
                .filter(x => usersMap[x.uid]?.ativo !== false)
                .sort((a,b) => b.mins - a.mins || a.nome.localeCompare(b.nome, 'pt'));
            const rankList = document.getElementById('hoursByUserList');
            rankList.innerHTML = ranked.map(r => `<div class="rank-item"><span>${r.nome}</span><strong>${hoursLabelFromMinutes(r.mins)}</strong></div>`).join('') || `<div class="small-text">Sem horas registadas.</div>`;

        await render();
        activeUnsubscribe = db.collection('trainings').onSnapshot(render);
    };

    window.loadMinhasFormacoes = async function(){
        document.getElementById('pageTitle').textContent = 'As Minhas Formações';
        document.getElementById('contentArea').innerHTML = `
            <div class="stats-grid">
                <div class="stat-card blue"><div class="stat-label">Formações Futuras</div><div class="stat-value" id="statFuturas">-</div></div>
                <div class="stat-card green"><div class="stat-label">Horas frequentadas</div><div class="stat-value" id="statHoras">-</div></div>
                <div class="stat-card warning"><div class="stat-label">Por avaliar</div><div class="stat-value" id="statAvaliar">-</div></div>
            </div>
            <div class="card"><div class="card-header"><h2 class="card-title">Formações organizadas por mês</h2></div><div id="minhasFormacoesContainer"></div></div>`;

        const render = async () => {
            const [trainings, attendanceMap, evalMap] = await Promise.all([getAllTrainings(), getAttendanceMap(), getEvaluationsMap()]);
            const my = trainings.filter(t => isParticipant(t, currentUser.uid)).sort((a,b) => (trainingDate(b)?.getTime()||0) - (trainingDate(a)?.getTime()||0));
            const grouped = {};
            let futuras = 0, avaliar = 0, minutes = 0;
            my.forEach(t => {
                const dt = trainingDate(t) || new Date();
                const key = monthKey(dt);
                grouped[key] ||= [];
                const att = attendanceMap[`${t.id}_${currentUser.uid}`];
                const ev = evalMap[`${t.id}_${currentUser.uid}`];
                const status = resolvedStatus(t);
                if (status === 'agendada') futuras++;
                if (att?.status === 'present') minutes += normalizeDurationMinutes(t);
                if (status === 'realizada' && att?.status === 'present' && !ev) avaliar++;
                grouped[key].push({ t, dt, att, ev, status });
            });
            document.getElementById('statFuturas').textContent = futuras;
            document.getElementById('statHoras').textContent = hoursLabelFromMinutes(minutes);
            document.getElementById('statAvaliar').textContent = avaliar;

            const container = document.getElementById('minhasFormacoesContainer');
            const html = Object.entries(grouped).map(([month, rows]) => `
                <div class="month-group">
                    <div class="month-title">${month}</div>
                    ${rows.map(({ t, dt, att, ev, status }) => {
                        const canEvaluate = status === 'realizada' && att?.status === 'present';
                        const canEditEval = ev && canEditEvaluation(ev);
                        return `
                            <div class="training-card ${status==='realizada'?'completed':'pending'}">
                                <div class="training-header">
                                    <div>
                                        <div class="training-title">${trainingTitle(t)}</div>
                                        <div class="training-meta">
                                            <div class="training-meta-item">📅 ${dateText(dt)}</div>
                                            <div class="training-meta-item">⏱️ ${normalizeDurationMinutes(t)} min (${hoursLabelFromMinutes(normalizeDurationMinutes(t))})</div>
                                            <div class="training-meta-item">🎓 ${trainingTrainer(t)}</div>
                                        </div>
                                    </div>
                                    <div>${statusBadge(status)}</div>
                                </div>
                                <div class="kpi-row">
                                    <span class="kpi-pill">Presença: ${att?.status === 'present' ? 'Confirmada' : att?.status === 'absent' ? 'Não compareceu' : 'Pendente'}</span>
                                    <span class="kpi-pill">Avaliação: ${ev ? 'Submetida' : 'Por fazer'}</span>
                                </div>
                                <div class="actions-row">
                                    ${status === 'realizada' && att?.status !== 'absent' && att?.status !== 'present' ? `<button class="btn btn-danger" onclick="setAttendance('${t.id}','absent')" style="font-size:13px;">✗ Não compareci</button>` : ''}
                                    ${att?.status === 'absent' ? `<span class="badge badge-error">✗ Não compareceu</span>` : ''}
                                    ${att?.status === 'present' ? `<span class="badge badge-success">✓ Presença confirmada pelo gestor</span>` : ''}
                                    ${canEvaluate ? `<button class="btn btn-primary" onclick="openEvaluationForTraining('${t.id}')">${ev ? 'Editar Avaliação' : 'Avaliar Formação'}</button>` : ''}
                                    ${ev && !canEditEval ? `<span class="small-text">Janela de edição da avaliação encerrada.</span>` : ''}
                                    <label class="btn btn-secondary" style="cursor:pointer;">📎 Carregar comprovativo<input type="file" style="display:none" accept="application/pdf,image/*" capture="environment" onchange="window.quickProofUpload('${t.id}', this)"></label>
                                </div>
                            </div>`;
                    }).join('')}
                </div>`).join('');
            container.innerHTML = html || `<div class="empty-state"><div class="empty-state-icon">📖</div><div class="empty-state-text">Ainda não está inscrito em formações.</div></div>`;
        };
        window.quickProofUpload = async function(trainingId, input){
            const file = input.files?.[0];
            if (!file) return;
            await uploadProof(trainingId, file);
            showToast('Comprovativo carregado com sucesso.', 'success');
        };
        await render();
        activeUnsubscribe = db.collection('trainings').onSnapshot(render);
    };

    window.exportCollaboratorHours = async function(){
        const { start, end, usersMap, trainings, attendanceMap } = await reportDataset();
        const rows = [['Colaborador','Email','Função','Horas frequentadas','Minutos frequentados','Formações frequentadas']];
        Object.values(usersMap).filter(u => u.ativo !== false).sort((a,b)=>(a.nome||'').localeCompare(b.nome||'', 'pt')).forEach(u => {
            let mins = 0, count = 0;
            trainings.forEach(t => {
                const dt = trainingDate(t);
                if (!rangeFilter(dt, start, end)) return;
                const att = attendanceMap[`${t.id}_${u.id}`];
                if (att?.status === 'present') {
                    mins += normalizeDurationMinutes(t);
                    count++;
                }
            });
            rows.push([u.nome || '', u.email || '', u.funcao || '', (mins/60).toFixed(2), String(mins), String(count)]);

    window.gravarPresencas = async function(trainingId, creditosOF) {
        const checks = document.querySelectorAll('[id^="pres-"]');
        const batch = db.batch();
        const usersMap = await getUsersMap();
        for (const cb of checks) {
            const uid = cb.value;
            const ref = db.collection('attendance').doc(`${trainingId}_${uid}`);
            if (cb.checked) {
                batch.set(ref, { trainingId, userId: uid, status: 'present', confirmedAt: firebase.firestore.FieldValue.serverTimestamp(), confirmedByGestor: true }, { merge: true });
                // Atribuir créditos OF a Farmacêuticos
                if (creditosOF > 0 && usersMap[uid]?.funcao === 'Farmacêutico') {
                    const tDoc = await db.collection('trainings').doc(trainingId).get();
                    const existing = await db.collection('creditosOF').where('trainingId','==',trainingId).where('userId','==',uid).get();
                    if (existing.empty) {
                        const cRef = db.collection('creditosOF').doc();
                        batch.set(cRef, { userId: uid, trainingId, tema: tDoc.data()?.tema||'', entidadeFormadora: tDoc.data()?.entidadeFormadora||'', creditos: creditosOF, data: tDoc.data()?.data||null, atribuidoEm: firebase.firestore.FieldValue.serverTimestamp() });
                    }
                }
            } else {
                batch.set(ref, { trainingId, userId: uid, status: 'absent', confirmedAt: firebase.firestore.FieldValue.serverTimestamp(), confirmedByGestor: true }, { merge: true });
            }
        }
        await batch.commit();
        showToast('Presenças confirmadas com sucesso!','success');
        navigateTo('todasFormacoes');
    };

            for (const doc of snap.docs) {
                const t = doc.data();
                let dt = t.data ? (t.data.toDate ? t.data.toDate() : new Date(t.data.seconds*1000)) : null;

                if (dataFim && dt && dt > new Date(dataFim+'T23:59:59')) continue;
                if (entidade && !(t.entidadeFormadora||'').toLowerCase().includes(entidade)) continue;
