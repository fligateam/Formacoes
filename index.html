// ═══════════════════════════════════════════════════
// UTILIDADES
// ═══════════════════════════════════════════════════
function asDate(v){
    if(!v)return null;
    if(v.toDate)return v.toDate();
    if(v.seconds)return new Date(v.seconds*1000);
    if(typeof v==='string'){const d=new Date(v);return isNaN(d)?null:d;}
    try{const d=new Date(v);return isNaN(d)?null:d;}catch(e){return null;}
}
const startOfDay=d=>{const x=new Date(d);x.setHours(0,0,0,0);return x;};
const endOfDay=d=>{const x=new Date(d);x.setHours(23,59,59,999);return x;};
const monthKey=d=>new Intl.DateTimeFormat('pt-PT',{month:'long',year:'numeric'}).format(d);
const monthKeySort=d=>`${d.getFullYear()}-${String(d.getMonth()+1).padStart(2,'0')}`;
const dateText=d=>d?new Intl.DateTimeFormat('pt-PT',{dateStyle:'medium',timeStyle:'short'}).format(d):'Sem data';
const dateShort=d=>d?new Intl.DateTimeFormat('pt-PT',{dateStyle:'short'}).format(d):'-';
const hoursLabel=min=>(Number(min||0)/60).toFixed(2).replace('.',',')+' h';

function normDuration(t){
    if(t.durationMinutes!=null)return Number(t.durationMinutes)||0;
    if(t.duracaoMinutos!=null)return Number(t.duracaoMinutos)||0;
    if(t.duracaoHoras!=null)return Math.round(Number(t.duracaoHoras)*60);
    if(t.duracao!=null){const n=Number(t.duracao);return!isNaN(n)?(n>24?n:Math.round(n*60)):0;}
    return 0;
}
const trainingTitle=t=>t.tema||t.titulo||t.nome||'Formação sem título';
const trainingTrainer=t=>t.formador||t.formadorNome||'—';
const trainingDate=t=>asDate(t.data||t.date||t.dataFormacao||t.scheduledAt);
function participantIds(t){
    const arr=t.participantes||t.participants||t.inscritos||[];
    return(Array.isArray(arr)?arr:[]).map(p=>typeof p==='string'?p:(p.userId||p.id||null)).filter(Boolean);
}
function resolvedStatus(t){
    const manual=(t.estadoManual||t.manualStatus||'').toLowerCase();
    if(['cancelada','adiada'].includes(manual))return manual;
    const estado=(t.estado||'').toLowerCase();
    if(['cancelada','adiada'].includes(estado))return estado;
    if(manual==='realizada'||estado==='realizada'||estado==='concluida')return'realizada';
    return'agendada';
}
function statusBadge(s){
    const cls={agendada:'badge-info',realizada:'badge-success',cancelada:'badge-error',adiada:'badge-warning'};
    const lbl={agendada:'Agendada',realizada:'Realizada',cancelada:'Cancelada',adiada:'Adiada'};
    return`<span class="badge ${cls[s]||'badge-info'}">${lbl[s]||s}</span>`;
}
function stopLive(){if(typeof activeUnsubscribe==='function'){activeUnsubscribe();activeUnsubscribe=null;}}
function rangeFilter(date,start,end){
    if(!date)return false;
    if(start&&date<startOfDay(start))return false;
    if(end&&date>endOfDay(end))return false;
    return true;
}
function canEditEvaluation(ev){
    if(!ev||!ev.firstSubmittedAt)return true;
    const f=asDate(ev.firstSubmittedAt);
    return!f||(Date.now()-f.getTime())<=86400000;
}

async function getUsersMap(){
    const snap=await db.collection('users').get();
    const map={};
    snap.forEach(doc=>map[doc.id]={id:doc.id,...doc.data()});
    return map;
}
async function getAllTrainings(){
    const snap=await db.collection('trainings').get();
    return snap.docs.map(doc=>({id:doc.id,...doc.data()}));
}
async function getAttendanceMap(){
    const snap=await db.collection('attendance').get();
    const map={};
    snap.forEach(doc=>{const d=doc.data();map[`${d.trainingId}_${d.userId}`]={id:doc.id,...d};});
    return map;
}
async function getEvaluationsMap(){
    const snap=await db.collection('evaluations').get();
    const map={};
    snap.forEach(doc=>{const d=doc.data();if(d.trainingId&&d.userId)map[`${d.trainingId}_${d.userId}`]={id:doc.id,...d};});
    return map;
}

    if(!currentUserData){
        const seed={
            "fligadebora@hotmail.com":{nome:"Débora",funcao:"Gestão",role:"gestorformacao"},
            "fligamarta@hotmail.com":{nome:"Marta",funcao:"Gestão",role:"gestorformacao"},
            "farmacia@ligagaia.pt":{nome:"Dra Rita Sá",funcao:"Gestão",role:"gestorformacao"}
        }[user.email?.toLowerCase()];
        if(seed){
            await db.collection('users').doc(user.uid).set({...seed,email:user.email,ativo:true,createdAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});
            await loadUserData(user.uid);
        }

async function loadUserData(uid){
    try{
        const doc=await db.collection('users').doc(uid).get();
        if(doc.exists){currentUserData={id:uid,...doc.data()};updateUI();}
    }catch(e){console.error(e);}
}

document.getElementById('loginForm').addEventListener('submit',async e=>{
    e.preventDefault();
    const err=document.getElementById('loginError');
    err.style.display='none';
    try{
        await auth.signInWithEmailAndPassword(document.getElementById('email').value,document.getElementById('password').value);
    }catch(error){
        err.style.display='block';

function showLoginPage(){
    document.getElementById('loginPage').classList.add('active');

}
function updateUI(){
    if(!currentUserData)return;
    document.getElementById('userName').textContent=currentUserData.nome||'Utilizador';
    document.getElementById('userRole').textContent=currentUserData.role==='gestorformacao'?'Gestor de Formação':'Colaborador';
    document.getElementById('userAvatar').textContent=(currentUserData.nome||'U').split(' ').map(n=>n[0]).join('').substring(0,2).toUpperCase();
}
function showDashboard(){
    document.getElementById('loginPage').classList.remove('active');
    document.getElementById('dashboardPage').classList.add('active');
    buildMenu();
    const isG=currentUserData?.role==='gestorformacao';
    if(isG)ensureAutoStatus().catch(()=>{});
    navigateTo(isG?'dashboardGestao':'minhasFormacoes');
}

async function ensureAutoStatus(){
    if(currentUserData?.role!=='gestorformacao')return;
    const snap=await db.collection('trainings').get();
    const batch=db.batch();let c=0;
    snap.forEach(doc=>{
        const d=doc.data();const date=trainingDate(d);if(!date)return;
        const manual=(d.estadoManual||d.manualStatus||'').toLowerCase();
        const estado=(d.estado||'').toLowerCase();
        if(!manual&&startOfDay(date)<startOfDay(new Date())&&!['realizada','cancelada','adiada'].includes(estado)){
            batch.set(doc.ref,{estado:'realizada',autoStatusUpdatedAt:firebase.firestore.FieldValue.serverTimestamp()},{merge:true});c++;
        }
    });
    if(c)await batch.commit();
}

        ['mapaFormacoes','Mapa de Formações','🗺️'],

        ['necessidadesFormacao','Necessidades de Formação','📝'],
        ['relatorios','Relatórios e Exportação','📊'],
        ['objetivosPlano','Objetivos do Plano','🎯'],
        ['sep','Área Pessoal',''],
        ['minhasFormacoes','As Minhas Formações','📖'],
        ['manifestarNecessidade','Necessidade de Formação','✍️'],
        ['historicoAvaliacoes','Histórico de Avaliações','⭐']
    ]:[
        ['minhasFormacoes','As Minhas Formações','📖'],
        ['manifestarNecessidade','Necessidade de Formação','✍️'],
        ['historicoAvaliacoes','Histórico de Avaliações','⭐'],
        ...(currentUserData?.funcao==='Farmacêutico'?[['meusCreditos','Os Meus Créditos OF','🏅']]:[])
    ];
    menu.innerHTML=items.map(([id,label,icon])=>id==='sep'
        ?`<div style="padding:8px 20px;margin:8px 0;border-bottom:1px solid var(--color-border);"><small style="color:var(--color-text-secondary);font-size:11px;font-weight:600;text-transform:uppercase;">${label}</small></div>`
        :`<div class="menu-item" data-page="${id}" onclick="navigateTo('${id}',this)">${icon} ${label}</div>`
    ).join('');
}

function navigateTo(pageId,el){
    stopLive();closeSidebar();
    document.querySelectorAll('.menu-item').forEach(i=>i.classList.remove('active'));
    if(el)el.classList.add('active');
    else document.querySelector(`.menu-item[data-page="${pageId}"]`)?.classList.add('active');
    const isG=currentUserData?.role==='gestorformacao';
    const p={
        dashboardGestao:()=>isG&&loadDashboardGestao(),
        todasFormacoes:()=>isG&&loadTodasFormacoes(),
        mapaFormacoes:()=>isG&&loadMapaFormacoes(),
        criarFormacao:()=>isG&&loadCriarFormacao(),
        colaboradores:()=>isG&&loadColaboradores(),
        necessidadesFormacao:()=>isG&&loadNecessidadesGestor(),
        relatorios:()=>isG&&loadRelatorios(),
        objetivosPlano:()=>isG&&loadObjetivosPlano(),
        meusCreditos:()=>loadMeusCreditos(),
        manifestarNecessidade:()=>loadManifestarNecessidade(),
        historicoAvaliacoes:()=>loadHistoricoAvaliacoes(),
        minhasFormacoes:()=>loadMinhasFormacoes()
    };
    (p[pageId]||p.minhasFormacoes)();
}

async function loadDashboardGestao(){
    document.getElementById('pageTitle').textContent='Dashboard';
    document.getElementById('contentArea').innerHTML=`
        <div style="background:linear-gradient(135deg,var(--color-accent-blue),var(--color-accent-green));border-radius:12px;padding:20px 24px;margin-bottom:20px;display:flex;justify-content:space-between;align-items:center;box-shadow:var(--shadow-md);flex-wrap:wrap;gap:12px;">
            <div><h3 style="font-size:18px;font-weight:700;">📋 Plano de Formações Anual</h3><p style="color:var(--color-text-secondary);font-size:13px;margin-top:4px;">Visualize, imprima e exporte o plano completo</p></div>
            <div style="display:flex;gap:8px;flex-wrap:wrap;">
                <button class="btn btn-primary" onclick="verPlanoFormacoes()">🖨️ Ver Plano</button>
                <button class="btn btn-excel" onclick="exportarPlanoExcel()">📊 Exportar Excel</button>
            </div>
        </div>
        <div class="stats-grid">
            <div class="stat-card blue"><div class="stat-label">Formações este ano</div><div class="stat-value" id="kpiAno">-</div></div>
            <div class="stat-card green"><div class="stat-label">Horas frequentadas</div><div class="stat-value" id="kpiHoras">-</div></div>
            <div class="stat-card warning"><div class="stat-label">Avaliações pendentes</div><div class="stat-value" id="kpiPend">-</div></div>
            <div class="stat-card"><div class="stat-label">Colaboradores ativos</div><div class="stat-value" id="kpiColab">-</div></div>
        </div>
        <div class="dashboard-split">
            <div class="card"><div class="card-header"><h2 class="card-title">Por avaliar (com presença)</h2></div><div id="pendingList" class="alert-list"></div></div>
            <div class="card"><div class="card-header"><h2 class="card-title">Horas por colaborador (ano)</h2></div><div id="rankList" class="rank-list"></div></div>
        </div>`;
    await ensureAutoStatus();
    const render=async()=>{
        const[usersMap,trainings,attMap,evalMap]=await Promise.all([getUsersMap(),getAllTrainings(),getAttendanceMap(),getEvaluationsMap()]);
        const year=new Date().getFullYear();
        const realized=trainings.filter(t=>resolvedStatus(t)==='realizada');
        const hoursByUser={};
        Object.values(usersMap).forEach(u=>hoursByUser[u.id]=0);
        const pending=[];
        realized.forEach(t=>{
            const dt=trainingDate(t);const mins=normDuration(t);
            participantIds(t).forEach(uid=>{
                const att=attMap[`${t.id}_${uid}`];const ev=evalMap[`${t.id}_${uid}`];
                if(att?.status==='present'){
                    if(dt?.getFullYear()===year)hoursByUser[uid]=(hoursByUser[uid]||0)+mins;
                    if(!ev)pending.push({uid,training:trainingTitle(t),date:dt});
                }
            });
        });
        const el=id=>document.getElementById(id);
        if(el('kpiAno'))el('kpiAno').textContent=trainings.filter(t=>trainingDate(t)?.getFullYear()===year).length;
        if(el('kpiHoras'))el('kpiHoras').textContent=hoursLabel(Object.values(hoursByUser).reduce((a,b)=>a+b,0));
        if(el('kpiPend'))el('kpiPend').textContent=pending.length;
        if(el('kpiColab'))el('kpiColab').textContent=Object.values(usersMap).filter(u=>u.ativo!==false).length;
        const pList=el('pendingList');
        if(pList)pList.innerHTML=pending.length
            ?pending.sort((a,b)=>(a.date?.getTime()||0)-(b.date?.getTime()||0)).map(r=>`<div class="alert-item"><strong>${usersMap[r.uid]?.nome||'Colaborador'}</strong><div class="small-text">${r.training} · ${dateText(r.date)}</div></div>`).join('')
            :`<div class="empty-state" style="padding:20px;"><div class="empty-state-icon" style="font-size:32px;">✅</div><div class="empty-state-text" style="font-size:14px;">Sem avaliações pendentes</div></div>`;
        const rList=el('rankList');
        if(rList)rList.innerHTML=Object.entries(hoursByUser).map(([uid,mins])=>({uid,mins,nome:usersMap[uid]?.nome||uid})).filter(x=>usersMap[x.uid]?.ativo!==false).sort((a,b)=>b.mins-a.mins).map(r=>`<div class="rank-item"><span>${r.nome}</span><strong>${hoursLabel(r.mins)}</strong></div>`).join('')||'<div class="small-text">Sem horas registadas.</div>';
    };
    await render();
    activeUnsubscribe=db.collection('trainings').onSnapshot(()=>render());
}

async function loadMapaFormacoes(){
    document.getElementById('pageTitle').textContent='Mapa de Formações';
    const year=new Date().getFullYear();
    document.getElementById('contentArea').innerHTML=`
        <div class="card" style="margin-bottom:16px;">
            <div class="card-header">
                <h2 class="card-title">🗺️ Mapa de Formações</h2>
                <div style="display:flex;gap:8px;flex-wrap:wrap;">
                    <select id="mapaAno" class="form-control" style="width:110px;" onchange="renderMapa()">
                        ${[year-1,year,year+1].map(y=>`<option value="${y}" ${y===year?'selected':''}>${y}</option>`).join('')}
                    </select>
                    <select id="mapaEstado" class="form-control" style="width:150px;" onchange="renderMapa()">
                        <option value="">Todos os estados</option>
                        <option value="agendada">Agendada</option>
                        <option value="realizada">Realizada</option>
                        <option value="cancelada">Cancelada</option>
                        <option value="adiada">Adiada</option>
                    </select>
                    <button class="btn btn-excel" onclick="exportarMapaExcel()">📊 Excel</button>
                    <button class="btn btn-primary" onclick="verPlanoFormacoes()">🖨️ Imprimir</button>
                </div>
            </div>
        </div>
        <div id="mapaContainer"><div class="loading active"><div class="spinner"></div><p>A gerar mapa...</p></div></div>`;
    window._mapaTrainings=await getAllTrainings();
    window._mapaUsersMap=await getUsersMap();
    renderMapa();
}

function renderMapa(){
    const ano=parseInt(document.getElementById('mapaAno')?.value||new Date().getFullYear());
    const estadoF=document.getElementById('mapaEstado')?.value||'';
    const trainings=window._mapaTrainings||[];
    const filtered=trainings.filter(t=>{
        const dt=trainingDate(t);
        if(!dt||dt.getFullYear()!==ano)return false;
        if(estadoF&&resolvedStatus(t)!==estadoF)return false;
        return true;
    });
    const byMonth={};
    for(let m=0;m<12;m++){
        const key=`${ano}-${String(m+1).padStart(2,'0')}`;
        byMonth[key]={label:new Date(ano,m,1).toLocaleString('pt-PT',{month:'long'}),month:m,trainings:[]};
    }
    filtered.forEach(t=>{
        const dt=trainingDate(t);
        const key=`${ano}-${String(dt.getMonth()+1).padStart(2,'0')}`;
        if(byMonth[key])byMonth[key].trainings.push(t);
    });
    const totF=filtered.length;
    const totH=filtered.reduce((s,t)=>s+normDuration(t),0);
    const real=filtered.filter(t=>resolvedStatus(t)==='realizada').length;
    const agend=filtered.filter(t=>resolvedStatus(t)==='agendada').length;
    const curKey=`${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}`;
    const container=document.getElementById('mapaContainer');
    container.innerHTML=`
        <div class="stats-grid" style="margin-bottom:20px;">
            <div class="stat-card blue"><div class="stat-label">Total ${ano}</div><div class="stat-value">${totF}</div></div>
            <div class="stat-card green"><div class="stat-label">Realizadas</div><div class="stat-value">${real}</div></div>
            <div class="stat-card warning"><div class="stat-label">Agendadas</div><div class="stat-value">${agend}</div></div>
            <div class="stat-card"><div class="stat-label">Horas totais</div><div class="stat-value" style="font-size:22px;">${hoursLabel(totH)}</div></div>
        </div>
        <div class="mapa-grid">
            ${Object.entries(byMonth).map(([key,val])=>{
                const isCur=key===curKey;
                const cnt=val.trainings.length;
                const statusColors={realizada:'#7BC97F',agendada:'#64B5F6',cancelada:'#E57373',adiada:'#FFB84D'};
                return`<div class="mapa-month-card" style="${isCur?'box-shadow:0 0 0 3px var(--color-info),var(--shadow-md);':''}">
                    <div class="mapa-month-header" style="${isCur?'background:linear-gradient(135deg,#3a8fc4,#4a9c4e);':''}">
                        <h3>${val.label.charAt(0).toUpperCase()+val.label.slice(1)}</h3>
                        <span style="background:rgba(255,255,255,0.2);padding:2px 10px;border-radius:20px;font-size:13px;font-weight:700;">${cnt}</span>
                    </div>
                    ${cnt===0?`<div class="mapa-empty">Sem formações</div>`:
                    val.trainings.sort((a,b)=>(trainingDate(a)?.getTime()||0)-(trainingDate(b)?.getTime()||0)).map(t=>{
                        const dt=trainingDate(t);const status=resolvedStatus(t);
                        return`<div class="mapa-training-item" onclick="abrirDetalheGestor('${t.id}')">
                            <div style="width:4px;height:36px;border-radius:2px;background:${statusColors[status]||'#ccc'};flex-shrink:0;"></div>
                            <div class="mapa-training-info">
                                <div class="mapa-training-name">${trainingTitle(t)}</div>
                                <div class="mapa-training-sub">${dt?dt.getDate()+'/'+(dt.getMonth()+1):'?'} · ${normDuration(t)>=60?Math.floor(normDuration(t)/60)+'h':normDuration(t)+'min'} · ${trainingTrainer(t)}</div>
                            </div>
                            ${statusBadge(status)}
                        </div>`;
                    }).join('')}
                </div>`;
            }).join('')}
        </div>`;
}

async function abrirDetalheGestor(trainingId){
    const doc=await db.collection('trainings').doc(trainingId).get();
    if(!doc.exists)return;
    const t={id:doc.id,...doc.data()};
    const dt=trainingDate(t);const status=resolvedStatus(t);
    const mins=normDuration(t);
    const hLabel=mins>=60?Math.floor(mins/60)+'h'+(mins%60?String(mins%60).padStart(2,'0')+'min':''):mins+'min';
    const ids=participantIds(t);
    const usersMap=await getUsersMap();
    document.getElementById('detalheModalTitulo').textContent=trainingTitle(t);
    document.getElementById('detalheModalBody').innerHTML=`
        <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;">
            <div><div class="small-text" style="text-transform:uppercase;font-weight:600;margin-bottom:3px;">Data</div><div style="font-weight:600;">${dt?dt.toLocaleDateString('pt-PT',{weekday:'long',day:'numeric',month:'long',year:'numeric'}):'-'}</div></div>
            <div><div class="small-text" style="text-transform:uppercase;font-weight:600;margin-bottom:3px;">Duração</div><div style="font-weight:600;">${hLabel}</div></div>
            <div><div class="small-text" style="text-transform:uppercase;font-weight:600;margin-bottom:3px;">Formador</div><div style="font-weight:600;">${t.formador||'-'}</div></div>

async function loadTodasFormacoes(){
    document.getElementById('pageTitle').textContent='Gestão de Formações';
    document.getElementById('contentArea').innerHTML=`
        <div class="card">
            <div class="card-header">
                <h2 class="card-title">Todas as Formações</h2>
                <button class="btn btn-primary" onclick="loadCriarFormacao()">➕ Nova Formação</button>
            </div>
            <div style="display:flex;gap:12px;margin-bottom:16px;flex-wrap:wrap;">
                <select id="filtroEstado" class="form-control" style="width:160px;" onchange="renderTodasFormacoes()">
                    <option value="">Todos os estados</option>
                    <option value="agendada">Agendada</option>
                    <option value="realizada">Realizada</option>
                    <option value="cancelada">Cancelada</option>
                    <option value="adiada">Adiada</option>
                </select>
                <input type="text" id="filtroTexto" class="form-control" style="max-width:280px;" placeholder="Pesquisar tema ou formador..." oninput="renderTodasFormacoes()">
            </div>
            <div id="todasFormacoesContainer"><div class="loading active"><div class="spinner"></div><p>A carregar...</p></div></div>
        </div>`;
    await ensureAutoStatus();
    window._allTrainings=await getAllTrainings();
    window._allUsersMap=await getUsersMap();
    window._allAttMap=await getAttendanceMap();
    renderTodasFormacoes();
    activeUnsubscribe=db.collection('trainings').onSnapshot(async()=>{
        window._allTrainings=await getAllTrainings();
        window._allAttMap=await getAttendanceMap();
        renderTodasFormacoes();
    });
}

function renderTodasFormacoes(){
    const trainings=window._allTrainings||[];
    const attMap=window._allAttMap||{};
    const usersMap=window._allUsersMap||{};
    const fe=document.getElementById('filtroEstado')?.value||'';
    const ft=(document.getElementById('filtroTexto')?.value||'').toLowerCase();
    const container=document.getElementById('todasFormacoesContainer');
    if(!container)return;
    let list=trainings.filter(t=>{
        if(fe&&resolvedStatus(t)!==fe)return false;
        if(ft&&!trainingTitle(t).toLowerCase().includes(ft)&&!(t.formador||'').toLowerCase().includes(ft))return false;
        return true;
    }).sort((a,b)=>(trainingDate(b)?.getTime()||0)-(trainingDate(a)?.getTime()||0));
    if(!list.length){container.innerHTML=`<div class="empty-state"><div class="empty-state-icon">📚</div><p class="empty-state-text">Nenhuma formação encontrada</p><button class="btn btn-primary" onclick="loadCriarFormacao()">Criar Formação</button></div>`;return;}
    container.innerHTML=list.map(t=>{
        const dt=trainingDate(t);const status=resolvedStatus(t);
        const ids=participantIds(t);
        const present=ids.filter(uid=>attMap[`${t.id}_${uid}`]?.status==='present').length;
        const absent=ids.filter(uid=>attMap[`${t.id}_${uid}`]?.status==='absent').length;
        const isAgend=status==='agendada';
        return`<div class="training-card ${status==='realizada'?'completed':status==='cancelada'?'cancelada':'pending'}" style="cursor:default;">
            <div class="training-header">
                <div style="flex:1;">
                    <div class="training-title">${trainingTitle(t)}</div>
                    <div class="training-meta" style="margin-top:6px;">
                        <div class="training-meta-item">📅 ${dateText(dt)}</div>
                        <div class="training-meta-item">⏱️ ${normDuration(t)} min</div>
                        <div class="training-meta-item">🎓 ${trainingTrainer(t)}</div>
                        ${t.entidadeFormadora?`<div class="training-meta-item">🏢 ${t.entidadeFormadora}</div>`:''}
                        ${t.laboratorioMarca?`<div class="training-meta-item">🧪 ${t.laboratorioMarca}</div>`:''}
                        ${t.creditosOF?`<div class="training-meta-item">🏅 ${t.creditosOF} créd.</div>`:''}
                    </div>
                </div>
                <div>${statusBadge(status)}</div>
            </div>
            <div class="kpi-row">
                <span class="kpi-pill">👥 ${ids.length} inscritos</span>
                <span class="kpi-pill">✅ ${present} presentes</span>
                <span class="kpi-pill">❌ ${absent} faltas</span>
            </div>
            <div class="actions-row">
                <button class="btn btn-secondary btn-sm" onclick="loadCriarFormacao('${t.id}')">✏️ Editar</button>
                <button class="btn btn-secondary btn-sm" onclick="gerirParticipantes('${t.id}')">👥 Participantes</button>
                <button class="btn btn-warning btn-sm" onclick="abrirPresencas('${t.id}')">📋 Presenças</button>
                ${isAgend?`<button class="btn btn-success btn-sm" onclick="marcarComoRealizada('${t.id}')">✓ Marcar Realizada</button>`:''}
                ${isAgend?`<button class="btn btn-danger btn-sm" onclick="eliminarFormacao('${t.id}','${trainingTitle(t).replace(/'/g,"\\'")}')">🗑️ Apagar</button>`:''}
                ${status==='realizada'&&!t.avaliacaoAutorizada?`<button class="btn btn-success btn-sm" onclick="autorizarAvaliacao('${t.id}')">⭐ Autorizar Avaliação</button>`:''}
                <button class="btn btn-excel btn-sm" onclick="exportarResumoFormacao('${t.id}')">📊 Resumo Excel</button>
            </div>
        </div>`;
    }).join('');
}

async function marcarComoRealizada(trainingId){
    if(!confirm('Confirma que esta formação foi realizada?'))return;
    try{
        await db.collection('trainings').doc(trainingId).update({estado:'realizada',estadoManual:'realizada',realizadaEm:firebase.firestore.FieldValue.serverTimestamp(),updatedAt:firebase.firestore.FieldValue.serverTimestamp()});
        showToast('Formação marcada como realizada!','success');
        window._allTrainings=await getAllTrainings();renderTodasFormacoes();
    }catch(e){showToast('Erro ao atualizar estado','error');}
}

async function eliminarFormacao(trainingId,titulo){
    const t=(window._allTrainings||[]).find(x=>x.id===trainingId);
    if(t&&resolvedStatus(t)==='realizada'){showToast('Não é possível apagar formações já realizadas.','error');return;}
    if(!confirm(`Apagar a formação "${titulo}"?\n\nSó é possível apagar formações Agendadas.`))return;
    try{
        const[e1,e2,e3]=await Promise.all([
            db.collection('enrollments').where('trainingId','==',trainingId).get(),
            db.collection('attendance').where('trainingId','==',trainingId).get(),
            db.collection('evaluations').where('trainingId','==',trainingId).get()
        ]);
        const batch=db.batch();
        e1.forEach(d=>batch.delete(d.ref));e2.forEach(d=>batch.delete(d.ref));e3.forEach(d=>batch.delete(d.ref));
        batch.delete(db.collection('trainings').doc(trainingId));
        await batch.commit();
        showToast('Formação apagada!','success');
        window._allTrainings=await getAllTrainings();renderTodasFormacoes();
    }catch(e){showToast('Erro ao apagar formação','error');}
}

async function autorizarAvaliacao(trainingId){
    try{
        await db.collection('trainings').doc(trainingId).update({avaliacaoAutorizada:true,estado:'Em avaliação'});
        showToast('Avaliação autorizada!','success');
        window._allTrainings=await getAllTrainings();renderTodasFormacoes();
    }catch(e){showToast('Erro','error');}
}

    const dateValue=(()=>{
        const d=record?trainingDate(record):null;if(!d)return'';
        const p=n=>String(n).padStart(2,'0');

                    <div class="form-group"><label class="form-label">Duração (minutos) *</label><input id="duracaoPro" type="number" min="1" class="form-control" required value="${record?normDuration(record):60}"></div>

                    <div class="form-group"><label class="form-label">Laboratório / Marca</label><input id="labPro" class="form-control" value="${record?(record.laboratorioMarca||'').replace(/"/g,'&quot;'):''}"></div>
                    <div class="form-group"><label class="form-label">Entidade Formadora</label><input id="entidadePro" class="form-control" value="${record?(record.entidadeFormadora||'').replace(/"/g,'&quot;'):''}"></div>
                    <div class="form-group"><label class="form-label">Local</label><input id="localPro" class="form-control" value="${record?(record.local||'').replace(/"/g,'&quot;'):''}"></div>
                    <div class="form-group"><label class="form-label">Tipo / Modalidade</label><input id="tipoPro" class="form-control" value="${record?(record.tipo||'').replace(/"/g,'&quot;'):''}"></div>
                    <div class="form-group"><label class="form-label">Créditos OF</label><input id="creditosPro" type="number" min="0" step="0.5" class="form-control" value="${record?(record.creditosOF||0):0}"></div>
                    <div class="form-group"><label class="form-label">Estado</label>
                        <select id="estadoPro" class="form-control">
                            ${['agendada','realizada','adiada','cancelada'].map(s=>`<option value="${s}" ${record&&resolvedStatus(record)===s?'selected':''}>${s.charAt(0).toUpperCase()+s.slice(1)}</option>`).join('')}
                        </select>
                    </div>
                    <div class="form-group" style="grid-column:1/-1;"><label class="form-label">Objetivos</label><textarea id="objetivosPro" class="form-control" rows="3">${record?(record.objetivos||'').replace(/</g,'&lt;'):''}</textarea></div>
                    <div class="form-group" style="grid-column:1/-1;"><label class="form-label">Descrição / Notas</label><textarea id="descricaoPro" class="form-control">${record?(record.descricao||record.notas||'').replace(/</g,'&lt;'):''}</textarea></div>
                </div>
                <div class="form-group">
                    <label class="form-label">Participantes inscritos</label>
                    <div style="display:flex;gap:8px;margin-bottom:10px;">
                        <button type="button" class="btn btn-success btn-sm" onclick="selTodosForm()">✓ Selecionar Todos</button>
                        <button type="button" class="btn btn-secondary btn-sm" onclick="desselTodosForm()">✗ Desselecionar Todos</button>
                    </div>
                    <div class="participants-grid" id="partGrid">
                        ${activeUsers.map(u=>`<label class="checkbox-item"><input type="checkbox" class="pcheck" value="${u.id}" ${selected.has(u.id)?'checked':''}><span><strong>${u.nome||u.email}</strong><br><small style="color:var(--color-text-secondary);">${u.funcao||''}${u.role==='gestorformacao'?' · Gestor':''}</small></span></label>`).join('')}
                    </div>
                </div>
                <div class="actions-row">
                    <button class="btn btn-primary" type="submit">${isEdit?'💾 Guardar':'➕ Criar Formação'}</button>
                    <button class="btn btn-secondary" type="button" onclick="navigateTo('todasFormacoes')">Cancelar</button>
                </div>
            </form>
        </div>`;
    document.getElementById('formacaoFormPro').addEventListener('submit',async e=>{
        e.preventDefault();
        const participantes=Array.from(document.querySelectorAll('.pcheck:checked')).map(i=>i.value);
        const payload={
            tema:document.getElementById('temaPro').value.trim(),
            data:new Date(document.getElementById('dataPro').value),
            durationMinutes:parseInt(document.getElementById('duracaoPro').value||0),
            formador:document.getElementById('formadorPro').value.trim(),
            laboratorioMarca:document.getElementById('labPro').value.trim(),

        const ref=isEdit?db.collection('trainings').doc(editId):db.collection('trainings').doc();
        await ref.set(payload,{merge:true});
        showToast(isEdit?'Formação atualizada.':'Formação criada.','success');
        navigateTo('todasFormacoes');
    });
}
function selTodosForm(){document.querySelectorAll('.pcheck').forEach(cb=>cb.checked=true);}
function desselTodosForm(){document.querySelectorAll('.pcheck').forEach(cb=>cb.checked=false);}

async function gerirParticipantes(trainingId){
    document.getElementById('participantesTrainingId').value=trainingId;
    try{
        const usersSnap=await db.collection('users').where('ativo','==',true).orderBy('nome').get();
        const tDoc=await db.collection('trainings').doc(trainingId).get();
        const enrolled=new Set(participantIds(tDoc.data()||{}));
        document.getElementById('participantesContainer').innerHTML=usersSnap.docs.map(doc=>{
            const u=doc.data();
            return`<div class="checkbox-item"><input type="checkbox" id="pu-${doc.id}" value="${doc.id}" ${enrolled.has(doc.id)?'checked':''}><label for="pu-${doc.id}" style="flex:1;cursor:pointer;"><strong>${u.nome}</strong><br><small style="color:var(--color-text-secondary);">${u.funcao||'-'}</small></label></div>`;
        }).join('');
        openModal('participantesModal');
    }catch(e){showToast('Erro ao carregar participantes','error');}

function selecionarTodos(){document.querySelectorAll('#participantesContainer input[type="checkbox"]').forEach(cb=>cb.checked=true);}
function desselecionarTodos(){document.querySelectorAll('#participantesContainer input[type="checkbox"]').forEach(cb=>cb.checked=false);}
async function salvarParticipantes(){
    const trainingId=document.getElementById('participantesTrainingId').value;
    const participantes=Array.from(document.querySelectorAll('#participantesContainer input[type="checkbox"]:checked')).map(cb=>cb.value);
    try{
        await db.collection('trainings').doc(trainingId).update({participantes,updatedAt:firebase.firestore.FieldValue.serverTimestamp()});

async function abrirPresencas(trainingId){
    document.getElementById('presencaTrainingId').value=trainingId;
    try{
        const tDoc=await db.collection('trainings').doc(trainingId).get();
        if(!tDoc.exists){showToast('Formação não encontrada','error');return;}
        const t={id:tDoc.id,...tDoc.data()};
        document.getElementById('presencaModalTitulo').textContent=`Presenças — ${trainingTitle(t)}`;
        const ids=participantIds(t);
        if(!ids.length){showToast('Sem participantes inscritos.','info');return;}
        const usersMap=await getUsersMap();
        const attSnap=await db.collection('attendance').where('trainingId','==',trainingId).get();
        const attMap={};attSnap.forEach(d=>attMap[d.data().userId]=d.data().status);
        document.getElementById('presencaContainer').innerHTML=ids.map(uid=>{
            const u=usersMap[uid]||{nome:uid};const att=attMap[uid]||'';
            return`<div class="presence-item ${att}" id="pi-${uid}">
                <div><strong>${u.nome}</strong><div class="small-text">${u.funcao||''} ${u.codigoOperador?'· '+u.codigoOperador:''}</div></div>
                <div class="presence-btns">
                    <button class="btn btn-sm" id="bp-${uid}" onclick="setPresLocal('${uid}','present')" style="background:${att==='present'?'var(--color-success)':'var(--color-accent-blue)'};color:${att==='present'?'white':'var(--color-text-primary)'};border:none;border-radius:6px;padding:6px 12px;cursor:pointer;font-weight:600;">✓ Presente</button>
                    <button class="btn btn-sm" id="ba-${uid}" onclick="setPresLocal('${uid}','absent')" style="background:${att==='absent'?'var(--color-error)':'var(--color-accent-blue)'};color:${att==='absent'?'white':'var(--color-text-primary)'};border:none;border-radius:6px;padding:6px 12px;cursor:pointer;font-weight:600;">✗ Falta</button>
                </div>
            </div>`;
        }).join('');
        window._presTemp={...attMap};
        openModal('presencaModal');
    }catch(e){console.error(e);showToast('Erro ao carregar presenças','error');}
}
function setPresLocal(uid,status){
    window._presTemp=window._presTemp||{};
    window._presTemp[uid]=status;
    const item=document.getElementById(`pi-${uid}`);
    if(item)item.className='presence-item '+status;
    const bp=document.getElementById(`bp-${uid}`);const ba=document.getElementById(`ba-${uid}`);
    if(bp){bp.style.background=status==='present'?'var(--color-success)':'var(--color-accent-blue)';bp.style.color=status==='present'?'white':'var(--color-text-primary)';}
    if(ba){ba.style.background=status==='absent'?'var(--color-error)':'var(--color-accent-blue)';ba.style.color=status==='absent'?'white':'var(--color-text-primary)';}
}
function marcarTodosPresentes(){document.querySelectorAll('.presence-item').forEach(item=>setPresLocal(item.id.replace('pi-',''),'present'));}
function marcarTodosAusentes(){document.querySelectorAll('.presence-item').forEach(item=>setPresLocal(item.id.replace('pi-',''),'absent'));}
async function gravarPresencasModal(){
    const trainingId=document.getElementById('presencaTrainingId').value;
    const presencas=window._presTemp||{};
    try{
        const tDoc=await db.collection('trainings').doc(trainingId).get();
        const t={id:tDoc.id,...tDoc.data()};
        const usersMap=await getUsersMap();
        await Promise.all(Object.entries(presencas).map(async([uid,status])=>{
            const ref=db.collection('attendance').doc(`${trainingId}_${uid}`);
            await ref.set({trainingId,userId:uid,status,confirmedAt:firebase.firestore.FieldValue.serverTimestamp(),confirmedByGestor:true},{merge:true});
            if(status==='present'&&t.creditosOF>0&&usersMap[uid]?.funcao==='Farmacêutico'){
                const ex=await db.collection('creditosOF').where('trainingId','==',trainingId).where('userId','==',uid).get();
                if(ex.empty)await db.collection('creditosOF').add({userId:uid,trainingId,tema:t.tema||'',entidadeFormadora:t.entidadeFormadora||'',creditos:t.creditosOF,data:t.data||null,atribuidoEm:firebase.firestore.FieldValue.serverTimestamp()});
            }
        }));
        showToast('Presenças guardadas!','success');closeModal('presencaModal');
        if(window._allAttMap)window._allAttMap=await getAttendanceMap();
        renderTodasFormacoes&&renderTodasFormacoes();
    }catch(e){console.error(e);showToast('Erro ao guardar presenças','error');}
}

async function loadColaboradores(){
    document.getElementById('pageTitle').textContent='Gestão de Colaboradores';
    document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-header"><h2 class="card-title">Colaboradores</h2><button class="btn btn-primary" onclick="abrirModalColaborador()">➕ Novo Colaborador</button></div><div id="colabContainer"><div class="loading active"><div class="spinner"></div><p>A carregar...</p></div></div></div>`;

}
async function carregarColaboradores(){
    try{
        const snap=await db.collection('users').orderBy('nome').get();

async function submitColaborador(event){
    event.preventDefault();
    const id=document.getElementById('colaboradorId').value;
    const nome=document.getElementById('colabNome').value.trim();
    const email=document.getElementById('colabEmail').value.trim();
    if(!nome||!email){showToast('Nome e email obrigatórios','error');return;}
    try{
        let uid=id;
        if(!id){
            try{const cred=await auth.createUserWithEmailAndPassword(email,'Farmacia123!');uid=cred.user.uid;}
            catch(err){
                if(err.code==='auth/email-already-in-use'){
                    const snap=await db.collection('users').where('email','==',email).limit(1).get();
                    if(snap.empty){showToast('Email já em uso','error');return;}
                    uid=snap.docs[0].id;
                }else throw err;
            }
        }
        await db.collection('users').doc(uid).set({
            nome,nomeCompleto:document.getElementById('colabNomeCompleto').value.trim(),
            codigoOperador:document.getElementById('colabCodigoOperador').value.trim(),
            nif:document.getElementById('colabNIF').value.trim(),
            cedula:document.getElementById('colabCedula').value.trim(),
            email,funcao:document.getElementById('colabFuncao').value,
            role:document.getElementById('colabRole').value,
            ativo:document.getElementById('colabAtivo').value==='true',
            updatedAt:firebase.firestore.FieldValue.serverTimestamp()
        },{merge:true});
        showToast(id?'Colaborador atualizado!':'Colaborador criado! Password: Farmacia123!','success');
        closeModal('colaboradorModal');carregarColaboradores();
    }catch(e){showToast('Erro: '+e.message,'error');}
}
async function eliminarColaborador(userId){
    if(!confirm('Eliminar este colaborador?'))return;
    try{await db.collection('users').doc(userId).delete();showToast('Colaborador eliminado','success');carregarColaboradores();}
    catch(e){showToast('Erro ao eliminar','error');}
}

async function exportColaboradorHorasExcel(){
    showToast('A preparar exportação por colaborador...','info');
    const{start,end}=getRepFilters();
    const[usersMap,trainings,attMap,evalMap]=await Promise.all([getUsersMap(),getAllTrainings(),getAttendanceMap(),getEvaluationsMap()]);

    const r1=[['Colaborador','Cód. Operador','Email','Função','Horas Frequentadas','Nº Formações','Nº Avaliações','Média Aval. Global']];
    Object.values(usersMap).filter(u=>u.ativo!==false).sort((a,b)=>(a.nome||'').localeCompare(b.nome||'','pt')).forEach(u=>{
        let mins=0,cnt=0,avgs=[];
        trainings.forEach(t=>{
            const dt=trainingDate(t);if(!rangeFilter(dt,start,end))return;
            if(attMap[`${t.id}_${u.id}`]?.status==='present'){mins+=normDuration(t);cnt++;}
            const ev=evalMap[`${t.id}_${u.id}`];if(ev?.avaliacaoGlobal)avgs.push(ev.avaliacaoGlobal);
        });
        r1.push([u.nome||'',u.codigoOperador||'',u.email||'',u.funcao||'',parseFloat((mins/60).toFixed(2)),cnt,avgs.length,avgs.length?parseFloat((avgs.reduce((a,b)=>a+b,0)/avgs.length).toFixed(2)):'']);
    });

    Object.values(usersMap).filter(u=>u.ativo!==false).forEach(u=>{
        trainings.filter(t=>participantIds(t).includes(u.id)).sort((a,b)=>(trainingDate(a)?.getTime()||0)-(trainingDate(b)?.getTime()||0)).forEach(t=>{
            const dt=trainingDate(t);if(!rangeFilter(dt,start,end))return;
            const att=attMap[`${t.id}_${u.id}`];const ev=evalMap[`${t.id}_${u.id}`];
            const mins=att?.status==='present'?normDuration(t):0;
            r2.push([u.nome||'',u.codigoOperador||'',trainingTitle(t),dt?dateShort(dt):'',resolvedStatus(t),t.laboratorioMarca||t.entidadeFormadora||'',parseFloat((mins/60).toFixed(2)),att?.status==='present'?'Presente':att?.status==='absent'?'Falta':'Pendente',ev?.avaliacaoGlobal||'',ev?.duracaoAcao||'',ev?.capacidadePedagogicaFormador||'',ev?.dominioTemaFormador||'',ev?.relevanciaTarefasDesempenha||'',ev?.observacoesPropostasImplementacao||'']);
        });
    });
    const ws1=XLSX.utils.aoa_to_sheet(r1);ws1['!cols']=[25,12,30,18,16,12,12,16].map(w=>({wch:w}));

    XLSX.utils.book_append_sheet(wb,ws1,'Resumo por Colaborador');
    XLSX.utils.book_append_sheet(wb,ws2,'Detalhe por Colaborador');
    xlDl(wb,`relatorio_colaboradores_${new Date().toISOString().slice(0,10)}.xlsx`);
    showToast('Exportação concluída!','success');
}

            <div class="stat-card blue"><div class="stat-label">Formações Futuras</div><div class="stat-value" id="sFut">-</div></div>
            <div class="stat-card green"><div class="stat-label">Horas frequentadas</div><div class="stat-value" id="sHr">-</div></div>
            <div class="stat-card warning"><div class="stat-label">Por avaliar</div><div class="stat-value" id="sAv">-</div></div>
        </div>
        <div class="card"><div class="card-header"><h2 class="card-title">Formações por mês</h2></div><div id="mfContainer"></div></div>`;
    const render=async()=>{
        const[trainings,attMap,evalMap]=await Promise.all([getAllTrainings(),getAttendanceMap(),getEvaluationsMap()]);
        const my=trainings.filter(t=>participantIds(t).includes(currentUser.uid)).sort((a,b)=>(trainingDate(b)?.getTime()||0)-(trainingDate(a)?.getTime()||0));
        const grouped={};let fut=0,av=0,mins=0;
        my.forEach(t=>{
            const dt=trainingDate(t)||new Date();const key=monthKey(dt);
            grouped[key]||={dt,rows:[]};
            const att=attMap[`${t.id}_${currentUser.uid}`];const ev=evalMap[`${t.id}_${currentUser.uid}`];const status=resolvedStatus(t);
            if(status==='agendada')fut++;
            if(att?.status==='present')mins+=normDuration(t);
            if(status==='realizada'&&att?.status==='present'&&!ev)av++;
            grouped[key].rows.push({t,dt,att,ev,status});
        });
        const sf=document.getElementById('sFut');const sh=document.getElementById('sHr');const sa=document.getElementById('sAv');
        if(sf)sf.textContent=fut;if(sh)sh.textContent=hoursLabel(mins);if(sa)sa.textContent=av;
        const c=document.getElementById('mfContainer');if(!c)return;
        const entries=Object.entries(grouped).sort((a,b)=>(b[1].dt?.getTime()||0)-(a[1].dt?.getTime()||0));
        c.innerHTML=entries.map(([month,{rows}])=>{
            const mid='cm-'+month.replace(/[\s\/]/g,'-');
            const isCur=month===monthKey(new Date());
            return`<div class="training-card" style="cursor:pointer;" onclick="toggleMes('${mid}')">
                <div style="display:flex;justify-content:space-between;align-items:center;">
                    <div><h3 style="font-size:16px;font-weight:700;">${month}</h3><p style="color:var(--color-text-secondary);font-size:12px;margin-top:2px;">${rows.length} formação(ões)</p></div>
                    <span id="${mid}-arr" style="font-size:18px;">${isCur?'🔽':'▶️'}</span>
                </div>
                <div id="${mid}" style="display:${isCur?'block':'none'};margin-top:12px;border-top:1px solid var(--color-border);padding-top:12px;" onclick="event.stopPropagation()">
                    ${rows.map(({t,dt,att,ev,status})=>{
                        const canEval=status==='realizada'&&att?.status!=='absent';
                        const canEdit=ev&&canEditEvaluation(ev);
                        return`<div class="training-card ${status==='realizada'?'completed':'pending'}" style="margin-bottom:10px;cursor:pointer;" onclick="abrirDetalheFormacao('${t.id}')">
                            <div class="training-header">
                                <div style="flex:1;">
                                    <div class="training-title" style="font-size:15px;">${trainingTitle(t)}</div>
                                    <div class="training-meta" style="margin-top:5px;">
                                        <div class="training-meta-item">📅 ${dateText(dt)}</div>
                                        <div class="training-meta-item">⏱️ ${hoursLabel(normDuration(t))}</div>
                                        <div class="training-meta-item">🎓 ${trainingTrainer(t)}</div>
                                        ${t.entidadeFormadora?`<div class="training-meta-item">🏢 ${t.entidadeFormadora}</div>`:''}
                                    </div>
                                </div>
                                <div>${statusBadge(status)}</div>
                            </div>
                            <div class="kpi-row">
                                <span class="kpi-pill">Presença: ${att?.status==='present'?'✓ Confirmada':att?.status==='absent'?'✗ Não compareceu':'⏳ Pendente'}</span>
                                <span class="kpi-pill">Avaliação: ${ev?'✓ Submetida':'Por fazer'}</span>
                                ${t.creditosOF?`<span class="kpi-pill">🏅 ${t.creditosOF} créd. OF</span>`:''}
                            </div>
                            <div class="actions-row" onclick="event.stopPropagation()">
                                ${status==='realizada'&&!att?`<button class="btn btn-danger btn-sm" onclick="setAttendance('${t.id}','absent')">✗ Não compareci</button>`:''}
                                ${canEval?`<button class="btn btn-primary btn-sm" onclick="openEvaluationForTraining('${t.id}')">${ev?'✏️ Editar':'⭐ Avaliar'}</button>`:''}
                                ${ev&&!canEdit?`<span class="small-text">Janela de edição encerrada.</span>`:''}
                                <button class="btn btn-secondary btn-sm" onclick="abrirDetalheFormacao('${t.id}')">🔍 Detalhes</button>
                            </div>
                        </div>`;
                    }).join('')}
                </div>
            </div>`;
        }).join('')||`<div class="empty-state"><div class="empty-state-icon">📖</div><p class="empty-state-text">Ainda não está inscrito em formações.</p></div>`;
    };
    await render();
    activeUnsubscribe=db.collection('trainings').onSnapshot(()=>render());
}

function toggleMes(id){
    const el=document.getElementById(id);if(!el)return;
    const open=el.style.display!=='none';
    el.style.display=open?'none':'block';
    const arr=document.getElementById(id+'-arr');if(arr)arr.textContent=open?'▶️':'🔽';
}

async function setAttendance(trainingId,status){
    const ex=await db.collection('attendance').doc(`${trainingId}_${currentUser.uid}`).get();
    if(ex.exists){const d=ex.data();const c=asDate(d.confirmedAt);if(c&&(Date.now()-c.getTime())>86400000)return showToast('O prazo de 24h terminou.','error');}
    const firstConfirm=(ex.exists&&ex.data().confirmedAt)?ex.data().confirmedAt:firebase.firestore.FieldValue.serverTimestamp();
    await db.collection('attendance').doc(`${trainingId}_${currentUser.uid}`).set({trainingId,userId:currentUser.uid,status,confirmedAt:firstConfirm,confirmedByUser:true},{merge:true});
    showToast(status==='present'?'Presença confirmada!':'Falta registada.','success');
    loadMinhasFormacoes();
}

async function abrirDetalheFormacao(trainingId){
    try{
        const tDoc=await db.collection('trainings').doc(trainingId).get();
        if(!tDoc.exists){showToast('Formação não encontrada','error');return;}
        const t={id:tDoc.id,...tDoc.data()};const dt=trainingDate(t);const status=resolvedStatus(t);
        const mins=normDuration(t);const hLabel=mins>=60?Math.floor(mins/60)+'h'+(mins%60?String(mins%60).padStart(2,'0')+'min':''):mins+'min';
        const attDoc=await db.collection('attendance').doc(`${trainingId}_${currentUser.uid}`).get();
        const attStatus=attDoc.exists?attDoc.data().status:null;
        const evalSnap=await db.collection('evaluations').where('trainingId','==',trainingId).where('userId','==',currentUser.uid).get();
        const hasEval=!evalSnap.empty;const canEval=status==='realizada'&&attStatus!=='absent';
        document.getElementById('detalheModalTitulo').textContent=trainingTitle(t);
        document.getElementById('detalheModalBody').innerHTML=`
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:14px;margin-bottom:18px;">
                <div><div class="small-text" style="text-transform:uppercase;font-weight:600;margin-bottom:3px;">Data</div><div style="font-weight:600;">${dt?dt.toLocaleDateString('pt-PT',{weekday:'long',day:'numeric',month:'long',year:'numeric'}):'-'}</div></div>
                <div><div class="small-text" style="text-transform:uppercase;font-weight:600;margin-bottom:3px;">Duração</div><div style="font-weight:600;">${hLabel}</div></div>
                <div><div class="small-text" style="text-transform:uppercase;font-weight:600;margin-bottom:3px;">Formador</div><div style="font-weight:600;">${t.formador||'-'}</div></div>
                <div><div class="small-text" style="text-transform:uppercase;font-weight:600;margin-bottom:3px;">Entidade</div><div style="font-weight:600;">${t.entidadeFormadora||'-'}</div></div>
                <div><div class="small-text" style="text-transform:uppercase;font-weight:600;margin-bottom:3px;">Local</div><div style="font-weight:600;">${t.local||'-'}</div></div>
                <div><div class="small-text" style="text-transform:uppercase;font-weight:600;margin-bottom:3px;">Estado</div>${statusBadge(status)}</div>
            </div>
            ${t.objetivos?`<div style="margin-bottom:12px;"><div class="small-text" style="text-transform:uppercase;font-weight:600;margin-bottom:5px;">Objetivos</div><div style="background:var(--color-accent-blue);border-radius:8px;padding:10px;font-size:13px;">${t.objetivos.replace(/\n/g,'<br>')}</div></div>`:''}
            <div style="background:var(--color-bg-primary);border-radius:10px;padding:12px;margin-bottom:12px;">
                <div class="small-text" style="text-transform:uppercase;font-weight:600;margin-bottom:8px;">A minha participação</div>
                <div class="kpi-row">
                    <span class="kpi-pill">Presença: ${attStatus==='present'?'✓ Confirmada':attStatus==='absent'?'✗ Não compareceu':'⏳ Pendente'}</span>
                    <span class="kpi-pill">Avaliação: ${hasEval?'✓ Submetida':'Por fazer'}</span>
                </div>
            </div>
            <div style="display:flex;gap:10px;flex-wrap:wrap;">
                ${status==='realizada'&&!attStatus?`<button class="btn btn-danger" onclick="setAttendance('${trainingId}','absent');closeModal('detalheFormacaoModal')">✗ Não compareci</button>`:''}
                ${canEval?`<button class="btn btn-primary" onclick="openEvaluationForTraining('${trainingId}');closeModal('detalheFormacaoModal')">${hasEval?'✏️ Editar Avaliação':'⭐ Avaliar'}</button>`:''}
                <button class="btn btn-secondary" onclick="closeModal('detalheFormacaoModal')">Fechar</button>
            </div>`;
        openModal('detalheFormacaoModal');
    }catch(e){console.error(e);showToast('Erro ao carregar detalhe','error');}
}

// Avaliação
function initRatingStars(){
    ['duracao','pedagogica','dominio','relevancia','global'].forEach(field=>{
        const c=document.getElementById(`stars-${field}`);if(!c)return;
        c.innerHTML='';
        for(let i=1;i<=5;i++){const s=document.createElement('span');s.className='star';s.textContent='★';s.onclick=()=>setRating(field,i);c.appendChild(s);}
    });
}
function setRating(field,value){
    document.getElementById(`rating-${field}`).value=value;
    document.querySelectorAll(`#stars-${field} .star`).forEach((s,i)=>s.classList.toggle('active',i<value));
}
function toggleAfastamentoDetalhe(){
    const val=document.getElementById('afastamentoPratica').value;
    document.getElementById('detalheAfastamentoGroup').style.display=val==='sim'?'block':'none';
    document.getElementById('detalheAfastamento').required=val==='sim';
    if(val!=='sim')document.getElementById('detalheAfastamento').value='';
}
async function openEvaluationForTraining(trainingId){
    initRatingStars();
    document.getElementById('evalTrainingId').value=trainingId;
    const existing=await db.collection('evaluations').where('trainingId','==',trainingId).where('userId','==',currentUser.uid).limit(1).get();
    if(!existing.empty){
        const ev=existing.docs[0].data();
        const fm={duracao:'duracaoAcao',pedagogica:'capacidadePedagogicaFormador',dominio:'dominioTemaFormador',relevancia:'relevanciaTarefasDesempenha',global:'avaliacaoGlobal'};
        Object.entries(fm).forEach(([k,f])=>{const v=ev[f]||0;document.getElementById(`rating-${k}`).value=v;document.querySelectorAll(`#stars-${k} .star`).forEach((s,i)=>s.classList.toggle('active',i<v));});
        document.getElementById('afastamentoPratica').value=(ev.temasAfastamPraticaInstituida||ev.afastaDaPratica)?'sim':'nao';
        document.getElementById('detalheAfastamento').value=ev.justificacaoAfastamentoPratica||ev.detalheAfastamento||'';
        document.getElementById('observacoesPropostas').value=ev.observacoesPropostasImplementacao||ev.observacoesPropostas||'';
        toggleAfastamentoDetalhe();
    }else{
        document.getElementById('avaliacaoForm').reset();document.getElementById('evalTrainingId').value=trainingId;
        ['duracao','pedagogica','dominio','relevancia','global'].forEach(k=>document.querySelectorAll(`#stars-${k} .star`).forEach(s=>s.classList.remove('active')));
    }
    openModal('avaliacaoModal');
}
async function submitAvaliacao(event){
    event.preventDefault();
    const trainingId=document.getElementById('evalTrainingId').value;
    for(const f of['duracao','pedagogica','dominio','relevancia','global']){if(!document.getElementById(`rating-${f}`).value){showToast('Classifique todos os critérios.','error');return;}}
    try{
        const existing=await db.collection('evaluations').where('trainingId','==',trainingId).where('userId','==',currentUser.uid).limit(1).get();
        const afasta=document.getElementById('afastamentoPratica').value==='sim';
        const payload={trainingId,userId:currentUser.uid,duracaoAcao:parseInt(document.getElementById('rating-duracao').value),capacidadePedagogicaFormador:parseInt(document.getElementById('rating-pedagogica').value),dominioTemaFormador:parseInt(document.getElementById('rating-dominio').value),relevanciaTarefasDesempenha:parseInt(document.getElementById('rating-relevancia').value),avaliacaoGlobal:parseInt(document.getElementById('rating-global').value),temasAfastamPraticaInstituida:afasta,justificacaoAfastamentoPratica:afasta?document.getElementById('detalheAfastamento').value:'',observacoesPropostasImplementacao:document.getElementById('observacoesPropostas').value,updatedAt:firebase.firestore.FieldValue.serverTimestamp()};
        if(existing.empty)payload.firstSubmittedAt=firebase.firestore.FieldValue.serverTimestamp();
        const ref=existing.empty?db.collection('evaluations').doc(`${trainingId}_${currentUser.uid}`):db.collection('evaluations').doc(existing.docs[0].id);
        await ref.set(payload,{merge:true});
        showToast(existing.empty?'Avaliação submetida!':'Avaliação atualizada!','success');
        closeModal('avaliacaoModal');loadMinhasFormacoes();
    }catch(e){console.error(e);showToast('Erro ao submeter avaliação','error');}
}

// Manifestar Necessidade
function loadManifestarNecessidade(){
    document.getElementById('pageTitle').textContent='Manifestar Necessidade de Formação';
    document.getElementById('contentArea').innerHTML=`
        <div class="card"><div class="card-header"><h2 class="card-title">Nova Necessidade de Formação</h2></div>
        <form id="necForm" onsubmit="submitNecessidade(event)">
            <div class="form-group"><label class="form-label">Tema / Necessidade *</label><input type="text" id="temaNec" class="form-control" required></div>
            <div class="form-group"><label class="form-label">Urgência *</label><select id="urgNec" class="form-control" required><option value="">Selecione...</option><option value="Baixa">Baixa</option><option value="Media">Média</option><option value="Alta">Alta</option><option value="Critica">Crítica</option></select></div>
            <div class="form-group"><label class="form-label">Marca ou Laboratório</label><input type="text" id="labNec" class="form-control"></div>
            <div class="form-group"><label class="form-label">Comentários</label><textarea id="comNec" class="form-control"></textarea></div>
            <button type="submit" class="btn btn-primary">✓ Submeter Pedido</button>
        </form></div>
        <div class="card"><div class="card-header"><h2 class="card-title">Histórico de Pedidos</h2></div><div id="histNec"><div class="loading active"><div class="spinner"></div><p>A carregar...</p></div></div></div>`;
    carregarHistoricoNecessidades();
}
async function submitNecessidade(event){
    event.preventDefault();
    try{
        await db.collection('trainingNeeds').add({userId:currentUser.uid,nomeColaborador:currentUserData.nome,temaNecessidade:document.getElementById('temaNec').value,urgencia:document.getElementById('urgNec').value,laboratorioMarca:document.getElementById('labNec').value,comentariosAdicionais:document.getElementById('comNec').value,estado:'Submetida',createdAt:firebase.firestore.FieldValue.serverTimestamp()});
        showToast('Pedido submetido!','success');document.getElementById('necForm').reset();carregarHistoricoNecessidades();
    }catch(e){showToast('Erro ao submeter','error');}
}
async function carregarHistoricoNecessidades(){
    try{
        const snap=await db.collection('trainingNeeds').where('userId','==',currentUser.uid).orderBy('createdAt','desc').get();
        const c=document.getElementById('histNec');
        if(snap.empty){c.innerHTML=`<div class="empty-state"><div class="empty-state-icon">📝</div><p class="empty-state-text">Ainda não submeteu pedidos</p></div>`;return;}
        const ub=u=>({'Baixa':'badge-info','Media':'badge-warning','Alta':'badge-warning','Critica':'badge-error'}[u]||'badge-info');
        const eb=e=>({'Submetida':'badge-info','Em análise':'badge-warning','Planeada':'badge-success','Rejeitada':'badge-error'}[e]||'badge-info');
        c.innerHTML=`<div class="table-container"><table><thead><tr><th>Data</th><th>Tema</th><th>Urgência</th><th>Laboratório</th><th>Estado</th></tr></thead><tbody>
            ${snap.docs.map(doc=>{const d=doc.data();const dt=d.createdAt?new Date(d.createdAt.seconds*1000):new Date();return`<tr><td>${dt.toLocaleDateString('pt-PT')}</td><td>${d.temaNecessidade}</td><td><span class="badge ${ub(d.urgencia)}">${d.urgencia}</span></td><td>${d.laboratorioMarca||'-'}</td><td><span class="badge ${eb(d.estado)}">${d.estado}</span></td></tr>`;}).join('')}
        </tbody></table></div>`;
    }catch(e){}
}

// Histórico Avaliações
async function loadHistoricoAvaliacoes(){
    document.getElementById('pageTitle').textContent='Histórico de Avaliações';
    document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-header"><h2 class="card-title">Minhas Avaliações</h2></div><div id="avalC"><div class="loading active"><div class="spinner"></div><p>A carregar...</p></div></div></div>`;
    try{
        const snap=await db.collection('evaluations').where('userId','==',currentUser.uid).get();
        const c=document.getElementById('avalC');
        if(snap.empty){c.innerHTML=`<div class="empty-state"><div class="empty-state-icon">⭐</div><p class="empty-state-text">Ainda não submeteu avaliações</p></div>`;return;}
        const evals=await Promise.all(snap.docs.map(async doc=>{const d=doc.data();const tDoc=await db.collection('trainings').doc(d.trainingId).get();return{...d,training:tDoc.exists?tDoc.data():{}};}) );
        c.innerHTML=`<div class="table-container"><table><thead><tr><th>Data</th><th>Formação</th><th>Formador</th><th>Global</th><th>Duração</th><th>Pedagógica</th><th>Domínio</th><th>Relevância</th></tr></thead><tbody>
            ${evals.map(ev=>{const dt=ev.firstSubmittedAt?asDate(ev.firstSubmittedAt):null;
            const stars=n=>'★'.repeat(n||0)+'☆'.repeat(5-(n||0));
            return`<tr><td>${dt?dt.toLocaleDateString('pt-PT'):'-'}</td><td>${ev.training.tema||'N/A'}</td><td>${ev.training.formador||'N/A'}</td><td>${stars(ev.avaliacaoGlobal)}</td><td>${stars(ev.duracaoAcao)}</td><td>${stars(ev.capacidadePedagogicaFormador)}</td><td>${stars(ev.dominioTemaFormador)}</td><td>${stars(ev.relevanciaTarefasDesempenha)}</td></tr>`;}).join('')}
        </tbody></table></div>`;
    }catch(e){console.error(e);}
}

// Créditos OF
async function loadMeusCreditos(){
    document.getElementById('pageTitle').textContent='Os Meus Créditos OF';
    document.getElementById('contentArea').innerHTML=`<div class="card"><div class="card-header"><h2 class="card-title">🏅 Os Meus Créditos OF</h2></div><div id="credC"><div class="loading active"><div class="spinner"></div><p>A carregar...</p></div></div></div>`;
    try{
        const snap=await db.collection('creditosOF').where('userId','==',currentUser.uid).orderBy('atribuidoEm','desc').get();
        const total=snap.docs.reduce((s,d)=>s+(d.data().creditos||0),0);
        const rows=snap.docs.map(d=>{const dd=d.data();const dt=dd.data?asDate(dd.data):null;return`<tr><td>${dt?dt.toLocaleDateString('pt-PT'):'-'}</td><td><strong>${dd.tema||'-'}</strong></td><td>${dd.entidadeFormadora||'-'}</td><td style="text-align:center;font-weight:700;">${dd.creditos}</td></tr>`;}).join('');
        document.getElementById('credC').innerHTML=`<div style="background:linear-gradient(135deg,var(--color-accent-blue),var(--color-accent-green));border-radius:12px;padding:24px;margin-bottom:20px;text-align:center;"><div style="font-size:48px;font-weight:700;">${total}</div><div style="color:var(--color-text-secondary);font-size:14px;">Créditos OF acumulados</div></div>${rows?`<div class="table-container"><table><thead><tr><th>Data</th><th>Formação</th><th>Entidade</th><th style="text-align:center;">Créditos</th></tr></thead><tbody>${rows}</tbody></table></div>`:'<div class="empty-state"><div class="empty-state-icon">🏅</div><p class="empty-state-text">Ainda não tem créditos OF</p></div>'}`;
    }catch(e){showToast('Erro ao carregar créditos','error');}
}
</script>
