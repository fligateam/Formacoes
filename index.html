<!DOCTYPE html>
<html lang="pt-PT">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Farmácia da Liga - Sistema de Gestão de Formações</title>

    <meta name="theme-color" content="#4A6572">
    <meta name="mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="default">
    <meta name="apple-mobile-web-app-title" content="FormaLiga">

    <link rel="icon" href="data:image/svg+xml,<svg xmlns='http://www.w3.org/2000/svg' viewBox='0 0 100 100'><rect width='100' height='100' rx='22' fill='%234A6572'/><rect x='28' y='18' width='44' height='64' rx='8' fill='%23FFFFFF'/><rect x='36' y='32' width='28' height='4' rx='2' fill='%23D8EFFF'/><rect x='36' y='42' width='20' height='4' rx='2' fill='%23D8EFFF'/><rect x='36' y='52' width='24' height='4' rx='2' fill='%23DFF3E3'/><circle cx='68' cy='72' r='14' fill='%237BC97F'/><rect x='64' y='66' width='8' height='12' rx='2' fill='white'/><rect x='62' y='70' width='12' height='4' rx='2' fill='white'/></svg>">

    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        :root {
            --color-bg-primary: #F7F1E8;
            --color-bg-secondary: #FFFFFF;
            --color-accent-blue: #D8EFFF;
            --color-accent-green: #DFF3E3;
            --color-text-primary: #4A6572;
            --color-text-secondary: #6B7F8C;
            --color-border: #E0D5C7;
            --color-success: #7BC97F;
            --color-warning: #FFB84D;
            --color-error: #E57373;
            --color-info: #64B5F6;
            --shadow-sm: 0 2px 4px rgba(74,101,114,0.08);
            --shadow-md: 0 4px 12px rgba(74,101,114,0.12);
            --shadow-lg: 0 8px 24px rgba(74,101,114,0.16);
        }
        * { margin:0; padding:0; box-sizing:border-box; }
        body { font-family:'Montserrat',sans-serif; background-color:var(--color-bg-primary); color:var(--color-text-primary); line-height:1.6; }
        .app-container { display:flex; min-height:100vh; }
        .sidebar { width:260px; background:var(--color-bg-secondary); border-right:1px solid var(--color-border); padding:0; position:fixed; height:100vh; overflow-y:auto; box-shadow:var(--shadow-md); }
        .sidebar-header { padding:24px 20px; border-bottom:1px solid var(--color-border); background:linear-gradient(135deg,var(--color-accent-blue),var(--color-accent-green)); }
        .sidebar-header h1 { font-size:18px; font-weight:700; color:var(--color-text-primary); margin-bottom:4px; }
        .sidebar-header p { font-size:12px; color:var(--color-text-secondary); font-weight:400; }
        .sidebar-menu { padding:16px 0; }
        .menu-item { padding:12px 20px; cursor:pointer; transition:all 0.2s ease; border-left:3px solid transparent; font-size:14px; font-weight:500; color:var(--color-text-secondary); display:flex; align-items:center; gap:10px; }
        .menu-item:hover { background:var(--color-accent-blue); border-left-color:var(--color-text-primary); color:var(--color-text-primary); }
        .menu-item.active { background:var(--color-accent-blue); border-left-color:var(--color-text-primary); color:var(--color-text-primary); font-weight:600; }
        .main-content { margin-left:260px; flex:1; display:flex; flex-direction:column; }
        .topbar { background:var(--color-bg-secondary); border-bottom:1px solid var(--color-border); padding:16px 32px; display:flex; justify-content:space-between; align-items:center; box-shadow:var(--shadow-sm); position:sticky; top:0; z-index:100; }
        .user-info { display:flex; align-items:center; gap:12px; }
        .user-avatar { width:40px; height:40px; border-radius:50%; background:linear-gradient(135deg,var(--color-accent-blue),var(--color-accent-green)); display:flex; align-items:center; justify-content:center; font-weight:600; color:var(--color-text-primary); font-size:16px; }
        .user-details h3 { font-size:14px; font-weight:600; color:var(--color-text-primary); }
        .user-details p { font-size:12px; color:var(--color-text-secondary); }
        .content-area { padding:32px; flex:1; overflow-y:auto; }
        .btn { padding:10px 20px; border:none; border-radius:8px; font-family:'Montserrat',sans-serif; font-size:14px; font-weight:600; cursor:pointer; transition:all 0.2s ease; display:inline-flex; align-items:center; gap:8px; }
        .btn-primary { background:var(--color-text-primary); color:white; }
        .btn-primary:hover { background:#3a515e; box-shadow:var(--shadow-md); }
        .btn-secondary { background:var(--color-accent-blue); color:var(--color-text-primary); }
        .btn-secondary:hover { background:#c0e3ff; }
        .btn-success { background:var(--color-success); color:white; }
        .btn-success:hover { background:#6bb56f; }
        .btn-warning { background:var(--color-warning); color:white; }
        .btn-danger { background:var(--color-error); color:white; }
        .btn-danger:hover { background:#d66363; }
        .btn-icon { padding:8px; width:36px; height:36px; display:flex; align-items:center; justify-content:center; }
        .card { background:var(--color-bg-secondary); border-radius:12px; padding:24px; box-shadow:var(--shadow-md); margin-bottom:20px; }
        .card-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:20px; padding-bottom:16px; border-bottom:1px solid var(--color-border); }
        .card-title { font-size:20px; font-weight:700; color:var(--color-text-primary); }
        .stats-grid { display:grid; grid-template-columns:repeat(auto-fit,minmax(180px,1fr)); gap:16px; margin-bottom:24px; }
        .stat-card { background:var(--color-bg-secondary); padding:20px; border-radius:12px; box-shadow:var(--shadow-md); border-left:4px solid var(--color-text-primary); }
        .stat-card.blue { border-left-color:var(--color-info); }
        .stat-card.green { border-left-color:var(--color-success); }
        .stat-card.warning { border-left-color:var(--color-warning); }
        .stat-card.purple { border-left-color:#9C6FD6; }
        .stat-label { font-size:12px; color:var(--color-text-secondary); text-transform:uppercase; letter-spacing:0.5px; margin-bottom:8px; font-weight:600; }
        .stat-value { font-size:28px; font-weight:700; color:var(--color-text-primary); }
        .form-group { margin-bottom:20px; }
        .form-label { display:block; font-size:14px; font-weight:600; color:var(--color-text-primary); margin-bottom:8px; }
        .form-control { width:100%; padding:12px 16px; border:1px solid var(--color-border); border-radius:8px; font-family:'Montserrat',sans-serif; font-size:14px; color:var(--color-text-primary); background:var(--color-bg-secondary); transition:all 0.2s ease; }
        .form-control:focus { outline:none; border-color:var(--color-text-primary); box-shadow:0 0 0 3px rgba(74,101,114,0.1); }
        textarea.form-control { resize:vertical; min-height:100px; }
        .table-container { overflow-x:auto; border-radius:12px; box-shadow:var(--shadow-sm); }
        table { width:100%; border-collapse:collapse; background:var(--color-bg-secondary); }
        thead { background:var(--color-accent-blue); }
        th { padding:14px 16px; text-align:left; font-size:12px; font-weight:700; color:var(--color-text-primary); text-transform:uppercase; letter-spacing:0.5px; }
        td { padding:14px 16px; font-size:14px; color:var(--color-text-primary); border-bottom:1px solid var(--color-border); }
        tr:hover { background:var(--color-accent-blue); }
        .badge { display:inline-block; padding:4px 12px; border-radius:20px; font-size:12px; font-weight:600; text-transform:uppercase; letter-spacing:0.3px; }
        .badge-success { background:var(--color-accent-green); color:var(--color-success); }
        .badge-warning { background:#FFF4E5; color:var(--color-warning); }
        .badge-info { background:var(--color-accent-blue); color:var(--color-info); }
        .badge-error { background:#FFEBEE; color:var(--color-error); }
        .modal { display:none; position:fixed; top:0; left:0; width:100%; height:100%; background:rgba(0,0,0,0.5); z-index:1000; align-items:center; justify-content:center; padding:20px; }
        .modal.active { display:flex; }
        .modal-content { background:var(--color-bg-secondary); border-radius:16px; padding:32px; max-width:800px; width:100%; max-height:90vh; overflow-y:auto; box-shadow:var(--shadow-lg); }
        .modal-header { display:flex; justify-content:space-between; align-items:center; margin-bottom:24px; padding-bottom:16px; border-bottom:1px solid var(--color-border); }
        .modal-title { font-size:22px; font-weight:700; color:var(--color-text-primary); }
        .close-modal { background:none; border:none; font-size:24px; cursor:pointer; color:var(--color-text-secondary); padding:0; width:32px; height:32px; display:flex; align-items:center; justify-content:center; border-radius:8px; transition:all 0.2s ease; }
        .close-modal:hover { background:var(--color-accent-blue); color:var(--color-text-primary); }
        .rating-group { margin-bottom:24px; }
        .rating-stars { display:flex; gap:8px; margin-top:8px; }
        .star { font-size:28px; cursor:pointer; color:#E0D5C7; transition:all 0.2s ease; }
        .star:hover, .star.active { color:#FFB84D; }
        .toast { position:fixed; bottom:24px; right:24px; background:var(--color-bg-secondary); padding:16px 24px; border-radius:12px; box-shadow:var(--shadow-lg); display:none; align-items:center; gap:12px; z-index:2000; border-left:4px solid var(--color-success); }
        .toast.active { display:flex; animation:slideIn 0.3s ease; }
        .toast.error { border-left-color:var(--color-error); }
        @keyframes slideIn { from{transform:translateX(400px);opacity:0;} to{transform:translateX(0);opacity:1;} }
        .filters-bar { background:var(--color-bg-secondary); padding:16px 24px; border-radius:12px; margin-bottom:24px; display:flex; gap:16px; flex-wrap:wrap; box-shadow:var(--shadow-sm); }
        .filter-item { flex:1; min-width:200px; }
        .empty-state { text-align:center; padding:60px 20px; }
        .empty-state-icon { font-size:64px; color:var(--color-border); margin-bottom:16px; }
        .empty-state-text { font-size:18px; color:var(--color-text-secondary); margin-bottom:24px; }
        .tabs { display:flex; gap:8px; border-bottom:2px solid var(--color-border); margin-bottom:24px; }
        .tab { padding:12px 24px; background:none; border:none; font-family:'Montserrat',sans-serif; font-size:14px; font-weight:600; color:var(--color-text-secondary); cursor:pointer; border-bottom:3px solid transparent; margin-bottom:-2px; transition:all 0.2s ease; }
        .tab:hover { color:var(--color-text-primary); }
        .tab.active { color:var(--color-text-primary); border-bottom-color:var(--color-text-primary); }
        .page { display:none; }
        .page.active { display:block; }
        .training-card { background:var(--color-bg-secondary); border-radius:12px; padding:20px; margin-bottom:16px; box-shadow:var(--shadow-sm); border-left:4px solid var(--color-info); transition:all 0.2s ease; }
        .training-card:hover { box-shadow:var(--shadow-md); transform:translateY(-2px); }
        .training-card.completed { border-left-color:var(--color-success); }
        .training-card.pending { border-left-color:var(--color-warning); }
        .training-card.to-evaluate { border-left-color:#FF9800; }
        .training-header { display:flex; justify-content:space-between; align-items:start; margin-bottom:12px; }
        .training-title { font-size:16px; font-weight:700; color:var(--color-text-primary); margin-bottom:4px; }
        .training-meta { display:flex; gap:12px; flex-wrap:wrap; font-size:13px; color:var(--color-text-secondary); }
        .training-meta-item { display:flex; align-items:center; gap:6px; }
        .login-container { min-height:100vh; display:flex; align-items:center; justify-content:center; padding:20px; }
        .login-card { background:var(--color-bg-secondary); border-radius:16px; padding:48px; max-width:450px; width:100%; box-shadow:var(--shadow-lg); text-align:center; }
        .login-logo { font-size:48px; margin-bottom:16px; }
        .login-title { font-size:28px; font-weight:700; color:var(--color-text-primary); margin-bottom:8px; }
        .login-subtitle { font-size:14px; color:var(--color-text-secondary); margin-bottom:32px; }
        .checkbox-group { display:flex; align-items:center; gap:8px; margin-top:12px; }
        .checkbox-group input[type="checkbox"] { width:18px; height:18px; cursor:pointer; }
        .checkbox-group label { font-size:14px; color:var(--color-text-secondary); cursor:pointer; }
        .checkbox-item { display:flex; align-items:center; gap:8px; padding:8px; border:1px solid var(--color-border); border-radius:8px; margin-bottom:8px; transition:all 0.2s ease; }
        .checkbox-item:hover { background:var(--color-accent-blue); }
        .checkbox-item input[type="checkbox"] { width:18px; height:18px; cursor:pointer; }
        @media(max-width:768px){
            .sidebar{transform:translateX(-100%);transition:transform 0.3s ease;z-index:200;}
            .sidebar.mobile-open{transform:translateX(0);}
            .main-content{margin-left:0;}
            .stats-grid{grid-template-columns:1fr;}
            .filters-bar{flex-direction:column;}
            .filter-item{min-width:100%;}
        }
        .loading { display:none; text-align:center; padding:40px; }
        .loading.active { display:block; }
        .spinner { border:4px solid var(--color-border); border-top:4px solid var(--color-text-primary); border-radius:50%; width:40px; height:40px; animation:spin 1s linear infinite; margin:0 auto 16px; }
        @keyframes spin{0%{transform:rotate(0deg);}100%{transform:rotate(360deg);}}
        .participants-grid { display:grid; grid-template-columns:repeat(auto-fill,minmax(250px,1fr)); gap:12px; margin-top:16px; }
        .section-subtitle { font-size:13px; color:var(--color-text-secondary); margin-top:-8px; margin-bottom:16px; }
        .alert-list { display:grid; gap:12px; }
        .alert-item { background:#FFF7E8; border:1px solid #FFE1AE; border-radius:12px; padding:14px 16px; }
        .kpi-row { display:flex; gap:10px; flex-wrap:wrap; margin-top:8px; }
        .kpi-pill { background:var(--color-accent-blue); color:var(--color-text-primary); padding:6px 10px; border-radius:999px; font-size:12px; font-weight:600; }
        .month-group { margin-bottom:32px; }
        .month-title { font-size:17px; font-weight:700; margin-bottom:12px; color:var(--color-text-primary); display:flex; align-items:center; gap:8px; }
        .actions-row { display:flex; flex-wrap:wrap; gap:8px; margin-top:14px; }
        .small-text { font-size:12px; color:var(--color-text-secondary); }
        .inline-badge { display:inline-flex; align-items:center; gap:6px; }
        .proof-upload-box { border:1px dashed var(--color-border); border-radius:12px; padding:12px; background:#fafafa; }
        .dashboard-split { display:grid; grid-template-columns:1.1fr 0.9fr; gap:20px; }
        .rank-list { display:grid; gap:10px; }
        .rank-item { display:flex; justify-content:space-between; align-items:center; padding:12px 14px; border:1px solid var(--color-border); border-radius:10px; background:#fff; }
        .muted-box { background:#F7F9FA; border:1px solid var(--color-border); border-radius:12px; padding:14px; }
        @media(max-width:980px){.dashboard-split{grid-template-columns:1fr;}}
        /* FIX #8: Credits badge */
        .credits-pill { background:#E8F5E9; color:#388E3C; padding:4px 10px; border-radius:999px; font-size:12px; font-weight:700; display:inline-flex; align-items:center; gap:4px; }
        /* FIX #10: Plano de Formação */
        .plano-table { width:100%; border-collapse:collapse; }
        .plano-table th, .plano-table td { padding:10px 14px; border-bottom:1px solid var(--color-border); font-size:13px; text-align:left; }
        .plano-table thead { background:var(--color-accent-blue); }
        .objetivo-edit { border:none; background:transparent; font-family:'Montserrat',sans-serif; font-size:14px; color:var(--color-text-primary); width:100%; resize:vertical; min-height:60px; }
        .objetivo-edit:focus { outline:1px solid var(--color-border); border-radius:6px; padding:4px; }
        @media print {
            .sidebar, .topbar, .btn, .actions-row { display:none !important; }
            .main-content { margin-left:0 !important; }
            .content-area { padding:0 !important; }
        }
    </style>
</head>
<body>

<!-- Login Page -->
<div id="loginPage" class="page active">
    <div class="login-container">
        <div class="login-card">
            <div class="login-logo">💊</div>
            <h1 class="login-title">Farmácia da Liga</h1>
            <p class="login-subtitle">Sistema de Gestão de Formações</p>
            <form id="loginForm">
                <div class="form-group">
                    <label class="form-label" for="email">Email</label>
                    <input type="email" id="email" class="form-control" placeholder="seu.email@farmacialiga.pt" required>
                </div>
                <div class="form-group">
                    <label class="form-label" for="password">Password</label>
                    <input type="password" id="password" class="form-control" placeholder="••••••••" required>
                </div>
                <button type="submit" class="btn btn-primary" style="width:100%;margin-top:8px;">Entrar</button>
            </form>
        </div>
    </div>
</div>

<!-- Dashboard Page -->
<div id="dashboardPage" class="page">
    <div class="app-container">
        <aside class="sidebar" id="sidebar">
            <div class="sidebar-header">
                <h1>💊 Farmácia da Liga</h1>
                <p>Gestão de Formações</p>
            </div>
            <nav class="sidebar-menu" id="sidebarMenu"></nav>
        </aside>
        <div class="main-content">
            <header class="topbar">
                <div><h2 id="pageTitle" style="font-size:20px;font-weight:700;">Dashboard</h2></div>
                <div class="user-info">
                    <div class="user-avatar" id="userAvatar">U</div>
                    <div class="user-details">
                        <h3 id="userName">Utilizador</h3>
                        <p id="userRole">Colaborador</p>
                    </div>
                    <button class="btn btn-secondary btn-icon" onclick="logout()" title="Terminar sessão">🚪</button>
                </div>
            </header>
            <main class="content-area" id="contentArea"></main>
        </div>
    </div>
</div>

<!-- Modal Avaliação -->
<div class="modal" id="avaliacaoModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 class="modal-title">Avaliar Formação</h2>
            <button class="close-modal" onclick="closeModal('avaliacaoModal')">✕</button>
        </div>
        <form id="avaliacaoForm" onsubmit="submitAvaliacao(event)">
            <input type="hidden" id="evalTrainingId">
            <div class="rating-group">
                <label class="form-label">⭐ Duração da Ação <span style="color:var(--color-error)">*</span></label>
                <div class="rating-stars" id="stars-duracao"></div>
                <input type="hidden" id="rating-duracao">
            </div>
            <div class="rating-group">
                <label class="form-label">⭐ Capacidade Pedagógica do Formador <span style="color:var(--color-error)">*</span></label>
                <div class="rating-stars" id="stars-pedagogica"></div>
                <input type="hidden" id="rating-pedagogica">
            </div>
            <div class="rating-group">
                <label class="form-label">⭐ Domínio do Tema pelo Formador <span style="color:var(--color-error)">*</span></label>
                <div class="rating-stars" id="stars-dominio"></div>
                <input type="hidden" id="rating-dominio">
            </div>
            <div class="rating-group">
                <label class="form-label">⭐ Relevância para as Tarefas que Desempenha <span style="color:var(--color-error)">*</span></label>
                <div class="rating-stars" id="stars-relevancia"></div>
                <input type="hidden" id="rating-relevancia">
            </div>
            <div class="rating-group">
                <label class="form-label">⭐ Avaliação Global da Ação de Formação <span style="color:var(--color-error)">*</span></label>
                <div class="rating-stars" id="stars-global"></div>
                <input type="hidden" id="rating-global">
            </div>
            <div class="form-group">
                <label class="form-label">Os temas afastam-se da prática instituda na Farmácia? <span style="color:var(--color-error)">*</span></label>
                <select id="afastamentoPratica" class="form-control" required onchange="toggleAfastamentoDetalhe()">
                    <option value="">Selecione...</option>
                    <option value="nao">Não</option>
                    <option value="sim">Sim</option>
                </select>
            </div>
            <div class="form-group" id="detalheAfastamentoGroup" style="display:none;">
                <label class="form-label">Por favor justifique</label>
                <textarea id="detalheAfastamento" class="form-control"></textarea>
            </div>
            <div class="form-group">
                <label class="form-label">Observações / Propostas para implementar os conceitos apreendidos</label>
                <textarea id="observacoesPropostas" class="form-control"></textarea>
            </div>
            <div style="display:flex;gap:12px;">
                <button type="submit" class="btn btn-primary">Submeter Avaliação</button>
                <button type="button" class="btn btn-secondary" onclick="closeModal('avaliacaoModal')">Cancelar</button>
            </div>
        </form>
    </div>
</div>

<!-- Modal Colaborador — FIX #1-3: Nome Completo, NIF, Cédula, Código Operador -->
<div class="modal" id="colaboradorModal">
    <div class="modal-content">
        <div class="modal-header">
            <h2 class="modal-title" id="colaboradorModalTitle">Adicionar Colaborador</h2>
            <button class="close-modal" onclick="closeModal('colaboradorModal')">✕</button>
        </div>
        <form id="colaboradorForm" onsubmit="submitColaborador(event)">
            <input type="hidden" id="colaboradorId">
            <div class="form-group">
                <label class="form-label" for="colabNome">Nome Completo</label>
                <input type="text" id="colabNome" class="form-control" required>
            </div>
            <div class="form-group">
                <label class="form-label" for="colabEmail">Email</label>
                <input type="email" id="colabEmail" class="form-control" required>
            </div>
            <div style="display:grid;grid-template-columns:1fr 1fr;gap:16px;">
                <div class="form-group">
                    <label class="form-label" for="colabNIF">NIF</label>
                    <input type="text" id="colabNIF" class="form-control" placeholder="Ex: 123456789" maxlength="9">
                </div>
                <div class="form-group">
                    <label class="form-label" for="colabCedula">Cédula Profissional</label>
                    <input type="text" id="colabCedula" class="form-control" placeholder="Ex: OF-12345">
                </div>
            </div>
            <div class="form-group">
                <label class="form-label" for="colabCodigoOperador">Código Operador</label>
                <input type="text" id="colabCodigoOperador" class="form-control" placeholder="Ex: OP001">
            </div>
            <div class="form-group">

function buildMenu() {

        { id:'planoFormacao', label:'Plano de Formação', icon:'📋' },
        { separator:true },

        { id:'manifestarNecessidade', label:'Necessidade de Formação', icon:'💡' },
        { id:'historicoAvaliacoes', label:'Histórico de Avaliações', icon:'📜' }
    ] : [
        { id:'minhasFormacoes', label:'As Minhas Formações', icon:'🎓' },
        { id:'manifestarNecessidade', label:'Necessidade de Formação', icon:'💡' },

        return `<div class="menu-item" onclick="navigateTo('${item.id}')">${item.icon} ${item.label}</div>`;
    }).join('');
}

function navigateTo(pageId) {
    document.querySelectorAll('.menu-item').forEach(item => {
        item.classList.toggle('active', item.textContent.trim().includes(
            { todasFormacoes:'Todas as Formações', criarFormacao:'Criar Formação', colaboradores:'Colaboradores', necessidadesFormacao:'Necessidades de Formação', relatorios:'Relatórios', planoFormacao:'Plano de Formação', minhasFormacoes:'As Minhas Formações', manifestarNecessidade:'Necessidade de Formação', historicoAvaliacoes:'Histórico de Avaliações' }[pageId] || ''
        ));
    });
    const isGestor = currentUserData && currentUserData.role === 'gestorformacao';
    switch(pageId) {
        case 'minhasFormacoes': loadMinhasFormacoes(); break;
        case 'manifestarNecessidade': loadManifestarNecessidade(); break;
        case 'historicoAvaliacoes': loadHistoricoAvaliacoes(); break;
        case 'todasFormacoes': if(isGestor) loadTodasFormacoes(); break;
        case 'criarFormacao': if(isGestor) loadCriarFormacao(); break;
        case 'colaboradores': if(isGestor) loadColaboradores(); break;
        case 'necessidadesFormacao': if(isGestor) loadNecessidadesGestor(); break;
        case 'relatorios': if(isGestor) loadRelatorios(); break;
        case 'planoFormacao': if(isGestor) loadPlanoFormacao(); break;
    }
}

// ─── COLABORADOR AREA ─────────────────────────────────────────────────────────
// FIX #9 (cards mensais para colaboradores) + FIX #11 (entidade/créditos visíveis)
async function loadMinhasFormacoes() {
    document.getElementById('pageTitle').textContent = 'As Minhas Formações';
    document.getElementById('contentArea').innerHTML = `
        <div id="statsMinhas" class="stats-grid"></div>
        <div id="formacoesContainer"><div class="loading active"><div class="spinner"></div><p>A carregar formações...</p></div></div>
    `;
    await carregarMinhasFormacoes();
}

async function carregarMinhasFormacoes() {
    try {
        const enrollmentsSnap = await db.collection('enrollments').where('userId','==',currentUser.uid).get();
        if (enrollmentsSnap.empty) {
            document.getElementById('formacoesContainer').innerHTML = `<div class="empty-state"><div class="empty-state-icon">📚</div><p class="empty-state-text">Ainda não tem formações atribuídas</p></div>`;
            renderStatsMinhas([]);
            return;
        }
        const trainings = [];
        for (const enrollDoc of enrollmentsSnap.docs) {
            const d = enrollDoc.data();
            const tDoc = await db.collection('trainings').doc(d.trainingId).get();
            if (tDoc.exists) trainings.push({ id:tDoc.id, ...tDoc.data(), enrollment:{ id:enrollDoc.id, ...d } });
        }
        renderStatsMinhas(trainings);
        renderFormacoesPorMes(trainings);
    } catch(e) { console.error(e); showToast('Erro ao carregar formações','error'); }
}

function renderStatsMinhas(trainings) {
    const now = new Date();
    const futuras = trainings.filter(t => t.data && new Date(t.data.seconds*1000) > now).length;
    const concluidas = trainings.filter(t => t.data && new Date(t.data.seconds*1000) <= now).length;
    const porAvaliar = trainings.filter(t => t.avaliacaoAutorizada && t.enrollment.estadoInscricao==='Presente' && !t.enrollment.avaliado).length;
    const totalHoras = trainings.reduce((s,t) => s+(t.duracaoHoras||0), 0);
    const isFarma = currentUserData && currentUserData.funcao === 'Farmacêutico';
    const totalCreditos = isFarma ? trainings.filter(t=>t.data&&new Date(t.data.seconds*1000)<=now).reduce((s,t)=>s+(parseFloat(t.creditos)||0),0) : null;
    document.getElementById('statsMinhas').innerHTML = `
        <div class="stat-card blue"><div class="stat-label">Formações Futuras</div><div class="stat-value">${futuras}</div></div>
        <div class="stat-card green"><div class="stat-label">Formações Concluídas</div><div class="stat-value">${concluidas}</div></div>
        <div class="stat-card warning"><div class="stat-label">Por Avaliar</div><div class="stat-value">${porAvaliar}</div></div>
        <div class="stat-card"><div class="stat-label">Total de Horas</div><div class="stat-value">${totalHoras}h</div></div>
        ${isFarma ? `<div class="stat-card purple"><div class="stat-label">💊 Créditos Farmacêuticos</div><div class="stat-value">${totalCreditos.toFixed(1)}</div></div>` : ''}
    `;
}

// FIX #9: Cards agrupados por mês — FIX #11: Entidade e créditos visíveis
function renderFormacoesPorMes(trainings) {
    const container = document.getElementById('formacoesContainer');
    if (!trainings.length) {
        container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📚</div><p class="empty-state-text">Nenhuma formação encontrada</p></div>`;
        return;
    }
    const sorted = [...trainings].sort((a,b) => {
        const da = a.data ? a.data.seconds : 0;
        const db2 = b.data ? b.data.seconds : 0;
        return db2 - da;
    });
    const grouped = {};
    sorted.forEach(t => {
        const d = t.data ? new Date(t.data.seconds*1000) : new Date();
        const key = d.toLocaleDateString('pt-PT',{year:'numeric',month:'long'});
        if (!grouped[key]) grouped[key] = { agendadas:0, feitas:0, porAvaliar:0, creditos:0, items:[] };
        const now = new Date();
        const isFuture = d > now;
        const canEval = t.avaliacaoAutorizada && t.enrollment.estadoInscricao==='Presente' && !t.enrollment.avaliado;
        if (isFuture) grouped[key].agendadas++;
        else grouped[key].feitas++;
        if (canEval) grouped[key].porAvaliar++;
        if (!isFuture && currentUserData.funcao==='Farmacêutico') grouped[key].creditos += parseFloat(t.creditos||0);
        grouped[key].items.push(t);
    });
    const isFarma = currentUserData && currentUserData.funcao === 'Farmacêutico';
    container.innerHTML = Object.entries(grouped).map(([month, data]) => `
        <div class="month-group">
            <div class="month-title">📅 ${month}
                <span class="badge badge-info" style="font-size:11px;">${data.agendadas} agendadas</span>
                <span class="badge badge-success" style="font-size:11px;">${data.feitas} feitas</span>
                ${data.porAvaliar>0 ? `<span class="badge badge-warning" style="font-size:11px;">${data.porAvaliar} por avaliar</span>` : ''}
                ${isFarma && data.creditos>0 ? `<span class="credits-pill">💊 ${data.creditos.toFixed(1)} créditos</span>` : ''}
            </div>
            ${data.items.map(t => {
                const d = t.data ? new Date(t.data.seconds*1000) : new Date();
                const isFuture = d > new Date();
                const canEval = t.avaliacaoAutorizada && t.enrollment.estadoInscricao==='Presente' && !t.enrollment.avaliado;
                const isAbsent = t.enrollment.estadoInscricao === 'Não Compareceu';
                // FIX #6: só "Não compareci" ou "Avaliar"
                let actionBtn = '';
                if (isFuture && !isAbsent) {
                    actionBtn = `<button class="btn btn-danger" style="font-size:12px;padding:6px 12px;" onclick="marcarAusencia('${t.id}','${t.enrollment.id}')">✕ Não compareci</button>`;
                }
                if (canEval) {
                    actionBtn = `<button class="btn btn-warning" style="font-size:12px;padding:6px 12px;" onclick="abrirAvaliacao('${t.id}')">⭐ Avaliar</button>`;
                }
                return `<div class="training-card ${isFuture?'pending':'completed'}">
                    <div class="training-header">
                        <div>
                            <div class="training-title">${t.tema||'Sem título'}</div>
                            <div class="training-meta">
                                <span class="training-meta-item">📅 ${d.toLocaleDateString('pt-PT')}</span>
                                <span class="training-meta-item">⏱ ${t.duracaoHoras||0}h</span>
                                <span class="training-meta-item">👤 ${t.formador||'N/A'}</span>
                                ${t.entidadeFormadora ? `<span class="training-meta-item">🏢 ${t.entidadeFormadora}</span>` : ''}
                                ${isFarma && t.creditos ? `<span class="credits-pill">💊 ${t.creditos} créditos</span>` : ''}
                                ${t.local ? `<span class="training-meta-item">📍 ${t.local}</span>` : ''}
                            </div>
                        </div>
                        <div style="display:flex;flex-direction:column;align-items:flex-end;gap:6px;">
                            <span class="badge ${isFuture?'badge-info':'badge-success'}">${isAbsent?'Ausente':isFuture?'Agendada':'Concluída'}</span>
                            ${actionBtn}
                        </div>
                    </div>
                    ${t.objetivos ? `<div class="muted-box" style="margin-top:8px;"><small><strong>Objetivos:</strong> ${t.objetivos}</small></div>` : ''}
                </div>`;
            }).join('')}
        </div>
    `).join('');
}

// FIX #6: Marcar ausência (sem fluxo de presença — só ausência ou avaliação)
async function marcarAusencia(trainingId, enrollmentId) {
    if (!confirm('Confirmar que não compareceu nesta formação?')) return;
    try {
        await db.collection('enrollments').doc(enrollmentId).update({ estadoInscricao:'Não Compareceu' });
        showToast('Ausência registada.', 'success');
        carregarMinhasFormacoes();
    } catch(e) { showToast('Erro ao registar ausência','error'); }
}

function abrirAvaliacao(trainingId) {
    document.getElementById('evalTrainingId').value = trainingId;
    initRatingStars();
    openModal('avaliacaoModal');
}

function initRatingStars() {
    const fields = ['duracao','pedagogica','dominio','relevancia','global'];
    fields.forEach(field => {
        const container = document.getElementById(`stars-${field}`);
        container.innerHTML = '';
        document.getElementById(`rating-${field}`).value = '';
        for (let i=1;i<=5;i++) {
            const star = document.createElement('span');
            star.className = 'star';
            star.textContent = '★';
            star.onclick = () => setRating(field, i);
            container.appendChild(star);
        }
    });
}

function setRating(field, value) {
    document.getElementById(`rating-${field}`).value = value;
    const stars = document.querySelectorAll(`#stars-${field} .star`);
    stars.forEach((star,i) => star.classList.toggle('active', i<value));
}

function toggleAfastamentoDetalhe() {
    const val = document.getElementById('afastamentoPratica').value;
    const group = document.getElementById('detalheAfastamentoGroup');
    group.style.display = val==='sim' ? 'block' : 'none';
    document.getElementById('detalheAfastamento').required = val==='sim';
}

// FIX #7: Todas as estrelas obrigatórias antes de submeter
async function submitAvaliacao(event) {
    event.preventDefault();
    // Validar todas as estrelas
    const fields = ['duracao','pedagogica','dominio','relevancia','global'];
    for (const f of fields) {
        if (!document.getElementById(`rating-${f}`).value) {
            showToast(`Por favor avalie: ${f}`, 'error'); return;
        }
    }
    const trainingId = document.getElementById('evalTrainingId').value;
    try {
        await db.collection('evaluations').add({
            trainingId, userId:currentUser.uid,
            duracaoAcao: parseInt(document.getElementById('rating-duracao').value),
            capacidadePedagogicaFormador: parseInt(document.getElementById('rating-pedagogica').value),
            dominioTemaFormador: parseInt(document.getElementById('rating-dominio').value),
            relevanciaParaTarefas: parseInt(document.getElementById('rating-relevancia').value),
            avaliacaoGlobal: parseInt(document.getElementById('rating-global').value),
            afastaDaPratica: document.getElementById('afastamentoPratica').value === 'sim',
            detalheAfastamento: document.getElementById('detalheAfastamento').value,
            observacoesPropostas: document.getElementById('observacoesPropostas').value,
            dataSubmissao: firebase.firestore.FieldValue.serverTimestamp()
        });
        // FIX #6: marcar presença automaticamente ao avaliar
        const enrollSnap = await db.collection('enrollments').where('trainingId','==',trainingId).where('userId','==',currentUser.uid).get();
        if (!enrollSnap.empty) {
            await db.collection('enrollments').doc(enrollSnap.docs[0].id).update({ avaliado:true, estadoInscricao:'Presente' });
        }
        showToast('Avaliação submetida com sucesso!', 'success');
        closeModal('avaliacaoModal');
        document.getElementById('avaliacaoForm').reset();
        carregarMinhasFormacoes();
    } catch(e) { console.error(e); showToast('Erro ao submeter avaliação','error'); }
}

async function submitNecessidade(event) {
    event.preventDefault();
    try {
        await db.collection('trainingNeeds').add({
            userId:currentUser.uid, nomeColaborador:currentUserData.nome,
            temaNecessidade:document.getElementById('temaNecessidade').value,
            urgencia:document.getElementById('urgencia').value,

            comentariosAdicionais:document.getElementById('comentarios').value,
            estado:'Submetida', createdAt:firebase.firestore.FieldValue.serverTimestamp()
        });
        showToast('Pedido submetido com sucesso!','success');
        document.getElementById('necessidadeForm').reset();
        carregarHistoricoNecessidades();
    } catch(e) { showToast('Erro ao submeter pedido','error'); }
}

async function carregarHistoricoNecessidades() {
    try {
        const snap = await db.collection('trainingNeeds').where('userId','==',currentUser.uid).orderBy('createdAt','desc').get();
        const c = document.getElementById('historicoNecessidades');
        if (snap.empty) { c.innerHTML=`<div class="empty-state"><div class="empty-state-icon">📝</div><p class="empty-state-text">Ainda não submeteu pedidos</p></div>`; return; }
        c.innerHTML = `<div class="table-container"><table><thead><tr><th>Data</th><th>Tema</th><th>Urgência</th><th>Laboratório</th><th>Estado</th></tr></thead><tbody>
        ${snap.docs.map(doc => {
            const d=doc.data(); const date=d.createdAt?new Date(d.createdAt.seconds*1000):new Date();
            return `<tr><td>${date.toLocaleDateString('pt-PT')}</td><td>${d.temaNecessidade}</td>
            <td><span class="badge badge-${getUrgenciaBadge(d.urgencia)}">${d.urgencia}</span></td>
            <td>${d.laboratorioMarca||'-'}</td>

async function loadTodasFormacoes() {
    document.getElementById('pageTitle').textContent = 'Gestão de Formações';
    document.getElementById('contentArea').innerHTML = `
        <div class="card" style="margin-bottom:24px;">
            <div class="card-header">

            </div>
            <div class="filters-bar" style="margin-bottom:16px;">
                <div class="filter-item"><select id="filtroAno" class="form-control" onchange="carregarTodasFormacoes()">
                    <option value="">Todos os anos</option>
                    <option value="2024">2024</option><option value="2025">2025</option><option value="2026" selected>2026</option>
                </select></div>
                <div class="filter-item"><input type="text" id="filtroTema" class="form-control" placeholder="Pesquisar tema..." oninput="carregarTodasFormacoes()"></div>

        </div>`;

}

async function carregarTodasFormacoes() {
    try {
        const snap = await db.collection('trainings').orderBy('data','desc').get();
        const ano = document.getElementById('filtroAno')?.value || '';
        const tema = (document.getElementById('filtroTema')?.value || '').toLowerCase();
        let trainings = await Promise.all(snap.docs.map(async doc => {
            const data=doc.data();
            const enrollSnap = await db.collection('enrollments').where('trainingId','==',doc.id).get();
            return { id:doc.id, ...data, numParticipantes:enrollSnap.size };
        }));
        if (ano) trainings = trainings.filter(t => t.data && new Date(t.data.seconds*1000).getFullYear()==ano);
        if (tema) trainings = trainings.filter(t => (t.tema||'').toLowerCase().includes(tema));
        renderTodasFormacoesPorMes(trainings);
    } catch(e) { console.error(e); showToast('Erro ao carregar formações','error'); }
}

// FIX: Cards por mês para gestão
function renderTodasFormacoesPorMes(trainings) {
    const container = document.getElementById('todasFormacoesContainer');
    if (!trainings.length) {
        container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📚</div><p class="empty-state-text">Nenhuma formação encontrada</p><button class="btn btn-primary" onclick="navigateTo('criarFormacao')">Criar Primeira Formação</button></div>`;
        return;
    }
    const grouped = {};
    trainings.forEach(t => {
        const d = t.data ? new Date(t.data.seconds*1000) : new Date();
        const key = d.toLocaleDateString('pt-PT',{year:'numeric',month:'long'});
        if (!grouped[key]) grouped[key] = { agendadas:0, feitas:0, porAvaliar:0, items:[] };
        const isFuture = d > new Date();
        if (isFuture) grouped[key].agendadas++;
        else grouped[key].feitas++;
        if (t.estado === 'Em avaliação') grouped[key].porAvaliar++;
        grouped[key].items.push(t);
    });
    container.innerHTML = Object.entries(grouped).map(([month, data]) => `
        <div class="month-group">
            <div class="month-title">📅 ${month}
                <span class="badge badge-info" style="font-size:11px;">${data.agendadas} agendadas</span>
                <span class="badge badge-success" style="font-size:11px;">${data.feitas} feitas</span>
                ${data.porAvaliar>0?`<span class="badge badge-warning" style="font-size:11px;">${data.porAvaliar} notas por avaliar</span>`:''}
            </div>
            <div class="table-container">
            <table><thead><tr><th>Data</th><th>Tema</th><th>Entidade Formadora</th><th>Formador</th><th>Duração</th><th>Participantes</th><th>Créditos</th><th>Estado</th><th>Ações</th></tr></thead>
            <tbody>${data.items.map(t => {
                const d = t.data?new Date(t.data.seconds*1000):new Date();
                return `<tr>
                    <td>${d.toLocaleDateString('pt-PT')}</td>
                    <td><strong>${t.tema||'Sem título'}</strong></td>
                    <td>${t.entidadeFormadora||'-'}</td>
                    <td>${t.formador||'-'}</td>
                    <td>${t.duracaoHoras||0}h</td>
                    <td>${t.numParticipantes}</td>
                    <td>${t.creditos||'-'}</td>
                    <td><span class="badge badge-${getEstadoBadgeClass(t.estado)}">${t.estado||'Rascunho'}</span></td>
                    <td style="white-space:nowrap;">
                        <button class="btn btn-secondary btn-icon" onclick="editarFormacao('${t.id}')" title="Editar">✏️</button>
                        <button class="btn btn-warning btn-icon" onclick="gerirParticipantes('${t.id}')" title="Participantes">👥</button>
                        ${t.estado==='Concluida'&&!t.avaliacaoAutorizada?`<button class="btn btn-success btn-icon" onclick="autorizarAvaliacao('${t.id}')" title="Autorizar Avaliação">✓</button>`:''}
                        <button class="btn btn-danger btn-icon" onclick="eliminarFormacao('${t.id}')" title="Eliminar">🗑️</button>
                    </td>
                </tr>`;
            }).join('')}</tbody></table></div>
        </div>
    `).join('');
}

async function submitFormacao(event) {
    event.preventDefault();
    try {
        const dataStr = document.getElementById('data').value;
        const horaStr = document.getElementById('horaInicio').value;
        const dataHora = new Date(`${dataStr}T${horaStr}`);
        const editId = document.getElementById('editFormacaoId').value;
        const payload = {
            tema: document.getElementById('tema').value,
            entidadeFormadora: document.getElementById('entidadeFormadora').value,
            formador: document.getElementById('formador').value,
            data: firebase.firestore.Timestamp.fromDate(dataHora),
            horaInicio: horaStr,
            duracaoHoras: parseFloat(document.getElementById('duracaoHoras').value),
            creditos: parseFloat(document.getElementById('creditos').value)||0,
            laboratorioMarca: document.getElementById('laboratorioMarca').value,
            local: document.getElementById('local').value,
            objetivos: document.getElementById('objetivos').value,
            descricao: document.getElementById('descricao').value,
            estado: document.getElementById('estado').value,
            avaliacaoAutorizada: false,
            updatedAt: firebase.firestore.FieldValue.serverTimestamp()
        };
        if (editId) {
            await db.collection('trainings').doc(editId).update(payload);
            showToast('Formação atualizada!','success');
        } else {
            payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
            await db.collection('trainings').add(payload);
            showToast('Formação criada com sucesso!','success');
        }
        navigateTo('todasFormacoes');
    } catch(e) { console.error(e); showToast('Erro ao guardar formação','error'); }
}

async function editarFormacao(trainingId) {
    try {
        const doc = await db.collection('trainings').doc(trainingId).get();
        if (!doc.exists) return;
        const data = doc.data();
        const d = data.data ? new Date(data.data.seconds*1000) : new Date();
        const dataStr = d.toISOString().split('T')[0];
        loadCriarFormacao({ id:trainingId, ...data, dataStr });
    } catch(e) { showToast('Erro ao carregar formação','error'); }
}

async function autorizarAvaliacao(trainingId) {
    try {
        await db.collection('trainings').doc(trainingId).update({ avaliacaoAutorizada:true, estado:'Em avaliação' });
        showToast('Avaliação autorizada! Colaboradores podem agora avaliar.','success');
        carregarTodasFormacoes();
    } catch(e) { showToast('Erro ao autorizar avaliação','error'); }
}

async function eliminarFormacao(trainingId) {
    if (!confirm('Tem certeza que deseja eliminar esta formação? Esta ação não pode ser revertida.')) return;
    try {
        const batch = db.batch();
        const enrollSnap = await db.collection('enrollments').where('trainingId','==',trainingId).get();
        enrollSnap.forEach(doc => batch.delete(doc.ref));
        const evalSnap = await db.collection('evaluations').where('trainingId','==',trainingId).get();
        evalSnap.forEach(doc => batch.delete(doc.ref));
        batch.delete(db.collection('trainings').doc(trainingId));
        await batch.commit();
        showToast('Formação eliminada com sucesso!','success');
        carregarTodasFormacoes();
    } catch(e) { showToast('Erro ao eliminar formação','error'); }
}

async function gerirParticipantes(trainingId) {
    document.getElementById('participantesTrainingId').value = trainingId;
    try {
        const usersSnap = await db.collection('users').where('ativo','==',true).orderBy('nome').get();
        const enrollSnap = await db.collection('enrollments').where('trainingId','==',trainingId).get();
        const enrolled = enrollSnap.docs.map(d=>d.data().userId);
        document.getElementById('participantesContainer').innerHTML = usersSnap.docs.map(doc => {
            const u=doc.data(); const isIn=enrolled.includes(doc.id);
            return `<div class="checkbox-item">
                <input type="checkbox" id="user-${doc.id}" value="${doc.id}" ${isIn?'checked':''}>
                <label for="user-${doc.id}" style="flex:1;cursor:pointer;"><strong>${u.nome}</strong><br><small style="color:var(--color-text-secondary)">${u.funcao||'-'}</small></label>
            </div>`;
        }).join('');
        openModal('participantesModal');
    } catch(e) { showToast('Erro ao carregar participantes','error'); }
}

function selecionarTodos() { document.querySelectorAll('#participantesContainer input[type=checkbox]').forEach(cb=>cb.checked=true); }
function desselecionarTodos() { document.querySelectorAll('#participantesContainer input[type=checkbox]').forEach(cb=>cb.checked=false); }

async function salvarParticipantes() {
    const trainingId = document.getElementById('participantesTrainingId').value;
    const checked = [...document.querySelectorAll('#participantesContainer input[type=checkbox]:checked')].map(cb=>cb.value);
    try {
        const batch = db.batch();
        const curr = await db.collection('enrollments').where('trainingId','==',trainingId).get();
        curr.forEach(doc=>batch.delete(doc.ref));
        checked.forEach(userId => {
            const ref = db.collection('enrollments').doc();
            batch.set(ref,{ trainingId, userId, estadoInscricao:'Convocado', foiConvocadoPeloGestor:true, avaliado:false, createdAt:firebase.firestore.FieldValue.serverTimestamp() });
        });
        await batch.commit();
        showToast(`${checked.length} participante(s) guardado(s)!`,'success');
        closeModal('participantesModal');
    } catch(e) { showToast('Erro ao guardar participantes','error'); }
}

async function verHistoricoColaborador(uid) {

            return { ...d, training:tDoc.exists?tDoc.data():{} };
        }));
        const isFarma = u.funcao === 'Farmacêutico';
        const totalCreditos = isFarma ? trainings.reduce((s,t)=>s+(parseFloat(t.training.creditos)||0),0) : 0;
        const totalHoras = trainings.reduce((s,t)=>s+(parseFloat(t.training.duracaoHoras)||0),0);

                    <div class="muted-box"><div class="stat-label">Cód. Operador</div><div style="font-weight:600;">${u.codigoOperador||'-'}</div></div>
                    <div class="muted-box"><div class="stat-label">Função</div><div style="font-weight:600;">${u.funcao||'-'}</div></div>
                    <div class="muted-box"><div class="stat-label">Total Horas</div><div style="font-weight:600;">${totalHoras}h</div></div>
                    ${isFarma?`<div class="muted-box"><div class="stat-label">💊 Créditos</div><div style="font-weight:600;color:#388E3C;">${totalCreditos.toFixed(1)}</div></div>`:''}
                </div>
                <div class="table-container"><table><thead><tr>
                    <th>Data</th><th>Formação</th><th>Entidade Formadora</th><th>Duração</th>
                    ${isFarma?'<th>Créditos</th>':''}
                    <th>Estado Inscrição</th><th>Avaliado</th>
                </tr></thead><tbody>
                ${trainings.map(t => {
                    const d = t.training.data ? new Date(t.training.data.seconds*1000) : new Date();
                    return `<tr>
                        <td>${d.toLocaleDateString('pt-PT')}</td>
                        <td>${t.training.tema||'-'}</td>
                        <td>${t.training.entidadeFormadora||'-'}</td>
                        <td>${t.training.duracaoHoras||0}h</td>
                        ${isFarma?`<td><span class="credits-pill">💊 ${t.training.creditos||0}</span></td>`:''}
                        <td><span class="badge badge-${t.estadoInscricao==='Presente'?'success':t.estadoInscricao==='Não Compareceu'?'error':'info'}">${t.estadoInscricao||'-'}</span></td>
                        <td>${t.avaliado?'✅':'⏳'}</td>
                    </tr>`;
                }).join('')}
                </tbody></table></div>
            </div>`;
        document.getElementById('pageTitle').textContent = `Histórico: ${u.nome}`;
    } catch(e) { showToast('Erro ao carregar histórico','error'); }
}
