<script>
(function () {
  /* ─── Helpers ─── */
  function asDateP(v) {
    if (!v) return null;
    if (v.toDate) return v.toDate();
    if (v.seconds) return new Date(v.seconds * 1000);
    const d = new Date(v); return isNaN(d) ? null : d;
  }
  function fmtDate(d) {
    if (!d) return '—';
    return d.toLocaleDateString('pt-PT', { day: '2-digit', month: '2-digit', year: 'numeric' });
  }
  function fmtDateLong(d) {
    if (!d) return '—';
    return d.toLocaleDateString('pt-PT', { weekday: 'long', day: 'numeric', month: 'long', year: 'numeric' });
  }
  function minToH(min) {
    min = Number(min) || 0;
    if (min >= 60) return Math.floor(min / 60) + 'h' + (min % 60 ? String(min % 60).padStart(2, '0') : '');
    return min + 'min';
  }
  function csvQ(v) { return '"' + String(v ?? '').replace(/"/g, '""') + '"'; }
  function downloadCSVFile(filename, rows, sep = ';') {
    const bom = '\uFEFF';
    const csv = bom + rows.map(r => r.map(csvQ).join(sep)).join('\r\n');
    const blob = new Blob([csv], { type: 'text/csv;charset=utf-8;' });
    const a = document.createElement('a');
    a.href = URL.createObjectURL(blob);
    a.download = filename;
    a.click();
    setTimeout(() => URL.revokeObjectURL(a.href), 2000);
  }
  function getStatus(t) {
    const m = (t.estadoManual || '').toLowerCase();
    if (['cancelada', 'adiada', 'realizada'].includes(m)) return m;
    const e = (t.estado || '').toLowerCase();
    if (['cancelada', 'adiada', 'realizada'].includes(e)) return e;
    const d = asDateP(t.data || t.date || t.dataFormacao);
    if (!d) return 'agendada';
    const today = new Date(); today.setHours(0, 0, 0, 0);
    const td = new Date(d); td.setHours(0, 0, 0, 0);
    return td <= today ? 'realizada' : 'agendada';
  }
  function getDuration(t) {
    if (t.durationMinutes != null) return Number(t.durationMinutes) || 0;
    if (t.duracaoMinutos != null) return Number(t.duracaoMinutos) || 0;
    if (t.duracaoHoras != null) return Math.round(Number(t.duracaoHoras) * 60);
    return 0;
  }
  function getParticipants(t) {
    const arr = t.participantes || t.participants || t.inscritos || [];
    return (Array.isArray(arr) ? arr : []).map(p => typeof p === 'string' ? p : (p.userId || p.id || p.uid || null)).filter(Boolean);
  }

  /* ─── 1. MAPA DE FORMAÇÕES ─── */
  window.abrirMapaFormacoes = async function () {
    const body = document.getElementById('mapaFormacaoBody');
    body.innerHTML = '<div class="loading active"><div class="spinner"></div><p>A carregar mapa...</p></div>';
    openModal('mapaFormacaoModal');
    try {
      const snap = await db.collection('trainings').orderBy('data').get();
      const trainings = snap.docs.map(d => ({ id: d.id, ...d.data() }));

      // Group by month
      const months = {};
      trainings.forEach(t => {
        const dt = asDateP(t.data || t.date || t.dataFormacao);
        if (!dt) return;
        const key = dt.getFullYear() + '-' + String(dt.getMonth() + 1).padStart(2, '0');
        const label = dt.toLocaleDateString('pt-PT', { month: 'long', year: 'numeric' });
        months[key] = months[key] || { label, days: {}, trainings: [] };
        months[key].trainings.push({ ...t, _dt: dt });
        const dayKey = dt.getDate();
        months[key].days[dayKey] = months[key].days[dayKey] || [];
        months[key].days[dayKey].push(t);
      });

      if (!Object.keys(months).length) {
        body.innerHTML = '<div class="empty-state"><div class="empty-state-icon">🗓️</div><p class="empty-state-text">Nenhuma formação com data definida.</p></div>';
        return;
      }

      const statusColor = { agendada: '#64B5F6', realizada: '#7BC97F', cancelada: '#E57373', adiada: '#FFB84D' };

      body.innerHTML = Object.entries(months).sort().map(([key, m]) => {
        const [year, month] = key.split('-').map(Number);
        const firstDay = new Date(year, month - 1, 1).getDay(); // 0=Sun
        const daysInMonth = new Date(year, month, 0).getDate();
        const startOffset = firstDay === 0 ? 6 : firstDay - 1; // Mon=0

        let cells = '';
        // Empty cells
        for (let i = 0; i < startOffset; i++) cells += '<div></div>';
        // Day cells
        for (let d = 1; d <= daysInMonth; d++) {
          const dayTrainings = m.days[d] || [];
          const dots = dayTrainings.map(t => {
            const st = getStatus(t);
            return `<div title="${(t.tema||'').replace(/"/g,'')}" style="width:8px;height:8px;border-radius:50%;background:${statusColor[st]||'#64B5F6'};display:inline-block;margin:1px;cursor:pointer;" onclick="abrirDetalheFormacao('${t.id}')"></div>`;
          }).join('');
          const hasT = dayTrainings.length > 0;
          cells += `<div style="min-height:44px;padding:4px;border:1px solid #E0D5C7;border-radius:6px;${hasT ? 'background:#F0F9FF;' : ''}">
            <div style="font-size:11px;font-weight:600;color:#4A6572;">${d}</div>
            <div>${dots}</div>
          </div>`;
        }

        const tableRows = m.trainings.map(t => {
          const st = getStatus(t);
          return `<tr>
            <td>${fmtDate(t._dt)}</td>
            <td><strong>${(t.tema||'—').replace(/</g,'&lt;')}</strong></td>
            <td>${(t.formador||'—').replace(/</g,'&lt;')}</td>

            return `<div style="display:flex;justify-content:space-between;align-items:center;padding:12px 16px;border:1px solid var(--color-border);border-radius:10px;background:#fff;">

  window.updateAttRow = function (radio, userId) {
    ['present', 'absent'].forEach(val => {
      const lbl = document.getElementById('attLabel_' + val + '_' + userId);
      const parentLabel = lbl?.closest('label');
      if (!parentLabel) return;
      if (radio.value === val) {
        parentLabel.style.borderColor = val === 'present' ? '#7BC97F' : '#E57373';
        parentLabel.style.background = val === 'present' ? '#DFF3E3' : '#FFEBEE';
      } else {
        parentLabel.style.borderColor = '#E0D5C7';
        parentLabel.style.background = '#fff';
      }
    });
  };

  window.marcarTodosPresentes = function () {
    document.querySelectorAll('#presencaModalBody input[type="radio"][value="present"]').forEach(r => { r.checked = true; updateAttRow(r, r.name.replace('att_', '')); });
  };
  window.marcarTodosAusentes = function () {
    document.querySelectorAll('#presencaModalBody input[type="radio"][value="absent"]').forEach(r => { r.checked = true; updateAttRow(r, r.name.replace('att_', '')); });

  window.guardarPresencas = async function () {
    if (!_presencaTrainingId) return;
    const radios = document.querySelectorAll('#presencaModalBody input[type="radio"]:checked');
    if (!radios.length) { showToast('Nenhuma presença para registar.', 'error'); return; }

    try {
      const batch = db.batch();
      radios.forEach(r => {
        const userId = r.name.replace('att_', '');
        const ref = db.collection('attendance').doc(_presencaTrainingId + '_' + userId);
        batch.set(ref, {
          trainingId: _presencaTrainingId,
          userId,
          status: r.value,
          updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
          updatedBy: currentUser.uid
        }, { merge: true });
      });
      await batch.commit();

      // Assign OF credits to Farmacêuticos if present
      const tDoc = await db.collection('trainings').doc(_presencaTrainingId).get();
      const t = tDoc.data();
      if (t.creditosOF) {
        const usersSnap = await db.collection('users').get();
        const usersMap = {};
        usersSnap.forEach(d => usersMap[d.id] = d.data());
        const creditBatch = db.batch();
        radios.forEach(r => {
          if (r.value !== 'present') return;
          const userId = r.name.replace('att_', '');
          const u = usersMap[userId];
          if (u && u.funcao === 'Farmacêutico') {
            const ref = db.collection('creditosOF').doc(_presencaTrainingId + '_' + userId);
            creditBatch.set(ref, {
              userId, trainingId: _presencaTrainingId,
              tema: t.tema, entidadeFormadora: t.entidadeFormadora || '',
              creditos: Number(t.creditosOF), data: t.data,
              atribuidoEm: firebase.firestore.FieldValue.serverTimestamp()
            }, { merge: true });
          }
        });
        await creditBatch.commit();
      }

      showToast('Presenças guardadas com sucesso!', 'success');
      closeModal('presencaModal');
      if (typeof loadTodasFormacoes === 'function') loadTodasFormacoes();
    } catch (e) {
      console.error(e);
      showToast('Erro ao guardar presenças: ' + e.message, 'error');
    }
  };

  window.apagarFormacao = async function (trainingId) {
    const tDoc = await db.collection('trainings').doc(trainingId).get();
    if (!tDoc.exists) return showToast('Formação não encontrada.', 'error');
    const st = getStatus(tDoc.data());
    if (st === 'realizada') return showToast('Não é possível apagar formações já realizadas.', 'error');
    if (!confirm('Tem a certeza que pretende APAGAR definitivamente esta formação? Esta ação não pode ser revertida.')) return;
    try {
      await db.collection('trainings').doc(trainingId).delete();
      showToast('Formação apagada com sucesso.', 'success');
      if (typeof loadTodasFormacoes === 'function') loadTodasFormacoes();
    } catch (e) {
      showToast('Erro ao apagar: ' + e.message, 'error');
    }
  };

  // Por Mês
  window.exportarPorMes = async function () {
    const inicio = document.getElementById('exportDataInicio')?.value;
    const fim = document.getElementById('exportDataFim')?.value;
    showToast('A preparar exportação por mês...', 'info');
    try {
      const [trainingsSnap, usersSnap, attSnap] = await Promise.all([
        db.collection('trainings').get(),
        db.collection('users').get(),
        db.collection('attendance').get()
      ]);
      const usersMap = {}; usersSnap.forEach(d => usersMap[d.id] = d.data());
      const attMap = {}; attSnap.forEach(d => { const dd = d.data(); attMap[dd.trainingId + '_' + dd.userId] = dd.status; });

      const rows = [['Mês', 'Ano', 'Data', 'Tema', 'Entidade Formadora', 'Formador', 'Local', 'Duração (min)', 'Horas', 'Tipo', 'Laboratório', 'Créditos OF', 'Estado', 'Nº Inscritos', 'Nº Presentes', 'Nº Ausentes', 'Participantes']];

      trainingsSnap.forEach(tDoc => {
        const t = { id: tDoc.id, ...tDoc.data() };
        const dt = asDateP(t.data || t.date);
        if (!dt) return;
        if (inicio && dt < new Date(inicio)) return;
        if (fim && dt > new Date(fim + 'T23:59:59')) return;
        const mes = dt.toLocaleDateString('pt-PT', { month: 'long' });
        const ano = dt.getFullYear();
        const parts = getParticipants(t);
        const presentes = parts.filter(uid => attMap[t.id + '_' + uid] === 'present').length;
        const ausentes = parts.filter(uid => attMap[t.id + '_' + uid] === 'absent').length;
        const mins = getDuration(t);
        rows.push([
          mes, ano, fmtDate(dt), t.tema || '', t.entidadeFormadora || '', t.formador || '',
          t.local || '', mins, (mins / 60).toFixed(2), t.tipo || '', t.laboratorioMarca || '',
          t.creditosOF || '', getStatus(t), parts.length, presentes, ausentes,
          parts.map(uid => usersMap[uid]?.nome || uid).join(', ')
        ]);
      });

      rows.sort((a, b) => a[2].localeCompare(b[2]));
      downloadCSVFile('formacoes_por_mes_' + new Date().toISOString().slice(0,10) + '.csv', rows);
      showToast('Exportação por mês concluída!', 'success');

  /* ─── 9. EXPORTAR RESUMO DE FORMAÇÃO (dados + médias) ─── */
  window.exportarResumoFormacao = async function (trainingId) {
    showToast('A preparar resumo da formação...', 'info');
    try {
      const [tDoc, usersSnap, attSnap, evalSnap] = await Promise.all([
        db.collection('trainings').doc(trainingId).get(),
        db.collection('users').get(),
        db.collection('attendance').where('trainingId', '==', trainingId).get(),
        db.collection('evaluations').where('trainingId', '==', trainingId).get()
      ]);

      const t = { id: tDoc.id, ...tDoc.data() };
      const dt = asDateP(t.data || t.date);
      const mins = getDuration(t);
      const usersMap = {}; usersSnap.forEach(d => usersMap[d.id] = d.data());
      const attMap = {}; attSnap.forEach(d => { const dd = d.data(); attMap[dd.userId] = dd.status; });

      const parts = getParticipants(t);
      const presentes = parts.filter(uid => attMap[uid] === 'present');
      const ausentes = parts.filter(uid => attMap[uid] === 'absent');
      const pendentes = parts.filter(uid => !attMap[uid]);

      const evals = evalSnap.docs.map(d => d.data());
      const avgField = (field) => {
        const vals = evals.map(e => Number(e[field] || 0)).filter(v => v > 0);
        return vals.length ? (vals.reduce((a,b) => a+b, 0) / vals.length).toFixed(2) : '—';
      };

      const rows = [
        ['RESUMO DE FORMAÇÃO — Farmácia da Liga'],
        [],
        ['DADOS DA FORMAÇÃO'],
        ['Tema / Ação', t.tema || ''],
        ['Data', fmtDateLong(dt)],
        ['Entidade Formadora', t.entidadeFormadora || ''],
        ['Formador', t.formador || ''],
        ['Local', t.local || ''],
        ['Tipo / Modalidade', t.tipo || ''],
        ['Duração', (mins/60).toFixed(2) + ' h (' + mins + ' min)'],
        ['Créditos OF', t.creditosOF || '—'],
        ['Estado', getStatus(t)],
        ['Objetivos', (t.objetivos || '').replace(/\n/g, ' ')],
        [],
        ['PARTICIPAÇÃO'],
        ['Total Inscritos', parts.length],
        ['Nº Presentes', presentes.length],
        ['Nº Ausentes', ausentes.length],
        ['Nº Pendentes (sem registo)', pendentes.length],
        ['Taxa de Presença', parts.length ? ((presentes.length / parts.length) * 100).toFixed(0) + '%' : '—'],
        [],
        ['LISTA DE PARTICIPANTES'],
        ['Nome', 'Código Op.', 'NIF', 'Cédula', 'Função', 'Presença'],
        ...parts.map(uid => {
          const u = usersMap[uid] || {};
          return [u.nome || uid, u.codigoOperador || '', u.nif || '', u.cedula || '', u.funcao || '', attMap[uid] || 'pendente'];
        }),
        [],
        ['MÉDIAS DAS AVALIAÇÕES (' + evals.length + ' avaliações submetidas)'],
        ['Parâmetro', 'Média (1-5)'],
        ['Duração da Ação', avgField('duracaoAcao')],
        ['Capacidade Pedagógica do Formador', avgField('capacidadePedagogicaFormador')],
        ['Domínio do Tema pelo Formador', avgField('dominioTemaFormador')],
        ['Relevância para Tarefas', avgField('relevanciaTarefasDesempenha')],
        ['Avaliação Global', avgField('avaliacaoGlobal')],
        [],
        ['DETALHE DAS AVALIAÇÕES POR COLABORADOR'],
        ['Colaborador', 'Duração', 'Pedagógica', 'Domínio', 'Relevância', 'Global', 'Afasta prática?', 'Observações'],
        ...evals.map(ev => {
          const u = usersMap[ev.userId] || {};
          return [
            u.nome || ev.userId,
            ev.duracaoAcao || '', ev.capacidadePedagogicaFormador || '',
            ev.dominioTemaFormador || '', ev.relevanciaTarefasDesempenha || '',
            ev.avaliacaoGlobal || '',
            ev.temasAfastamPraticaInstituida ? 'Sim' : 'Não',
            (ev.observacoesPropostasImplementacao || '') + (ev.justificacaoAfastamentoPratica ? ' | ' + ev.justificacaoAfastamentoPratica : '')
          ];
        }),
        [],
        ['Gerado em', new Date().toLocaleString('pt-PT'), 'Farmácia da Liga — Vila Nova de Gaia']
      ];

      const nomeFicheiro = 'resumo_' + (t.tema || 'formacao').replace(/[^a-zA-Z0-9]/g, '_').slice(0, 30) + '_' + new Date().toISOString().slice(0,10) + '.csv';
      downloadCSVFile(nomeFicheiro, rows);
      showToast('Resumo exportado com sucesso!', 'success');
    } catch (e) { showToast('Erro ao exportar resumo: ' + e.message, 'error'); }
  };

  /* ─── OVERRIDE loadTodasFormacoes para adicionar novos botões ─── */
  const _origLoadTodasFormacoes = window.loadTodasFormacoes;
  window.loadTodasFormacoes = async function () {
    if (_origLoadTodasFormacoes) await _origLoadTodasFormacoes();
    // Inject "Mapa" + "Presença" button into the card header
    setTimeout(() => {
      const cardHeader = document.querySelector('#todasFormacoesContainer')?.closest('.card')?.querySelector('.card-header');
      if (cardHeader && !cardHeader.querySelector('.btn-mapa')) {
        const mapaBtn = document.createElement('button');
        mapaBtn.className = 'btn btn-secondary btn-mapa';
        mapaBtn.innerHTML = '🗓️ Mapa';
        mapaBtn.onclick = abrirMapaFormacoes;
        cardHeader.appendChild(mapaBtn);
      }
      // Inject Presença + Apagar + Marcar Realizada on each training card
      _patchTrainingCards();
    }, 600);
  };

  function _patchTrainingCards() {
    // We hook into rendering — override the inner render by re-reading DOM
    // Actually we override the entire render via a MutationObserver on the container
    const container = document.getElementById('todasFormacoesContainer');
    if (!container) return;
    const obs = new MutationObserver(() => {
      obs.disconnect();
      container.querySelectorAll('.training-card').forEach(card => {
        if (card.querySelector('.btn-presenca')) return;
        const actionsRow = card.querySelector('.actions-row');
        if (!actionsRow) return;

        // Extract trainingId from existing edit button
        const editBtn = actionsRow.querySelector('button');
        if (!editBtn) return;
        const onclickStr = editBtn.getAttribute('onclick') || '';
        const match = onclickStr.match(/editTraining\('([^']+)'\)/);
        if (!match) return;
        const tid = match[1];

        // Determine status from card class
        const isCompleted = card.classList.contains('completed');

        // Add Presença button always
        const presBtn = document.createElement('button');
        presBtn.className = 'btn btn-primary btn-presenca';
        presBtn.innerHTML = '📋 Presenças';
        presBtn.onclick = (e) => { e.stopPropagation(); abrirPresencas(tid); };
        actionsRow.appendChild(presBtn);

        // Add Marcar Realizada if not yet completed
        if (!isCompleted) {
          const realBtn = document.createElement('button');
          realBtn.className = 'btn btn-success';
          realBtn.innerHTML = '✅ Marcar Realizada';
          realBtn.onclick = (e) => { e.stopPropagation(); marcarRealizada(tid); };
          actionsRow.appendChild(realBtn);

          const delBtn = document.createElement('button');
          delBtn.className = 'btn btn-danger';
          delBtn.innerHTML = '🗑️ Apagar';
          delBtn.onclick = (e) => { e.stopPropagation(); apagarFormacao(tid); };
          actionsRow.appendChild(delBtn);
        }

        // Add Exportar Resumo if completed
        if (isCompleted) {
          const resBtn = document.createElement('button');
          resBtn.className = 'btn btn-secondary';
          resBtn.innerHTML = '📋 Resumo';
          resBtn.onclick = (e) => { e.stopPropagation(); exportarResumoFormacao(tid); };
          actionsRow.appendChild(resBtn);
        }
      });
    });
    obs.observe(container, { childList: true, subtree: false });
  }

  /* ─── OVERRIDE loadRelatorios para adicionar botões extra ─── */
  const _origLoadRelatorios = window.loadRelatorios;
  window.loadRelatorios = function () {
    if (_origLoadRelatorios) _origLoadRelatorios();
    setTimeout(() => {
      const exportDiv = document.querySelector('#contentArea .card');
      if (!exportDiv) return;
      const btnArea = exportDiv.querySelector('[style*="display:flex"]');
      if (!btnArea || btnArea.querySelector('.btn-extra-exports')) return;
      const extra = document.createElement('div');
      extra.className = 'btn-extra-exports';
      extra.style.cssText = 'display:flex;gap:12px;flex-wrap:wrap;margin-top:12px;';
      extra.innerHTML = `
        <button class="btn btn-success" onclick="exportarPorColaborador()">👤 Por Colaborador</button>
        <button class="btn btn-secondary" onclick="exportarPorMes()">📅 Por Mês</button>
        <button class="btn btn-secondary" onclick="exportarPorFormacao()">📚 Por Formação</button>
        <button class="btn btn-secondary" onclick="exportarPorLaboratorio()">🏭 Por Laboratório</button>
        <button class="btn btn-warning" style="color:white;" onclick="abrirMapaFormacoes()">🗓️ Mapa de Formações</button>
      `;
      btnArea.parentNode.insertBefore(extra, btnArea.nextSibling);
    }, 300);
  };

  /* ─── ADICIONAR "Mapa" ao menu de navegação ─── */
  const _origBuildMenu = window.buildMenu;
  window.buildMenu = function () {
    if (_origBuildMenu) _origBuildMenu();
    // Add Mapa item to sidebar if gestor
    if (currentUserData && currentUserData.role === 'gestorformacao') {
      const menu = document.getElementById('sidebarMenu');
      if (menu && !menu.querySelector('[data-page="mapaFormacoes"]')) {
        const item = document.createElement('div');
        item.className = 'menu-item';
        item.setAttribute('data-page', 'mapaFormacoes');
        item.innerHTML = '<span>🗓️</span><span>Mapa de Formações</span>';
        item.onclick = () => { abrirMapaFormacoes(); };
        // Insert after "Formações por Mês"
        const mesMi = menu.querySelector('[data-page="formacoesMes"]');
        if (mesMi) mesMi.insertAdjacentElement('afterend', item);
        else menu.appendChild(item);
      }
    }
  };

})();
<script>
(function(){
  // Override loadCriarFormacao to inject missing fields
  const _orig = window.loadCriarFormacao;

  window.loadCriarFormacao = async function(editId = null) {
    // Run original first
    if (_orig) await _orig(editId);

    // Now inject the missing fields into the rendered form
    // We wait for DOM to be ready
    setTimeout(() => {
      const form = document.getElementById('formacaoFormPro');
      if (!form) return;

      // Avoid double-injection
      if (document.getElementById('localPro')) return;

      // Get existing record data from Firebase if editing
      (async () => {
        let record = null;
        if (editId) {
          const doc = await db.collection('trainings').doc(editId).get();
          if (doc.exists) record = { id: doc.id, ...doc.data() };
        }

        // Find the "Entidade Formadora" group and inject AFTER it
        const allGroups = form.querySelectorAll('.form-group');
        let entidadeGroup = null;
        allGroups.forEach(g => {
          if (g.querySelector('label')?.textContent?.includes('Entidade Formadora')) {
            entidadeGroup = g;
          }
        });

        // --- Campo LOCAL ---
        const localGroup = document.createElement('div');
        localGroup.className = 'form-group';
        localGroup.innerHTML = `
          <label class="form-label" for="localPro">Local da Formação</label>
          <input type="text" id="localPro" class="form-control" 
            placeholder="Ex: Sala de reuniões, Online, Laboratório X..." 
            value="${(record?.local || '').replace(/"/g, '&quot;')}">
        `;

        // --- Campo LABORATÓRIO/MARCA ---
        const labGroup = document.createElement('div');
        labGroup.className = 'form-group';
        labGroup.innerHTML = `
          <label class="form-label" for="laboratorioMarcaPro">Laboratório / Marca</label>
          <input type="text" id="laboratorioMarcaPro" class="form-control" 
            placeholder="Ex: Bayer, Pfizer, Nestlé Health Science..." 
            value="${(record?.laboratorioMarca || '').replace(/"/g, '&quot;')}">
        `;

        // Insert after Entidade Formadora, or before submit buttons
        if (entidadeGroup) {
          entidadeGroup.insertAdjacentElement('afterend', labGroup);
          entidadeGroup.insertAdjacentElement('afterend', localGroup);
        } else {
          const actionsRow = form.querySelector('.actions-row');
          if (actionsRow) {
            actionsRow.insertAdjacentElement('beforebegin', localGroup);
            actionsRow.insertAdjacentElement('beforebegin', labGroup);
          }
        }

        // --- Patch o submit para incluir local e laboratorioMarca ---
        // Remove old listener and replace with new one
        const newForm = form.cloneNode(true);
        form.parentNode.replaceChild(newForm, form);

        newForm.addEventListener('submit', async (e) => {
          e.preventDefault();

          const participantes = Array.from(
            newForm.querySelectorAll('.participants-grid input[type="checkbox"]:checked')
          ).map(i => i.value);

          const dataVal = document.getElementById('dataPro').value;
          const dataObj = dataVal ? new Date(dataVal) : null;
          if (!dataObj || isNaN(dataObj)) {
            showToast('Data inválida. Por favor verifica.', 'error');
            return;
          }

          const payload = {
            tema: document.getElementById('temaPro').value.trim(),
            data: dataObj,
            durationMinutes: parseInt(document.getElementById('duracaoMinutosPro').value || 0),
            formador: document.getElementById('formadorPro').value.trim(),
            tipo: document.getElementById('tipoPro').value.trim(),
            descricao: document.getElementById('descricaoPro').value.trim(),
            participantes,
            estado: document.getElementById('estadoPro').value,
            estadoManual: document.getElementById('estadoPro').value,
            objetivos: document.getElementById('objetivosPro').value.trim(),
            entidadeFormadora: document.getElementById('entidadeFormadoraPro').value.trim(),
            creditosOF: parseFloat(document.getElementById('creditosOFPro').value) || 0,
            local: (document.getElementById('localPro')?.value || '').trim(),
            laboratorioMarca: (document.getElementById('laboratorioMarcaPro')?.value || '').trim(),
            updatedAt: firebase.firestore.FieldValue.serverTimestamp(),
            updatedBy: currentUser.uid
          };

          if (!editId) {
            payload.createdAt = firebase.firestore.FieldValue.serverTimestamp();
            payload.createdBy = currentUser.uid;
          }

          try {
            const ref = editId
              ? db.collection('trainings').doc(editId)
              : db.collection('trainings').doc();
            await ref.set(payload, { merge: true });
            showToast(editId ? 'Formação atualizada com sucesso!' : 'Formação criada com sucesso!', 'success');
            navigateTo('todasFormacoes');
          } catch (err) {
            console.error('Erro ao guardar formação:', err);
            showToast('Erro ao guardar: ' + err.message, 'error');
          }
        });

      })();
    }, 200);
  };

})();
</script>

<script>
(function(){

  window.loadTodasFormacoes = async function(){
    document.getElementById('pageTitle').textContent = 'Gestão de Formações';
    document.getElementById('contentArea').innerHTML = `
      <div class="card" style="margin-bottom:24px;">
        <div class="card-header">
          <h2 class="card-title">Todas as Formações</h2>
          <div style="display:flex;gap:8px;flex-wrap:wrap;">
            <button class="btn btn-primary" onclick="navigateTo('criarFormacao')">➕ Nova Formação</button>
            <button class="btn btn-secondary" onclick="abrirMapaFormacoes()">🗓️ Mapa</button>
          </div>
        </div>
        <!-- Filtros -->
        <div class="filters-bar" style="margin-top:0;margin-bottom:16px;">
          <div class="filter-item">
            <input type="text" id="filtroTexto" class="form-control" placeholder="🔍 Pesquisar tema, formador, entidade..." oninput="renderTodasFormacoes()">
          </div>
          <div class="filter-item">
            <select id="filtroEstado" class="form-control" onchange="renderTodasFormacoes()">
              <option value="">Todos os estados</option>
              <option value="agendada">Agendada</option>
              <option value="realizada">Realizada</option>
              <option value="cancelada">Cancelada</option>
              <option value="adiada">Adiada</option>
            </select>
          </div>
          <div class="filter-item">
            <input type="number" id="filtroAno" class="form-control" placeholder="Ano (ex: 2025)" oninput="renderTodasFormacoes()" value="${new Date().getFullYear()}">
          </div>
        </div>
        <div id="todasFormacoesContainer"></div>
      </div>`;

    if (typeof ensureAutoStatus === 'function') await ensureAutoStatus();

    // Load data once, re-render on filter
    window._todasFormacoesData = null;

    const loadData = async () => {
      const [usersMap, attendanceMap, evalMap, trainings] = await Promise.all([
        getUsersMap(), getAttendanceMap(), getEvaluationsMap(), getAllTrainings()
      ]);
      window._todasFormacoesData = { usersMap, attendanceMap, evalMap, trainings };
      renderTodasFormacoes();
    };

    await loadData();
    if (typeof activeUnsubscribe === 'function') activeUnsubscribe();
    window.activeUnsubscribe = db.collection('trainings').onSnapshot(async () => {
      window._todasFormacoesData = null;
      await loadData();
    });
  };

  window.renderTodasFormacoes = function(){
    const container = document.getElementById('todasFormacoesContainer');
    if (!container || !window._todasFormacoesData) return;

    const { usersMap, attendanceMap, evalMap, trainings } = window._todasFormacoesData;

    const filtroTexto = (document.getElementById('filtroTexto')?.value || '').toLowerCase().trim();
    const filtroEstado = document.getElementById('filtroEstado')?.value || '';
    const filtroAno = document.getElementById('filtroAno')?.value || '';

    // Filter
    let filtered = trainings.filter(t => {
      const dt = trainingDate(t);
      const status = resolvedStatus(t);
      if (filtroEstado && status !== filtroEstado) return false;
      if (filtroAno && dt && dt.getFullYear() !== parseInt(filtroAno)) return false;
      if (filtroTexto) {
        const haystack = [t.tema, t.formador, t.entidadeFormadora, t.local, t.laboratorioMarca].join(' ').toLowerCase();
        if (!haystack.includes(filtroTexto)) return false;
      }
      return true;
    });

    // Sort descending by date
    filtered.sort((a,b) => (trainingDate(b)?.getTime()||0) - (trainingDate(a)?.getTime()||0));

    if (!filtered.length) {
      container.innerHTML = `<div class="empty-state"><div class="empty-state-icon">📚</div><div class="empty-state-text">Nenhuma formação encontrada.</div></div>`;
      return;
    }

    // Group by month
    const grouped = {};
    filtered.forEach(t => {
      const dt = trainingDate(t);
      const key = dt ? `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}` : '0000-00';
      const label = dt ? dt.toLocaleDateString('pt-PT', { month: 'long', year: 'numeric' }) : 'Sem data';
      if (!grouped[key]) grouped[key] = { label, trainings: [] };
      grouped[key].trainings.push(t);
    });

    const currentMonthKey = `${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}`;

    const html = Object.entries(grouped)
      .sort((a,b) => b[0].localeCompare(a[0]))
      .map(([key, group]) => {
        const isCurrentMonth = key === currentMonthKey;
        const monthId = 'gesmes-' + key;

        const cards = group.trainings.map(t => {
          const ids = participantIds(t);
          const status = resolvedStatus(t);
          const presentCount = ids.filter(uid => attendanceMap[`${t.id}_${uid}`]?.status === 'present').length;
          const absentCount  = ids.filter(uid => attendanceMap[`${t.id}_${uid}`]?.status === 'absent').length;
          const evalCount    = ids.filter(uid => !!evalMap[`${t.id}_${uid}`]).length;
          const dt = trainingDate(t);
          const mins = normalizeDurationMinutes(t);
          const hLabel = mins >= 60 ? Math.floor(mins/60)+'h'+(mins%60 ? String(mins%60).padStart(2,'0') : '') : mins+'min';

          return `
            <div class="training-card ${status==='realizada'?'completed':'pending'}" style="margin-bottom:12px;">
              <div class="training-header">
                <div style="flex:1;">
                  <div class="training-title">${trainingTitle(t)}</div>
                  <div class="training-meta" style="margin-top:6px;">
                    <div class="training-meta-item">📅 ${dt ? dt.toLocaleDateString('pt-PT',{weekday:'short',day:'numeric',month:'short'}) + ' ' + dt.toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'}) : '—'}</div>
                    <div class="training-meta-item">⏱️ ${hLabel}</div>
                    <div class="training-meta-item">🎓 ${trainingTrainer(t)}</div>
                    ${t.entidadeFormadora ? `<div class="training-meta-item">🏢 ${t.entidadeFormadora}</div>` : ''}
                    ${t.local ? `<div class="training-meta-item">📍 ${t.local}</div>` : ''}
                    ${t.laboratorioMarca ? `<div class="training-meta-item">🏭 ${t.laboratorioMarca}</div>` : ''}
                    ${t.creditosOF ? `<div class="training-meta-item">🏅 ${t.creditosOF} créditos OF</div>` : ''}
                    <div class="training-meta-item">👥 ${ids.length} inscritos</div>
                  </div>
                </div>
                <div>${statusBadge(status)}</div>
              </div>
              <div class="kpi-row">
                <span class="kpi-pill">✓ Presentes: ${presentCount}</span>
                <span class="kpi-pill">✗ Faltas: ${absentCount}</span>
                <span class="kpi-pill">⭐ Avaliações: ${evalCount}/${ids.length}</span>
              </div>
              ${ids.length ? `<div class="small-text" style="margin-top:8px;">👤 ${ids.map(uid => usersMap[uid]?.nome || uid).join(', ')}</div>` : ''}
              <div class="actions-row" style="margin-top:12px;">
                <button class="btn btn-secondary" onclick="event.stopPropagation();editTraining('${t.id}')">✏️ Editar</button>
                <button class="btn btn-primary" onclick="event.stopPropagation();abrirPresencas('${t.id}')" title="Gerir presenças">📋 Presenças</button>
                ${status === 'agendada' ? `
                  <button class="btn btn-success" onclick="event.stopPropagation();marcarRealizada('${t.id}')">✅ Marcar Realizada</button>
                  <button class="btn btn-danger" onclick="event.stopPropagation();apagarFormacao('${t.id}')" title="Apagar formação">🗑️ Apagar</button>
                ` : ''}
                ${status === 'realizada' ? `
                  <button class="btn btn-secondary" onclick="event.stopPropagation();exportarResumoFormacao('${t.id}')">📋 Resumo</button>
                ` : ''}
                <button class="btn btn-warning" style="color:white;font-size:12px;padding:8px 12px;" onclick="event.stopPropagation();anularFormacao('${t.id}')" title="Anular">🚫 Anular</button>
              </div>
            </div>`;
        }).join('');

        const totalMins = group.trainings.reduce((s,t) => s + normalizeDurationMinutes(t), 0);
        const totalH = totalMins >= 60 ? Math.floor(totalMins/60)+'h'+(totalMins%60 ? String(totalMins%60).padStart(2,'0') : '') : totalMins+'min';

        return `
          <div class="month-group" style="margin-bottom:24px;">
            <div class="training-card" style="cursor:pointer;border-left:4px solid var(--color-info);margin-bottom:0;border-radius:12px 12px ${isCurrentMonth?'0 0':'12px 12px'};"
                 onclick="toggleMesDetail('${monthId}')">
              <div style="display:flex;justify-content:space-between;align-items:center;">
                <div>
                  <h3 style="font-size:17px;font-weight:700;text-transform:capitalize;">${group.label}</h3>
                  <p style="color:var(--color-text-secondary);font-size:12px;margin-top:3px;">
                    ${group.trainings.length} formação(ões) · ${totalH} total
                    · ${group.trainings.filter(t=>resolvedStatus(t)==='realizada').length} realizadas
                    · ${group.trainings.filter(t=>resolvedStatus(t)==='agendada').length} agendadas
                  </p>
                </div>
                <span id="${monthId}-arrow" style="font-size:20px;transition:transform 0.2s;">${isCurrentMonth?'🔽':'▶️'}</span>
              </div>
            </div>
            <div id="${monthId}" style="display:${isCurrentMonth?'block':'none'};border:1px solid var(--color-border);border-top:none;border-radius:0 0 12px 12px;padding:16px;background:#fff;">
              ${cards}
            </div>
          </div>`;
      }).join('');

    container.innerHTML = html;
  };

})();

              <option value="">Todos os estados</option>
              <option value="agendada">Agendada</option>
              <option value="realizada">Realizada</option>
              <option value="cancelada">Cancelada</option>
              <option value="adiada">Adiada</option>
            </select>
          </div>
          <div class="filter-item" style="max-width:140px;">
            <input type="number" id="filtroAno" class="form-control"
              placeholder="Ano" oninput="renderTodasFormacoes()"
              value="${new Date().getFullYear()}">
          </div>
        </div>
        <div id="todasFormacoesContainer">
          <div class="loading active"><div class="spinner"></div><p>A carregar...</p></div>
        </div>
      </div>`;

    if (typeof ensureAutoStatus === 'function') await ensureAutoStatus();
    await _reloadTodasFormacoes();

    // Live updates
    if (typeof activeUnsubscribe === 'function') activeUnsubscribe();
    window.activeUnsubscribe = db.collection('trainings').onSnapshot(async () => {
      await _reloadTodasFormacoes();
    });
  };

  async function _reloadTodasFormacoes(){
    try {
      const [usersMap, attendanceMap, evalMap, trainings] = await Promise.all([
        getUsersMap(), getAttendanceMap(), getEvaluationsMap(), getAllTrainings()
      ]);
      window._todasFormacoesData = { usersMap, attendanceMap, evalMap, trainings };
      renderTodasFormacoes();
    } catch(e) {
      console.error('Erro loadTodasFormacoes:', e);
      const c = document.getElementById('todasFormacoesContainer');
      if (c) c.innerHTML = `<p style="color:red;padding:20px;">Erro ao carregar: ${e.message}</p>`;
    }
  }

  window.renderTodasFormacoes = function(){
    const container = document.getElementById('todasFormacoesContainer');
    if (!container || !window._todasFormacoesData) return;

    const { usersMap, attendanceMap, evalMap, trainings } = window._todasFormacoesData;
    const filtroTexto  = (document.getElementById('filtroTexto')?.value  || '').toLowerCase();
    const filtroEstado = document.getElementById('filtroEstado')?.value  || '';
    const filtroAno    = document.getElementById('filtroAno')?.value     || '';

    let filtered = trainings.filter(t => {
      const dt     = trainingDate(t);
      const status = resolvedStatus(t);
      if (filtroEstado && status !== filtroEstado) return false;
      if (filtroAno && dt && dt.getFullYear() !== parseInt(filtroAno)) return false;
      if (filtroTexto) {
        const hay = [t.tema, t.formador, t.entidadeFormadora, t.local, t.laboratorioMarca]
          .join(' ').toLowerCase();
        if (!hay.includes(filtroTexto)) return false;
      }
      return true;
    });

    filtered.sort((a,b) => (trainingDate(b)?.getTime()||0) - (trainingDate(a)?.getTime()||0));

    if (!filtered.length) {
      container.innerHTML = `<div class="empty-state">
        <div class="empty-state-icon">📚</div>
        <div class="empty-state-text">Nenhuma formação encontrada.</div>
      </div>`;
      return;
    }

    // Group by YYYY-MM key (sortable)
    const grouped = {};
    filtered.forEach(t => {
      const dt  = trainingDate(t);
      const key = dt
        ? `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`
        : '0000-00';
      const label = dt
        ? dt.toLocaleDateString('pt-PT', { month: 'long', year: 'numeric' })
        : 'Sem data';
      if (!grouped[key]) grouped[key] = { label, trainings: [] };
      grouped[key].trainings.push(t);
    });

    const currentKey = `${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}`;

    const html = Object.entries(grouped)
      .sort((a,b) => b[0].localeCompare(a[0]))   // sort YYYY-MM desc ✓
      .map(([key, group]) => {
        const isCurrentMonth = key === currentKey;
        const monthId = 'gesmes-' + key;
        const totalMins = group.trainings.reduce((s,t) => s + normalizeDurationMinutes(t), 0);
        const hTot = totalMins >= 60
          ? Math.floor(totalMins/60)+'h'+(totalMins%60 ? String(totalMins%60).padStart(2,'0') : '')
          : totalMins+'min';
        const nReal = group.trainings.filter(t => resolvedStatus(t)==='realizada').length;
        const nAge  = group.trainings.filter(t => resolvedStatus(t)==='agendada').length;

        const cards = group.trainings.map(t => {
          const ids     = participantIds(t);
          const status  = resolvedStatus(t);
          const dt      = trainingDate(t);
          const mins    = normalizeDurationMinutes(t);
          const hLabel  = mins >= 60
            ? Math.floor(mins/60)+'h'+(mins%60 ? String(mins%60).padStart(2,'0') : '')
            : mins+'min';
          const nPresente = ids.filter(uid => attendanceMap[`${t.id}_${uid}`]?.status==='present').length;
          const nAusente  = ids.filter(uid => attendanceMap[`${t.id}_${uid}`]?.status==='absent').length;
          const nEval     = ids.filter(uid => !!evalMap[`${t.id}_${uid}`]).length;

          return `
            <div class="training-card ${status==='realizada'?'completed':'pending'}" style="margin-bottom:12px;">
              <div class="training-header">
                <div style="flex:1;">
                  <div class="training-title">${trainingTitle(t)}</div>
                  <div class="training-meta" style="margin-top:6px;">
                    <div class="training-meta-item">📅 ${dt ? dt.toLocaleDateString('pt-PT',{weekday:'short',day:'numeric',month:'short',year:'numeric'})+' '+dt.toLocaleTimeString('pt-PT',{hour:'2-digit',minute:'2-digit'}) : '—'}</div>
                    <div class="training-meta-item">⏱️ ${hLabel}</div>
                    <div class="training-meta-item">🎓 ${trainingTrainer(t)}</div>
                    ${t.entidadeFormadora ? `<div class="training-meta-item">🏢 ${t.entidadeFormadora}</div>` : ''}
                    ${t.local            ? `<div class="training-meta-item">📍 ${t.local}</div>` : ''}
                    ${t.laboratorioMarca ? `<div class="training-meta-item">🏭 ${t.laboratorioMarca}</div>` : ''}
                    ${t.creditosOF       ? `<div class="training-meta-item">🏅 ${t.creditosOF} créditos OF</div>` : ''}
                    <div class="training-meta-item">👥 ${ids.length} inscritos</div>
                  </div>
                </div>
                <div>${statusBadge(status)}</div>
              </div>
              <div class="kpi-row">
                <span class="kpi-pill">✓ Presentes: ${nPresente}</span>
                <span class="kpi-pill">✗ Faltas: ${nAusente}</span>
                <span class="kpi-pill">⭐ Avaliações: ${nEval}/${ids.length}</span>
              </div>
              ${ids.length ? `<div class="small-text" style="margin-top:8px;">👤 ${ids.map(uid=>usersMap[uid]?.nome||uid).join(', ')}</div>` : ''}
              <div class="actions-row" style="margin-top:12px;">
                <button class="btn btn-secondary" onclick="event.stopPropagation();editTraining('${t.id}')">✏️ Editar</button>
                <button class="btn btn-primary"   onclick="event.stopPropagation();abrirPresencas('${t.id}')">📋 Presenças</button>
                ${status==='agendada' ? `
                  <button class="btn btn-success" onclick="event.stopPropagation();marcarRealizada('${t.id}')">✅ Realizada</button>
                  <button class="btn btn-danger"  onclick="event.stopPropagation();apagarFormacao('${t.id}')">🗑️ Apagar</button>
                ` : ''}
                ${status==='realizada' ? `
                  <button class="btn btn-secondary" onclick="event.stopPropagation();exportarResumoFormacao('${t.id}')">📋 Resumo</button>
                ` : ''}
                <button class="btn btn-warning" style="color:white;font-size:12px;padding:8px 12px;"
                  onclick="event.stopPropagation();anularFormacao('${t.id}')">🚫 Anular</button>
              </div>
            </div>`;
        }).join('');

        return `
          <div style="margin-bottom:20px;">
            <div class="training-card" style="cursor:pointer;border-left:4px solid var(--color-info);
              margin-bottom:0;border-radius:12px 12px ${isCurrentMonth?'0 0':'12px 12px'};"
              onclick="toggleMesDetail('${monthId}')">
              <div style="display:flex;justify-content:space-between;align-items:center;">
                <div>
                  <h3 style="font-size:17px;font-weight:700;text-transform:capitalize;">${group.label}</h3>
                  <p style="color:var(--color-text-secondary);font-size:12px;margin-top:3px;">
                    ${group.trainings.length} formação(ões) &nbsp;·&nbsp; ${hTot} &nbsp;·&nbsp;
                    ✅ ${nReal} realizadas &nbsp;·&nbsp; 📅 ${nAge} agendadas
                  </p>
                </div>
                <span id="${monthId}-arrow" style="font-size:20px;">${isCurrentMonth?'🔽':'▶️'}</span>
              </div>
            </div>
            <div id="${monthId}"
              style="display:${isCurrentMonth?'block':'none'};
                border:1px solid var(--color-border);border-top:none;
                border-radius:0 0 12px 12px;padding:16px;background:#fff;">
              ${cards}
            </div>
          </div>`;
      }).join('');

    container.innerHTML = html;
  };

  /* ══════════════════════════════════════════════
     FIX 2 — loadMinhasFormacoes: sort por data real
     O bug: monthKey() devolve "abril 2025" e o sort
     faz localeCompare de strings (ordem alfabética).
     Fix: agrupar com chave YYYY-MM e label separado.
  ══════════════════════════════════════════════ */
  window.loadMinhasFormacoes = async function(){
    document.getElementById('pageTitle').textContent = 'As Minhas Formações';
    document.getElementById('contentArea').innerHTML = `
      <div class="stats-grid">
        <div class="stat-card blue">
          <div class="stat-label">Formações Futuras</div>
          <div class="stat-value" id="statFuturas">-</div>
        </div>
        <div class="stat-card green">
          <div class="stat-label">Horas frequentadas</div>
          <div class="stat-value" id="statHoras">-</div>
        </div>
        <div class="stat-card warning">
          <div class="stat-label">Por avaliar</div>
          <div class="stat-value" id="statAvaliar">-</div>
        </div>
      </div>
      <div class="card">
        <div class="card-header">
          <h2 class="card-title">As minhas formações por mês</h2>
        </div>
        <div id="minhasFormacoesContainer">
          <div class="loading active"><div class="spinner"></div><p>A carregar...</p></div>
        </div>
      </div>`;

    const render = async () => {
      try {
        const [trainings, attendanceMap, evalMap] = await Promise.all([
          getAllTrainings(), getAttendanceMap(), getEvaluationsMap()
        ]);

        const my = trainings
          .filter(t => isParticipant(t, currentUser.uid))
          .sort((a,b) => (trainingDate(b)?.getTime()||0) - (trainingDate(a)?.getTime()||0));

        // Group with YYYY-MM key
        const grouped = {};
        let futuras = 0, avaliar = 0, minutes = 0;

        my.forEach(t => {
          const dt     = trainingDate(t) || new Date();
          const key    = `${dt.getFullYear()}-${String(dt.getMonth()+1).padStart(2,'0')}`;
          const label  = dt.toLocaleDateString('pt-PT', { month: 'long', year: 'numeric' });
          if (!grouped[key]) grouped[key] = { label, rows: [] };

          const att    = attendanceMap[`${t.id}_${currentUser.uid}`];
          const ev     = evalMap[`${t.id}_${currentUser.uid}`];
          const status = resolvedStatus(t);

          if (status === 'agendada') futuras++;
          if (att?.status === 'present') minutes += normalizeDurationMinutes(t);
          if (status === 'realizada' && att?.status === 'present' && !ev) avaliar++;

          grouped[key].rows.push({ t, dt, att, ev, status });
        });

        document.getElementById('statFuturas').textContent = futuras;
        document.getElementById('statHoras').textContent   = hoursLabelFromMinutes(minutes);
        document.getElementById('statAvaliar').textContent = avaliar;

        const currentKey = `${new Date().getFullYear()}-${String(new Date().getMonth()+1).padStart(2,'0')}`;

        const html = Object.entries(grouped)
          .sort((a,b) => b[0].localeCompare(a[0]))   // YYYY-MM desc ✓
          .map(([key, group]) => {
            const isCurrentMonth = key === currentKey;
            const monthId = 'colabmes-' + key;

            const cards = group.rows.map(({ t, dt, att, ev, status }) => {
              const canEvaluate = status === 'realizada' && att?.status !== 'absent';
              const mins = normalizeDurationMinutes(t);
              return `
                <div class="training-card ${status==='realizada'?'completed':'pending'}"
                  style="cursor:pointer;margin-bottom:10px;"
                  onclick="abrirDetalheFormacao('${t.id}')">
                  <div class="training-header">
                    <div style="flex:1;">
                      <div class="training-title" style="font-size:15px;">${trainingTitle(t)}</div>
                      <div class="training-meta" style="margin-top:6px;">
                        <div class="training-meta-item">📅 ${dt ? dt.toLocaleDateString('pt-PT',{weekday:'short',day:'numeric',month:'short',year:'numeric'}) : '—'}</div>
                        <div class="training-meta-item">⏱️ ${hoursLabelFromMinutes(mins)}</div>
                        <div class="training-meta-item">🎓 ${trainingTrainer(t)}</div>
                        ${t.entidadeFormadora ? `<div class="training-meta-item">🏢 ${t.entidadeFormadora}</div>` : ''}
                        ${t.local            ? `<div class="training-meta-item">📍 ${t.local}</div>`             : ''}
                        ${t.laboratorioMarca ? `<div class="training-meta-item">🏭 ${t.laboratorioMarca}</div>`  : ''}
                      </div>
                    </div>
                    <div>${statusBadge(status)}</div>
                  </div>
                  <div class="kpi-row">
                    <span class="kpi-pill">
                      Presença: ${att?.status==='present' ? '✓ Confirmada'
                               : att?.status==='absent'  ? '✗ Não compareceu'
                               : '⏳ Pendente'}
                    </span>
                    <span class="kpi-pill">
                      Avaliação: ${ev ? '✓ Submetida' : (canEvaluate ? '⚠️ Por fazer' : '—')}
                    </span>
                    ${t.creditosOF && att?.status==='present' && currentUserData?.funcao==='Farmacêutico'
                      ? `<span class="kpi-pill">🏅 ${t.creditosOF} créditos OF</span>` : ''}
                  </div>
                  ${canEvaluate && !ev ? `
                    <div style="margin-top:10px;">
                      <button class="btn btn-primary" style="font-size:12px;"
                        onclick="event.stopPropagation();openEvaluationForTraining('${t.id}')">
                        ⭐ Avaliar Formação
                      </button>
                    </div>` : ''}
                </div>`;
            }).join('');

            return `
              <div style="margin-bottom:20px;">
                <div class="training-card"
                  style="cursor:pointer;border-left:4px solid var(--color-info);
                    margin-bottom:0;border-radius:12px 12px ${isCurrentMonth?'0 0':'12px 12px'};"
                  onclick="toggleMesDetail('${monthId}')">
                  <div style="display:flex;justify-content:space-between;align-items:center;">
                    <div>
                      <h3 style="font-size:16px;font-weight:700;text-transform:capitalize;">${group.label}</h3>
                      <p style="color:var(--color-text-secondary);font-size:12px;margin-top:2px;">
                        ${group.rows.length} formação(ões)
                        · ${group.rows.filter(r=>r.status==='realizada').length} realizadas
                        · ${group.rows.filter(r=>r.status==='agendada').length} agendadas
                      </p>
                    </div>
                    <span id="${monthId}-arrow" style="font-size:20px;">${isCurrentMonth?'🔽':'▶️'}</span>
                  </div>
                </div>
                <div id="${monthId}"
                  style="display:${isCurrentMonth?'block':'none'};
                    border:1px solid var(--color-border);border-top:none;
                    border-radius:0 0 12px 12px;padding:16px;background:#fff;"
                  onclick="event.stopPropagation()">
                  ${cards}
                </div>
              </div>`;
          }).join('');

        document.getElementById('minhasFormacoesContainer').innerHTML =
          html || `<div class="empty-state">
            <div class="empty-state-icon">📚</div>
            <div class="empty-state-text">Ainda não tens formações atribuídas.</div>
          </div>`;

      } catch(e) {
        console.error('Erro loadMinhasFormacoes:', e);
        const c = document.getElementById('minhasFormacoesContainer');
        if (c) c.innerHTML = `<p style="color:red;padding:20px;">Erro: ${e.message}</p>`;
      }
    };

    await render();
    if (typeof activeUnsubscribe === 'function') activeUnsubscribe();
    window.activeUnsubscribe = db.collection('trainings').onSnapshot(render);
  };

})();
</script>
</body>
</html>
