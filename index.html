                const presentes = [], ausentes = [], porAvaliar = [];
                (t.participantes||[]).forEach(uid => {
                    const att = attSnap.docs.find(a=>a.data().userId===uid);
                    const cod = usersMap[uid]?.codigoOperador || usersMap[uid]?.nome || uid;
                    if (att?.data().status==='absent') ausentes.push(cod);
                    else if (att?.data().status==='present') { presentes.push(cod); if (!evalByUser[uid]) porAvaliar.push(cod); }
                    else porAvaliar.push(cod);
                });
                let media = '-';
                if (evalSnap.size > 0) {
                    const soma = evalSnap.docs.reduce((s,d)=>s+(d.data().avaliacaoGlobal||0),0);
                    media = (soma/evalSnap.size).toFixed(1);
                }
                rows.push([
                    dt ? dt.toLocaleDateString('pt-PT') : '',
                    t.tema||'', t.entidadeFormadora||'', t.formador||'', t.local||'',
                    t.durationMinutes||((t.duracaoHoras||0)*60)||0,
                    (t.objetivos||'').replace(/\n/g,' '),
                    t.creditosOF||0,
                    t.estadoManual||t.estado||'',
                    media,
                    presentes.join('; '), ausentes.join('; '), porAvaliar.join('; ')
                ]);
            }
            const bom = '\uFEFF';
            const csv = bom + rows.map(r => r.map(v => `"${String(v).replace(/"/g,'""')}"`).join(',')).join('\n');
            const blob = new Blob([csv], {type:'text/csv;charset=utf-8;'});
            const link = document.createElement('a');
            link.href = URL.createObjectURL(blob);
            link.download = `plano_formacoes_${new Date().toISOString().slice(0,10)}.csv`;
            document.body.appendChild(link); link.click(); document.body.removeChild(link);
            showToast('Plano exportado com sucesso!','success');
        } catch(e) { console.error(e); showToast('Erro ao exportar plano','error'); }
    };

    // Ver Plano de Formações (janela imprimível)
    window.verPlanoFormacoes = async function() {
        showToast('A gerar plano...','info');
        try {
            const snap = await db.collection('trainings').orderBy('data','asc').get();
            let objTexto = '';
            try {
                const os = await db.collection('objetivosPlano').orderBy('createdAt','desc').limit(1).get();
                if (!os.empty) objTexto = os.docs[0].data().texto||'';
            } catch(e){}
            const usersMap = await getUsersMap();
            const rows = await Promise.all(snap.docs.map(async doc => {
                const t = { id: doc.id, ...doc.data() };
                let dt = t.data ? (t.data.toDate ? t.data.toDate() : new Date(t.data.seconds*1000)) : null;
                const attSnap = await db.collection('attendance').where('trainingId','==',doc.id).get();
                const presentes = attSnap.docs.filter(a=>a.data().status==='present').length;
                const total = (t.participantes||[]).length;
                return { ...t, dt, presentes, total };
            }));
            const estadoCor = { 'realizada':'#DFF3E3','agendada':'#D8EFFF','adiada':'#FFF4E5','cancelada':'#FFEBEE' };
            const w = window.open('','_blank');
            w.document.write(`<!DOCTYPE html><html lang="pt-PT"><head><meta charset="UTF-8">
            <title>Plano de Formações ${new Date().getFullYear()}</title>
            <style>
                body{font-family:Arial,sans-serif;padding:40px;color:#333;max-width:1100px;margin:0 auto;}
                h1{color:#4A6572;} h2{color:#4A6572;margin-top:32px;border-bottom:2px solid #eee;padding-bottom:8px;}
                table{width:100%;border-collapse:collapse;margin-top:16px;font-size:12px;}
                th{background:#4A6572;color:white;padding:10px 8px;text-align:left;font-size:11px;}
                td{padding:8px;border-bottom:1px solid #eee;vertical-align:top;}
                tr:nth-child(even){background:#f9f9f9;}
                .obj{background:#f0f7ff;padding:16px;border-radius:8px;white-space:pre-wrap;line-height:1.8;font-size:13px;}
                .footer{margin-top:40px;font-size:11px;color:#aaa;text-align:center;border-top:1px solid #eee;padding-top:16px;}
                @media print{.no-print{display:none!important;}}
            </style></head><body>
            <div style="text-align:center;margin-bottom:32px;">
                <div style="font-size:40px;">💊</div>
                <h1 style="margin:8px 0;">Farmácia da Liga</h1>
                <div style="font-size:16px;color:#666;">Plano de Formações ${new Date().getFullYear()}</div>
                <div style="font-size:12px;color:#999;margin-top:4px;">Gerado em ${new Date().toLocaleString('pt-PT')}</div>
            </div>
            ${objTexto ? `<h2>🎯 Objetivos Gerais do Plano</h2><div class="obj">${objTexto.replace(/</g,'&lt;')}</div>` : ''}
            <h2>📚 Formações</h2>
            <table><thead><tr>
                <th>Data</th><th>Tema</th><th>Entidade Formadora</th><th>Formador</th>
                <th>Local</th><th>Duração</th><th>Créditos OF</th><th>Estado</th>
                <th>Objetivos</th><th>Participantes</th>
            </tr></thead><tbody>
            ${rows.map(t => {
                const cor = estadoCor[t.estadoManual||t.estado||'agendada']||'#fff';
                const mins = t.durationMinutes||((t.duracaoHoras||0)*60)||0;
                const hLabel = mins >= 60 ? Math.floor(mins/60)+'h'+(mins%60?String(mins%60).padStart(2,'0'):'') : mins+'min';
                return `<tr style="background:${cor}">
                    <td style="white-space:nowrap;">${t.dt?t.dt.toLocaleDateString('pt-PT'):'-'}</td>
                    <td><strong>${t.tema||'-'}</strong></td>
                    <td>${t.entidadeFormadora||'-'}</td>
                    <td>${t.formador||'-'}</td>
                    <td>${t.local||'-'}</td>
                    <td style="white-space:nowrap;">${hLabel}</td>
                    <td style="text-align:center;">${t.creditosOF||'-'}</td>
                    <td><span style="background:${cor};padding:2px 8px;border-radius:4px;font-size:11px;font-weight:700;">${t.estadoManual||t.estado||'-'}</span></td>
                    <td style="font-size:11px;max-width:200px;">${(t.objetivos||'-').replace(/</g,'&lt;')}</td>
                    <td style="text-align:center;">${t.presentes}/${t.total}</td>
                </tr>`;
            }).join('')}
            </tbody></table>
            <div class="footer">Farmácia da Liga · Vila Nova de Gaia · ${new Date().getFullYear()}</div>
            <br class="no-print">
            <button class="no-print" onclick="window.print()" style="padding:12px 28px;background:#4A6572;color:white;border:none;border-radius:8px;cursor:pointer;font-size:14px;font-weight:700;">🖨️ Imprimir / Guardar PDF</button>
            </body></html>`);
            w.document.close();
        } catch(e) { console.error(e); showToast('Erro ao gerar plano','error'); }
    };

</script>
